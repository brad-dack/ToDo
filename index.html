<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Planner</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    background: #2b7cff;
    color: white;
    border: none;
    border-radius: 6px;
}

.task {
    border: 1px solid #ddd;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>Task Planner</h1>

<!-- CREATE -->
<div id="createScreen">
    <input id="taskTitle" placeholder="Task title">
    <input type="date" id="dueDate">
    <input type="number" id="importance" placeholder="Importance (0–10)">
    <input type="number" id="timeEstimate" placeholder="Time (minutes)">
    <button onclick="addTask()">Add Task</button>
</div>

<!-- BREAKDOWN -->
<div id="breakdownScreen" class="hidden">
    <h3>Break into Steps</h3>
    <div id="breakdownList"></div>
    <button onclick="saveSubtasks()">Save</button>
</div>

<h3>Your Tasks</h3>
<div id="taskList"></div>

</div>

<script>

const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";

let client;
let tasks = [];
let currentTask;
let currentTaskId;

window.onload = async () => {
    client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadTasks();
};

// FORMAT DATE → DD/MM/YY
function formatDate(dateStr) {
    let d = new Date(dateStr);
    let day = String(d.getDate()).padStart(2, '0');
    let month = String(d.getMonth()+1).padStart(2, '0');
    let year = String(d.getFullYear()).slice(-2);
    return `${day}/${month}/${year}`;
}

// ADD TASK
async function addTask() {

    let title = taskTitle.value;
    let dueDate = dueDateInput.value;
    let importance = parseInt(importanceInput.value);
    let time = parseInt(timeEstimate.value);

    let { data } = await client.from("tasks")
        .insert([{ title, due_date: dueDate, importance, time_estimate: time }])
        .select();

    currentTask = data[0];
    currentTaskId = currentTask.id;

    showBreakdown(currentTask);
}

// SHOW BREAKDOWN
function showBreakdown(task) {

    createScreen.classList.add("hidden");
    breakdownScreen.classList.remove("hidden");

    breakdownList.innerHTML = "";

    let total = task.time_estimate;

    while (total > 0) {

        let step = Math.min(15, total);

        let div = document.createElement("div");

        div.innerHTML = `
            <input type="text" value="Work on ${task.title}">
            <input type="date" value="${task.due_date}">
            <span>${step} min</span>
        `;

        breakdownList.appendChild(div);

        total -= step;
    }
}

// SAVE SUBTASKS
async function saveSubtasks() {

    let items = breakdownList.children;
    let inserts = [];

    for (let item of items) {

        let inputs = item.querySelectorAll("input");

        inserts.push({
            parent_id: currentTaskId,
            title: inputs[0].value,
            due_date: inputs[1].value,
            duration: parseInt(item.textContent),
            importance: currentTask.importance
        });
    }

    await client.from("subtasks").insert(inserts);

    breakdownScreen.classList.add("hidden");
    createScreen.classList.remove("hidden");

    await loadTasks();
}

// LOAD TASKS
async function loadTasks() {

    let { data } = await client
        .from("subtasks")
        .select("*")
        .eq("completed", false);

    tasks = data;

    tasks.sort((a,b) => {
        let d1 = new Date(a.due_date);
        let d2 = new Date(b.due_date);

        if (d1 - d2 !== 0) return d1 - d2;
        return b.importance - a.importance;
    });

    renderTasks();
}

// COMPLETE TASK
async function completeTask(id) {
    await client.from("subtasks")
        .update({ completed: true })
        .eq("id", id);

    await loadTasks();
}

// RENDER
function renderTasks() {

    taskList.innerHTML = "";

    tasks.forEach(t => {

        let div = document.createElement("div");
        div.className = "task";

        div.innerHTML = `
            <input type="checkbox" onclick="completeTask('${t.id}')">
            <strong>${t.title}</strong><br>
            Due: ${formatDate(t.due_date)}<br>
            Importance: ${t.importance}<br>
            ${t.duration} min
        `;

        taskList.appendChild(div);
    });
}

</script>

</body>
</html>
