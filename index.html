<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life GTD | Next Action Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root {
            --bg: #f3f4f6;
            --card: #ffffff;
            --primary: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --text: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 700px; padding: 40px 20px; }

        /* THE SPOTLIGHT */
        #spotlight {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .spotlight-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        .spotlight-task { font-size: 1.8rem; font-weight: 700; margin: 15px 0; display: block; }
        
        /* CARDS */
        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
        }

        button {
            background: var(--accent);
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        button.done-btn { background: #10b981; margin-top: 10px; padding: 10px 30px; }
        button.finish-btn { background: #64748b; margin-top: 10px; }

        /* TASK LISTING */
        .task-row {
            display: flex;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 5px solid #cbd5e1;
        }

        .task-row.high-priority { border-left-color: var(--danger); }
        .task-info { flex: 1; }
        .task-title { font-weight: 600; display: block; }
        .task-meta { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        
        .badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #f1f5f9;
            margin-right: 5px;
        }

        .hidden { display: none; }
        h2 { font-size: 1rem; color: #64748b; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .step-counter { color: var(--accent); font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <span class="spotlight-label">Current Next Action</span>
        <span id="spotlightTitle" class="spotlight-task">Scanning...</span>
        <div id="spotlightDetails" style="font-size: 0.9rem; opacity: 0.8;"></div>
        <button class="done-btn" onclick="completeSpotlight()">Done - Move to Next</button>
    </div>

    <div class="card" id="inputPanel">
        <h2>Capture New Project or Task</h2>
        <input id="title" placeholder="What's on your mind?" style="width:100%; margin-bottom:10px; box-sizing:border-box;">
        <div class="grid-inputs">
            <input type="date" id="dueDate">
            <select id="importance">
                <option value="1">Low (1)</option>
                <option value="5" selected>Med (5)</option>
                <option value="10">Critical (10)</option>
            </select>
            <select id="duration">
                <option value="5">Short (5m)</option>
                <option value="15">Medium (15m)</option>
                <option value="30">Long / Project (30m+)</option>
            </select>
        </div>
        <button onclick="handleAdd()" style="width:100%;">Process Entry</button>
    </div>

    <div class="card hidden" id="breakdownPanel" style="border: 2px solid var(--accent);">
        <h2 id="breakdownHeader" style="color:var(--accent)">Breaking Down Project</h2>
        <span class="step-counter" id="stepCounter">Step #1</span>
        <p id="breakdownInstructions" style="font-size:0.85rem; margin-bottom:15px;">What is the <strong>very next physical action</strong> required to move this forward?</p>
        
        <input id="subtaskTitle" placeholder="e.g., 'Draft email to Sarah'" style="width:100%; margin-bottom:10px; box-sizing:border-box;">
        
        <button onclick="addSubtask()" style="width:100%;">Add Step & Identify Next</button>
        <button class="finish-btn" onclick="finishBreakdown()" style="width:100%;">I've broken it down enough</button>
    </div>

    <h2>Action Inventory</h2>
    <div id="masterList"></div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let allTasks = [];
    
    // State for breakdown mode
    let projectContext = null;
    let stepCount = 1;

    window.onload = refresh;

    async function refresh() {
        const { data } = await client.from('subtasks').select('*').eq('completed', false);
        allTasks = data || [];
        
        // GTD Sort: Importance (High to Low), then Due Date
        allTasks.sort((a, b) => {
            if (b.importance !== a.importance) return b.importance - a.importance;
            return new Date(a.due_date) - new Date(b.due_date);
        });

        render();
    }

    function handleAdd() {
        const title = document.getElementById('title').value;
        const importance = parseInt(document.getElementById('importance').value);
        const duration = parseInt(document.getElementById('duration').value);
        const dueDate = document.getElementById('dueDate').value;

        if (!title || !dueDate) return alert("Title and Date are required!");

        if (duration >= 30) {
            // Enter Breakdown Mode
            projectContext = { title, importance, dueDate };
            stepCount = 1;
            
            document.getElementById('inputPanel').classList.add('hidden');
            document.getElementById('breakdownPanel').classList.remove('hidden');
            document.getElementById('breakdownHeader').innerText = `Breaking Down: ${title}`;
            updateStepCounter();
        } else {
            saveToDb(title, importance, duration, dueDate);
        }
    }

    function updateStepCounter() {
        document.getElementById('stepCounter').innerText = `Physical Action #${stepCount}`;
        document.getElementById('subtaskTitle').value = '';
        document.getElementById('subtaskTitle').focus();
    }

    async function addSubtask() {
        const subTitle = document.getElementById('subtaskTitle').value;
        if (!subTitle) return alert("What is the physical action?");

        // We save each subtask with a slightly declining importance 
        // to ensure the FIRST step entered stays at the top of the spotlight
        const adjustedImportance = Math.max(1, projectContext.importance - (stepCount * 0.1));

        await client.from('subtasks').insert([{
            title: subTitle,
            importance: adjustedImportance,
            duration: 10,
            due_date: projectContext.dueDate,
            completed: false
        }]);

        stepCount++;
        updateStepCounter();
        refresh(); // Refresh list in background
    }

    function finishBreakdown() {
        document.getElementById('inputPanel').classList.remove('hidden');
        document.getElementById('breakdownPanel').classList.add('hidden');
        document.getElementById('title').value = '';
        projectContext = null;
        refresh();
    }

    async function saveToDb(title, importance, duration, dueDate) {
        await client.from('subtasks').insert([{
            title, importance, duration, due_date: dueDate, completed: false
        }]);
        document.getElementById('title').value = '';
        refresh();
    }

    async function completeTask(id) {
        await client.from('subtasks').update({ completed: true }).eq('id', id);
        refresh();
    }

    async function completeSpotlight() {
        if (allTasks.length > 0) completeTask(allTasks[0].id);
    }

    function render() {
        const spotlightTitle = document.getElementById('spotlightTitle');
        const spotlightDetails = document.getElementById('spotlightDetails');
        const masterList = document.getElementById('masterList');
        
        masterList.innerHTML = '';

        if (allTasks.length === 0) {
            spotlightTitle.innerText = "Inbox Zero! ☕";
            spotlightDetails.innerText = "Everything is processed.";
            return;
        }

        const top = allTasks[0];
        spotlightTitle.innerText = top.title;
        spotlightDetails.innerText = `Priority: ${top.importance} | Due: ${top.due_date}`;

        allTasks.forEach(t => {
            const row = document.createElement('div');
            row.className = `task-row ${t.importance >= 8 ? 'high-priority' : ''}`;
            row.innerHTML = `
                <div class="task-info">
                    <span class="task-title">${t.title}</span>
                    <div class="task-meta">
                        <span class="badge">Imp: ${Math.round(t.importance)}</span>
                        <span class="badge">${t.duration}m</span>
                        <span>📅 ${t.due_date}</span>
                    </div>
                </div>
                <input type="checkbox" style="transform: scale(1.5)" onclick="completeTask('${t.id}')">
            `;
            masterList.appendChild(row);
        });
    }
</script>
</body>
</html>
