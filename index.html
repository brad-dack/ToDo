<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ActionStream | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root {
            --bg: #fff9ec; --ink: #1a1a1a;
            --yellow: #ffd23f; --teal: #00c2b8; --blue: #4d96ff; --green: #6bcb77; --orange: #ff9f45; --red: #ff5252;
            --shadow: 4px 4px 0 var(--ink);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Trebuchet MS', Verdana, -apple-system, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 14px; }
        .container { max-width: 500px; margin: auto; padding-bottom: 130px; }

        .card { background: white; border: 3px solid var(--ink); border-radius: 16px; padding: 18px; margin-bottom: 18px; box-shadow: var(--shadow); position: relative; }

        .hero { background: var(--yellow); }
        .hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
        .hero h1 { margin: 0 0 2px; font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; }
        .hero .sub { font-size: 0.78rem; font-weight: 700; margin-bottom: 16px; }
        .streak-chip { background: white; border: 2.5px solid var(--ink); border-radius: 10px; padding: 6px 10px; font-size: 0.7rem; font-weight: 900; box-shadow: 2px 2px 0 var(--ink); white-space: nowrap; }

        /* Vertical capacity bars */
        .week-bar { display: flex; gap: 6px; margin-bottom: 16px; }
        .day-cap { flex: 1; text-align: center; font-size: 0.62rem; font-weight: 900; cursor: pointer; }
        .day-cap .lbl { background: white; border: 2px solid var(--ink); border-radius: 8px; padding: 3px 0; display: block; margin-bottom: 4px; }
        .day-cap.today .lbl { background: var(--ink); color: var(--yellow); }
        .day-cap.has-override .lbl { border-color: var(--teal); box-shadow: 0 0 0 1.5px var(--teal); }
        .cap-bar { height: 52px; width: 100%; border-radius: 8px; background: white; border: 2px solid var(--ink); position: relative; overflow: hidden; }
        .cap-zone { position: absolute; bottom: 0; left: 0; width: 100%; background: #2f2f2f; }
        .cap-grad { position: absolute; left: 0; width: 100%; background: linear-gradient(to top, #8de8e0, #00897b); }
        .cap-cover { position: absolute; left: 0; width: 100%; background: white; }

        /* Up Next queue */
        .focus-card { background: white; border: 3px solid var(--ink); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
        .focus-eyebrow { font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; background: var(--ink); color: var(--yellow); padding: 3px 8px; border-radius: 6px; display: inline-block; }
        .focus-title { font-size: 1.15rem; font-weight: 900; margin: 10px 0 2px; }
        .focus-meta { font-size: 0.72rem; font-weight: 700; opacity: 0.65; margin-bottom: 14px; }
        .focus-actions { display: flex; gap: 10px; }
        .btn-big { flex: 1; height: 48px; border-radius: 12px; font-weight: 900; font-size: 0.9rem; border: 3px solid var(--ink); cursor: pointer; font-family: inherit; box-shadow: 3px 3px 0 var(--ink); }
        .btn-big:active { transform: translate(2px,2px); box-shadow: none; }
        .btn-go { background: var(--green); color: var(--ink); }
        .btn-skip { background: white; color: var(--ink); }
        .queue-peek { display: flex; align-items: center; gap: 10px; background: white; border: 2.5px solid var(--ink); border-radius: 12px; padding: 9px 12px; margin-bottom: 8px; font-size: 0.78rem; font-weight: 700; box-shadow: 2px 2px 0 var(--ink); }
        .queue-pos { background: var(--ink); color: white; font-size: 0.6rem; font-weight: 900; border-radius: 6px; padding: 2px 7px; flex-shrink: 0; }
        .queue-peek .qm { margin-left: auto; font-size: 0.65rem; opacity: 0.6; white-space: nowrap; }

        .section-title { font-size: 0.72rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin: 26px 4px 12px; display: inline-block; background: var(--ink); color: white; padding: 4px 10px; border-radius: 8px; transform: rotate(-1deg); }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.55rem; font-weight: 900; letter-spacing: 0.5px; margin-left: 6px; vertical-align: middle; border: 2px solid var(--ink); color: var(--ink); }
        .badge-overdue { background: var(--red); color: white; }
        .badge-atrisk { background: var(--orange); }

        .todo-item { display: flex; align-items: center; gap: 10px; padding: 14px; background: white; border: 3px solid var(--ink); border-radius: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
        .todo-item b { font-size: 0.88rem; }
        .todo-item small { font-weight: 700; opacity: 0.6; }
        .completed-item { opacity: 0.5; box-shadow: none; background: var(--bg); border-style: dashed; }
        .todo-overdue { background: #ffe5e5; }
        .todo-atrisk { background: #fff0dd; }

        /* Importance scale: one blue, 1 = lightest -> 10 = darkest */
        .imp-chip { width: 34px; height: 34px; border-radius: 10px; border: 2.5px solid var(--ink); font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 2px 2px 0 var(--ink); color: var(--ink); }
        .imp-1  { background: #eff6ff; }
        .imp-2  { background: #dbeafe; }
        .imp-3  { background: #bfdbfe; }
        .imp-4  { background: #93c5fd; }
        .imp-5  { background: #60a5fa; }
        .imp-6  { background: #3b82f6; color: white; }
        .imp-7  { background: #2563eb; color: white; }
        .imp-8  { background: #1d4ed8; color: white; }
        .imp-9  { background: #1e40af; color: white; }
        .imp-10 { background: #172554; color: white; }

        .btn-done { background: var(--green); color: var(--ink); width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; border: 2.5px solid var(--ink); box-shadow: 2px 2px 0 var(--ink); font-weight: 900; }
        .btn-done:active, .submit-btn:active, .nav-btn-add:active, .btn-push:active { transform: translate(2px,2px); box-shadow: none; }
        .btn-push { background: white; color: var(--ink); width: 42px; height: 42px; border-radius: 11px; font-size: 0.95rem; font-weight: 900; border: 2.5px solid var(--ink); cursor: pointer; box-shadow: 2px 2px 0 var(--ink); flex-shrink: 0; }
        /* Bigger tap targets for edit / delete on mobile */
        .btn-edit { background: white; border: 2.5px solid var(--ink); color: var(--ink); cursor: pointer; width: 42px; height: 42px; border-radius: 11px; font-size: 1.15rem; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 2px 2px 0 var(--ink); }
        .btn-edit:active { transform: translate(2px,2px); box-shadow: none; }
        .btn-bulk { background: var(--teal); color: var(--ink); border: 2.5px solid var(--ink); font-size: 0.62rem; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 900; box-shadow: 2px 2px 0 var(--ink); letter-spacing: 0.5px; }

        input, select { width: 100%; height: 50px; padding: 0 14px; border-radius: 12px; border: 3px solid var(--ink); font-size: 16px; margin-bottom: 12px; outline: none; background: white; font-family: inherit; font-weight: 700; box-sizing: border-box; min-width: 0; }
        textarea { width: 100%; padding: 12px 14px; border-radius: 12px; border: 3px solid var(--ink); font-size: 16px; margin-bottom: 12px; outline: none; background: white; font-family: inherit; font-weight: 700; resize: vertical; box-sizing: border-box; }
        textarea::placeholder { font-size: 0.8rem; font-weight: 600; }
        input:focus, select:focus, textarea:focus { box-shadow: 3px 3px 0 var(--teal); }
        input[type="date"] { min-width: 0; max-width: 200px; -webkit-appearance: none; appearance: none; height: 50px; line-height: normal; }
        input[type="date"]::-webkit-date-and-time-value { text-align: left; margin: 0; }
        input[type="date"]::-webkit-datetime-edit { padding: 0; }
        input[type="date"].full-date { max-width: none; }
        .submit-btn { background: var(--blue); color: white; width: 100%; height: 54px; border-radius: 14px; font-weight: 900; font-size: 1rem; border: 3px solid var(--ink); cursor: pointer; box-shadow: var(--shadow); font-family: inherit; letter-spacing: 0.5px; }
        .staged-item-wrap { position: relative; overflow: hidden; border-radius: 10px; margin-bottom: 8px; }
        .staged-item-wrap .delete-bg { position: absolute; inset: 0; background: var(--red); display: flex; align-items: center; justify-content: flex-end; padding-right: 16px; color: #fff; font-weight: 900; }
        .staged-item { background: var(--bg); padding: 10px 12px; border-radius: 10px; font-size: 0.8rem; border: 2px solid var(--ink); font-weight: 700; display: flex; align-items: center; gap: 8px; touch-action: pan-y; transition: transform 0.15s; position: relative; }
        .staged-item .drag-handle { cursor: grab; }
        .staged-item .staged-body { flex: 1; min-width: 0; }
        .staged-item .staged-delete { border: none; background: none; font-weight: 900; cursor: pointer; padding: 4px; font-size: 1rem; flex-shrink: 0; }
        .field-label { font-size: 0.62rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .page-header h2 { margin: 4px 0 18px; font-size: 1.5rem; font-weight: 900; }
        .page-header h2 span { background: var(--teal); color: var(--ink); padding: 2px 10px; border-radius: 10px; border: 3px solid var(--ink); display: inline-block; transform: rotate(-1.5deg); box-shadow: 3px 3px 0 var(--ink); }
        .recur-link { font-size: 0.85rem; color: var(--blue); text-decoration: none; font-weight: 800; cursor: pointer; display: inline-block; margin-bottom: 10px; }
        .deadline-ref { font-weight: 400; opacity: 0.7; font-size: 0.8rem; }
        .hidden { display: none; }

        /* ---- Themed modals ---- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(26,26,26,0.55); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 18px; }
        .modal-card { background: white; border: 3px solid var(--ink); border-radius: 18px; box-shadow: 6px 6px 0 var(--ink); padding: 20px; width: 100%; max-width: 420px; max-height: 86vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 14px; right: 14px; width: 32px; height: 32px; border-radius: 9px; border: 2.5px solid var(--ink); background: white; font-weight: 900; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 0 var(--ink); z-index: 1; }
        .modal-close:active { transform: translate(2px,2px); box-shadow: none; }
        .modal-title { margin: 0 0 14px; font-size: 1.2rem; font-weight: 900; }
        .modal-msg { font-size: 0.9rem; font-weight: 700; line-height: 1.5; margin: 0 0 4px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
        .modal-cancel { background: white; color: var(--ink); border: 3px solid var(--ink); border-radius: 14px; font-weight: 900; font-family: inherit; cursor: pointer; flex: 1; height: 54px; box-shadow: var(--shadow); }
        .modal-cancel:active { transform: translate(2px,2px); box-shadow: none; }

        /* ---- Undo toast ---- */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); max-width: 440px; width: calc(100% - 28px); background: var(--ink); color: white; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow); z-index: 1100; font-weight: 700; font-size: 0.85rem; }
        .toast button { background: var(--teal); color: var(--ink); border: 2.5px solid white; border-radius: 10px; font-weight: 900; font-family: inherit; cursor: pointer; padding: 8px 14px; flex-shrink: 0; }
        .toast button:active { transform: translate(1px,1px); }
        .toast button[data-act="dismiss"] { background: transparent; color: white; border: none; padding: 8px; }
        .imp-picker-btn { width: 100%; min-height: 50px; border-radius: 12px; border: 3px solid var(--ink); background: white; font-family: inherit; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 12px; text-align: left; }
        .imp-picker-btn span { min-width: 0; line-height: 1.3; }
        .imp-picker-btn:active { transform: translate(2px,2px); }
        .imp-pick-row { width: 100%; display: flex; align-items: center; gap: 12px; padding: 10px 12px; margin-bottom: 8px; border: 2.5px solid var(--ink); border-radius: 12px; background: white; cursor: pointer; font-family: inherit; font-size: 0.82rem; font-weight: 700; text-align: left; }
        .imp-pick-row:active { transform: translate(2px,2px); }
        .cap-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .cap-meter { position: relative; flex: 1; height: 16px; background: white; border: 2.5px solid var(--ink); border-radius: 8px; overflow: hidden; }
        .cap-meter-zone { position: absolute; left: 0; top: 0; height: 100%; background: #2f2f2f; }
        .cap-meter-grad { position: absolute; top: 0; height: 100%; background: linear-gradient(to right, #8de8e0, #00897b); }
        .cap-meter-cover { position: absolute; top: 0; right: 0; height: 100%; background: white; }
        .cap-label { font-size: 0.72rem; font-weight: 900; white-space: nowrap; }
        .cap-controls { background: var(--bg); border: 2px solid var(--ink); border-radius: 12px; padding: 12px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
        .qty-btn { background: white; border: 2.5px solid var(--ink); border-radius: 10px; height: 42px; font-weight: 900; font-family: inherit; cursor: pointer; box-shadow: 2px 2px 0 var(--ink); flex: 1; }
        .qty-btn:active { transform: translate(2px,2px); box-shadow: none; }
        .day-task { display: flex; align-items: center; gap: 8px; padding: 10px; border: 2px solid var(--ink); border-radius: 12px; margin-bottom: 8px; }

        /* ---- Bottom Nav: chunky toy bar ---- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: center; padding: 14px 16px 18px; pointer-events: none; }
        .bottom-nav-bar {
            pointer-events: all; max-width: 440px; width: 100%;
            background: white; border: 3px solid var(--ink); border-radius: 20px;
            display: flex; align-items: center; justify-content: space-around; padding: 8px 20px;
            box-shadow: 5px 5px 0 var(--ink);
        }
        .nav-btn { background: none; border: none; color: var(--ink); opacity: 0.45; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; cursor: pointer; padding: 8px 16px; font-family: inherit; }
        .nav-btn svg { width: 24px; height: 24px; }
        .nav-btn.active { opacity: 1; }
        .nav-btn.active::after { content: ''; width: 22px; height: 4px; background: var(--teal); border: 1.5px solid var(--ink); border-radius: 3px; margin-top: 2px; }
        .nav-btn-add {
            background: var(--teal); color: var(--ink); width: 58px; height: 58px; border-radius: 16px;
            border: 3px solid var(--ink); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin-top: -34px; box-shadow: 4px 4px 0 var(--ink);
        }
        .nav-btn-add svg { width: 28px; height: 28px; }

        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body>

<div class="container">

    <!-- ============ AUTH SCREEN ============ -->
    <div class="screen active" id="screen-auth">
        <div class="card hero">
            <h1 style="margin:0 0 4px;">Hello! 👋</h1>
            <div class="sub" id="authSubtitle">Log in to your account</div>
        </div>
        <div class="card">
            <span class="section-title" style="margin-top:0;">🔐 <span id="authModeLabel">Log In</span></span>
            <div id="authError" class="hidden" style="background:#ffe5e5; border:2px solid var(--ink); border-radius:10px; padding:10px 12px; margin-bottom:12px; font-size:0.8rem; font-weight:700;"></div>
            <label class="field-label">Email</label>
            <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
            <label class="field-label">Password</label>
            <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password">
            <button class="submit-btn" id="authSubmitBtn" onclick="submitAuth()">Log In</button>
            <a onclick="toggleAuthMode()" style="display:block; text-align:center; margin-top:14px; font-weight:800; color:var(--blue); cursor:pointer; font-size:0.85rem;" id="authToggleLink">Need an account? Sign up</a>
        </div>
    </div>

    <!-- ============ HOME SCREEN ============ -->
    <div class="screen" id="screen-home">
        <div class="card hero">
            <div class="hero-top">
                <div>
                    <h1 id="greeting">Hello! 👋</h1>
                    <div class="sub" id="todaySummary">Loading…</div>
                </div>
                <div class="streak-chip" id="streakChip">🔥 0 DAY STREAK</div>
            </div>
            <div id="weekBar" class="week-bar"></div>
            <div id="focusQueue"></div>
            <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:6px;">
                <button class="btn-bulk" id="smartRescheduleBtn" onclick="smartReschedule()">🧠 Smart Reschedule</button>
            </div>
        </div>

        <div class="card hidden" id="riskCard">
            <span class="section-title" style="margin-top:0;">⚠️ Projects At Risk</span>
            <div id="riskList"></div>
        </div>

        <span class="section-title">📋 Active ToDo List</span>
        <div style="position:relative; margin-bottom:12px;">
            <input id="todoSearch" placeholder="🔎 Search active tasks…" oninput="renderToDo()" style="margin-bottom:0; padding-right:38px; width:100%;">
            <button type="button" id="todoSearchClear" onclick="document.getElementById('todoSearch').value=''; renderToDo();" style="display:none; position:absolute; right:6px; top:50%; transform:translateY(-50%); background:transparent; border:none; font-weight:900; font-size:1.1rem; cursor:pointer; padding:6px;">✕</button>
        </div>
        <div id="masterToDo"></div>
        <span class="section-title">✅ Recently Completed</span>
        <div id="archivedToDo"></div>
    </div>

    <!-- ============ ADD PROJECT SCREEN ============ -->
    <div class="screen" id="screen-add">
        <div class="page-header"><h2><span>New Project 🚀</span></h2></div>

        <div class="card" id="goalCapture">
            <span class="section-title" style="margin-top:0;">🎯 Project Goal</span>

            <div style="background:#fff8e1; border:2px solid var(--ink); border-radius:12px; padding:12px; margin-bottom:14px;">
                <button type="button" class="btn-bulk" id="aiCaptureBtn" onclick="aiCapture()" style="margin-bottom:10px;">✨ Auto-fill with AI</button>
                <label class="field-label" style="display:block;">Describe it. Let AI work it out for you! Include deadline, importance, and a rough estimate of how long it'll take in your text.</label>
                <textarea id="nlCapture" rows="2" placeholder="e.g. service the car sometime next month, not urgent, probably an hour or two" style="margin-bottom:0;"></textarea>
            </div>

            <div style="background:#e8f4ff; border:2px solid var(--ink); border-radius:12px; padding:12px; margin-bottom:14px;">
                <span class="field-label" style="display:block; margin-bottom:8px;">Manual entry</span>
                <div><label class="field-label">Project Name</label><input id="mainGoal" placeholder="Project Name"></div>
                <div><label class="field-label">Deadline</label><input type="date" id="goalDate" class="full-date"></div>
                <div style="margin-bottom:0;">
                    <label class="field-label">Importance</label>
                    <input type="hidden" id="mainImp" value="5">
                    <button type="button" class="imp-picker-btn" id="mainImpBtn" style="margin-bottom:0;" onclick="openImportancePicker(parseInt(document.getElementById('mainImp').value), setMainImp)"></button>
                </div>
            </div>

            <a class="recur-link" onclick="toggleRecurrence()">⚡ Reoccurring: <span id="recurLabel">Never</span></a>
            <div id="recurrencePicker" class="hidden" style="padding:15px; background:var(--bg); border-radius:12px; border:2px solid var(--ink); margin-bottom:10px;">
                <label class="field-label">Repeat Every:</label>
                <select id="recurRule" onchange="document.getElementById('recurLabel').innerText = this.value || 'Never'">
                    <option value="">Never</option>
                    <option value="Every 2 Days">Every 2 Days</option>
                    <option value="Daily">Daily</option>
                    <option value="Weekly">Weekly</option>
                    <option value="Fortnightly">Fortnightly</option>
                    <option value="Monthly">Monthly</option>
                    <option value="Quarterly">Quarterly</option>
                    <option value="Bi-annually">Bi-annually</option>
                    <option value="Annually">Annually</option>
                </select>
            </div>

            <div style="display:flex; gap:12px; margin-top:10px;">
                <button class="submit-btn" style="flex:2; margin-top:0;" onclick="lockGoal()">Plan Steps →</button>
                <button type="button" onclick="clearGoalCapture()" style="background:white; color:var(--ink); flex:1; border-radius:14px; border:3px solid var(--ink); cursor:pointer; font-weight:900; font-family:inherit; box-shadow:var(--shadow);">Clear</button>
            </div>
        </div>

        <div class="card hidden" id="planningArea">
            <h3 id="displayGoal" style="margin:0 0 15px 0; font-size:1.05rem; font-weight:900;"></h3>
            <div style="background:#fff8e1; border:2px solid var(--ink); border-radius:12px; padding:12px; margin-bottom:14px;">
                <label class="field-label" style="display:block; margin-bottom:6px;">Instructions for AI (optional)</label>
                <textarea id="aiStepsInstructions" rows="2" placeholder="e.g. split it across evenings, start with research, keep steps under 10 mins" style="margin-bottom:10px;"></textarea>
                <button class="submit-btn" style="background:var(--teal); margin-bottom:0;" id="generateStepsBtn" onclick="generateSteps()">🧠 Generate Steps with AI</button>
            </div>
            <span class="field-label">Manual entry</span>
            <input id="stageTitle" placeholder="Action Title">
            <div style="display:grid; grid-template-columns: 35% 1fr; gap:12px; align-items:end;">
                <div style="min-width:0;"><label class="field-label">Mins (15 max)</label><input type="number" id="stageMins" max="15" value="15"></div>
                <div style="min-width:0;"><label class="field-label">Action Date</label><input type="date" id="stageDate" class="full-date"></div>
            </div>
            <button onclick="addToStaging()" style="background:var(--green); color:var(--ink); width:100%; height:50px; border-radius:12px; font-weight:900; margin-bottom:15px; border:3px solid var(--ink); cursor:pointer; box-shadow:var(--shadow); font-family:inherit;">+ Add to Sequence</button>
            <div id="stagedList" style="margin-bottom:15px;"></div>
            <div style="display:flex; gap:12px;">
                <button onclick="finalisePlanning()" class="submit-btn" style="flex:2">Commit! 🎉</button>

    const parseDateUTC = (dateStr) => {

    const addMonths = (dateStr, months) => {
        const dt = parseDateUTC(dateStr);

    async function computeStreak() {
        const { data } = await client.from('subtasks').select('created_at,updated_at');
        if (!data) return 0;
        const activeDates = new Set();
        data.forEach(r => {
            if (r.created_at) activeDates.add(localDateStr(new Date(r.created_at)));
            if (r.updated_at) activeDates.add(localDateStr(new Date(r.updated_at)));
        });
        let streak = 0;
        let cursor = localDateStr();
        while (activeDates.has(cursor)) {
            streak++;
            cursor = addDays(cursor, -1);
        }
        return streak;
    }

    function computeProjectStates() {
        projectStates = {}; projectNames = {};
        const todayStr = localDateStr();

        const byProject = {};
        for (const t of masterTasks) {
            if (!t.project_id) continue;
            if (!byProject[t.project_id]) byProject[t.project_id] = { tasks: [], goal_deadline: t.goal_deadline };
            byProject[t.project_id].tasks.push(t);
            if (!projectNames[t.project_id] && t.title) {
                const idx = t.title.indexOf(':');
                projectNames[t.project_id] = idx > 0 ? t.title.slice(0, idx) : t.title;
            }
        }

        for (const [pid, info] of Object.entries(byProject)) {
            const deadline = info.goal_deadline;
            if (!deadline) { projectStates[pid] = 'normal'; continue; }

            if (deadline < todayStr) { projectStates[pid] = 'overdue'; continue; }

            const projectMinutes = info.tasks.reduce((s,t) => s + t.duration, 0);
            let pool = 0, cursor = todayStr;
            while (cursor <= deadline) {
                const limit = dayLimit(cursor, 0);
                const otherLoad = masterTasks
                    .filter(t => t.due_date === cursor && t.project_id !== pid)
                    .reduce((s,t) => s + t.duration, 0);
                pool += Math.max(0, limit - otherLoad);
                cursor = addDays(cursor, 1);
            }
            projectStates[pid] = projectMinutes > pool ? 'at-risk' : 'normal';
        }
    }

    const stateBadge = (pid) => {
        const s = projectStates[pid];

    function hasCapacity(dateStr, taskDuration, ignoreTaskId = null) {
        const limit = dayLimit(dateStr);

            .reduce((s, t) => s + t.duration, 0);
        return (currentLoad + taskDuration) <= limit;
    }

                <div style="min-width:0;"><label class="field-label">Date</label><input type="date" id="edit-staged-date" value="${esc(t.due_date)}" max="${esc(activeGoal.date)}"></div>
            </div>

                <button class="modal-cancel">Cancel</button>

            </div>`;
        const m = openModal(node);
        node.querySelector('.modal-cancel').onclick = m.close;
        node.querySelector('#edit-staged-save').onclick = () => {
            const title = node.querySelector('#edit-staged-title').value.trim();

            if (!title) return uiAlert("Action title required");
            if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return uiAlert("Action date required");
            if (!Number.isFinite(duration) || duration <= 0) return uiAlert("Minutes must be a positive number");
            if (duration > 15) return uiAlert("Max 15 mins per action");
            if (date > activeGoal.date) return uiAlert("Action date past deadline");

            const stagedLoad = stagingTasks.filter((s, idx) => idx !== i && s.due_date === date).reduce((s,x) => s + x.duration, 0);
            if (!hasCapacity(date, duration + stagedLoad)) return uiAlert("Day is at capacity!");

            stagingTasks[i] = { title, duration, due_date: date };
            renderStaging();
            m.close();
        };
    }

    function attachSwipeHandlers() {
        document.querySelectorAll('#stagedList .staged-item').forEach(el => {
            let startX = null, dx = 0;
            el.addEventListener('pointerdown', e => { startX = e.clientX; el.style.transition = 'none'; });
            el.addEventListener('pointermove', e => {
                if (startX === null) return;
                dx = Math.min(0, e.clientX - startX);
                el.style.transform = `translateX(${dx}px)`;
            });
            const end = () => {
                if (startX === null) return;
                el.style.transition = 'transform 0.15s';
                if (dx < -60) {
                    el.style.transform = 'translateX(-100%)';
                    el.addEventListener('transitionend', () => removeStaged(+el.dataset.idx), { once: true });
                } else {
                    el.style.transform = 'translateX(0)';
                }
                startX = null; dx = 0;
            };
            el.addEventListener('pointerup', end);
            el.addEventListener('pointerleave', end);
        });
    }

    async function finalisePlanning() {
        const toInsert = stagingTasks.map((t, idx) => ({
            title: `${activeGoal.goal}: ${t.title}`,

        const { error } = await client.from('subtasks').insert(toInsert);

        } else {

            document.getElementById('goalDate').value = '';
            document.getElementById('recurRule').value = '';

    async function pushTask(id) {
        const t = masterTasks.find(task => task.id == id);
        if (!t) return;
        const targetDateStr = addDays(t.due_date, 1);

        if (!hasCapacity(targetDateStr, t.duration, t.id)) return uiAlert(`${formatDate(targetDateStr)} is already at capacity!`);

        if (t.goal_deadline && targetDateStr > t.goal_deadline) {
            const ok = await uiConfirm("Do you really want to do this - you set this date for a reason! Pushing this task will also push the project deadline back a day.", { title: "Past project deadline", okLabel: "Push anyway" });
            if (!ok) return;

            const newDeadline = addDays(t.goal_deadline, 1);
            const { error } = await dbCall(client.from('subtasks').update({ due_date: targetDateStr, goal_deadline: newDeadline, updated_at: new Date().toISOString() }).eq('id', id), "Push");
            if (error) return;
            if (t.project_id) {
                await dbCall(client.from('subtasks').update({ goal_deadline: newDeadline, updated_at: new Date().toISOString() }).eq('project_id', t.project_id).neq('id', id), "Push deadline");
            }
            return refresh();
        }

        const { error } = await dbCall(client.from('subtasks').update({ due_date: targetDateStr, updated_at: new Date().toISOString() }).eq('id', id), "Push");
        if (!error) refresh();
    }

    async function completeTask(id) {
        const task = masterTasks.find(t => t.id == id);
        const { error } = await dbCall(client.from('subtasks').update({ completed: true, updated_at: new Date().toISOString() }).eq('id', id), "Complete");
        if (error) return;

        if (task?.recurrence_rule) {
            const { data } = await client.from('subtasks').select('id').eq('project_id', task.project_id).eq('completed', false);
            if (!data || data.length === 0) await handleRecurrence(task);
        }
        refresh();
    }

    async function handleRecurrence(task) {
        if (!RECUR_OFFSETS[task.recurrence_rule]) return;
        const { data: templates, error } = await client.from('subtasks').select('*').eq('project_id', task.project_id);
        if (error || !templates) { uiAlert("Recurrence clone failed: " + (error?.message || "no rows")); return; }
        const newProjId = 'proj_' + Date.now();

        const newBatch = templates.map(t => {
            const { id, created_at, updated_at, ...data } = t;
            return {
                ...data,
                due_date: shiftByRule(t.due_date, task.recurrence_rule),
                goal_deadline: t.goal_deadline ? shiftByRule(t.goal_deadline, task.recurrence_rule) : null,
                project_id: newProjId,
                completed: false
            };
        });
        await dbCall(client.from('subtasks').insert(newBatch), "Recurrence clone");
    }

    async function adjustOverride(dateStr, delta, node) {
        const next = Math.max(0, dayLimit(dateStr) + delta);

        if (delta < 0) {
            const dayTasks = masterTasks.filter(t => t.due_date === dateStr).sort((a,b) => a.importance - b.importance);
            const load = dayTasks.reduce((s,t) => s + t.duration, 0);
            if (load > next) {
                let excess = load - next;
                const toPush = [];
                for (const t of dayTasks) {
                    if (excess <= 0) break;
                    toPush.push(t);
                    excess -= t.duration;
                }
                const ok = await uiConfirm(
                    `Reducing capacity to ${next}m means today's load (${load}m) is now over capacity. Push ${toPush.length} task${toPush.length === 1 ? '' : 's'} (lowest importance first) to tomorrow?`,
                    { title: 'Over Capacity', okLabel: 'Push to Tomorrow' }
                );
                if (!ok) return;

                const tomStr = addDays(dateStr, 1);
                for (const t of toPush) {
                    if (t.goal_deadline && tomStr > t.goal_deadline) { uiAlert(`Couldn't push "${t.title}": past project deadline.`); continue; }
                    if (!hasCapacity(tomStr, t.duration, t.id)) { uiAlert(`Couldn't push "${t.title}": tomorrow is at capacity.`); continue; }
                    await dbCall(client.from('subtasks').update({ due_date: tomStr, updated_at: new Date().toISOString() }).eq('id', t.id), "Push");
                }
            }
        }

        const { error } = await dbCall(client.from('capacity_overrides').upsert({ date: dateStr, limit_override: next }), "Set capacity");
        if (error) return;
        await refresh();
        renderDayModalBody(dateStr, node);
    }

    async function resetOverride(dateStr, node) {
        const { error } = await dbCall(client.from('capacity_overrides').delete().eq('date', dateStr), "Reset capacity");
        if (error) return;
        await loadOverrides();
        computeProjectStates(); renderDashboard(); renderToDo();
        renderDayModalBody(dateStr, node);
    }

    function renderDashboard() {
        const todayStr = localDateStr();
        const dayLabels = ['S','M','T','W','T','F','S'];
        const dayKeys = ['sun','mon','tue','wed','thu','fri','sat'];

        const hour = new Date().getHours();
        const greeting = hour < 12 ? 'Good morning! ☀️' : hour < 18 ? 'Good afternoon! 👋' : 'Good evening! 🌙';
        document.getElementById('greeting').innerText = greeting;

        const todayTasks = masterTasks.filter(t => t.due_date === todayStr);
        const todayLoad = todayTasks.reduce((s,t) => s + t.duration, 0);
        const todayLimit = dayLimit(todayStr);
        const remaining = Math.max(0, todayLimit - todayLoad);
        document.getElementById('todaySummary').innerText = `${todayTasks.length} action${todayTasks.length===1?'':'s'} today · ${remaining} min${remaining===1?'':'s'} left in the tank`;

        document.getElementById('streakChip').innerText = `🔥 ${streakCount} DAY STREAK`;

        const bar = document.getElementById('weekBar');
        bar.innerHTML = Array.from({length: 7}, (_, i) => {
            const dateStr = addDays(todayStr, i);
            const dow = dayOfWeek(dateStr);
            const load = masterTasks.filter(t => t.due_date === dateStr).reduce((s, t) => s + t.duration, 0);
            const limit = dayLimit(dateStr);
            // 960 awake mins/day. A capacity minute is "worth" 5x a non-capacity minute,
            // so the dark grey (life) and white/colour (capacity) zones split accordingly.
            const AWAKE_MINS = 960, WEIGHT = 12.5;
            const capPortion = limit > 0 ? (limit * WEIGHT) / (limit * WEIGHT + (AWAKE_MINS - limit)) : 0;
            const greyPct = (1 - capPortion) * 100;
            const zonePct = capPortion * 100;
            const loadFrac = limit ? Math.min(1, load / limit) : 0;
            const fillPct = zonePct * loadFrac;
            const coverPct = zonePct - fillPct;
            const zone = `<div class="cap-zone" style="height:${greyPct}%;"></div>`;
            const grad = zonePct > 0 ? `<div class="cap-grad" style="height:${zonePct}%; bottom:${greyPct}%;"></div>` : '';
            const cover = coverPct > 0 ? `<div class="cap-cover" style="height:${coverPct}%; bottom:${greyPct + fillPct}%;"></div>` : '';
            const fill = grad + cover;
            const cls = `day-cap${i === 0 ? ' today' : ''}${dateStr in capacityOverrides ? ' has-override' : ''}`;
            return `<div class="${cls}" data-date="${dateStr}"><span class="lbl">${dayLabels[dow]}</span><div class="cap-bar">${zone}${fill}</div></div>`;
        }).join('');

        const atRisk = Object.entries(projectStates).filter(([,s]) => s === 'at-risk');
        document.getElementById('riskCard').classList.toggle('hidden', atRisk.length === 0);
        document.getElementById('riskList').innerHTML = atRisk.map(([pid]) => `
            <div class="day-task" style="flex-wrap:wrap;">
                <div style="flex:1; min-width:0;"><b>${esc(projectNames[pid])}</b></div>
                ${recoveryAttempted.has(pid)
                    ? `<small style="width:100%; opacity:0.7;">Already rebalanced as much as possible. To fix this, extend the deadline, lower its importance, or remove some steps.</small>`
                    : `<button class="btn-bulk" onclick="getRecoveryPlan('${pid}', this)">🧠 Recovery Plan</button>`}
            </div>
        `).join('');

        renderQueue();
    }

    const splitTitle = (title) => {
        const idx = title.indexOf(':');
        return idx > 0 ? { proj: title.slice(0, idx), name: title.slice(idx + 2) } : { proj: '', name: title };
    };

    function renderQueue() {
        const queue = document.getElementById('focusQueue');
        if (!masterTasks.length) {
            queue.innerHTML = `<div class="focus-card"><span class="focus-eyebrow">▶ Up Next</span><div class="focus-title">All clear! 🎉</div><div class="focus-meta">No active tasks.</div></div>`;
            return;
        }
        const [first, second, third] = masterTasks;
        const f = splitTitle(first.title);
        let html = `<div class="focus-card">
            <span class="focus-eyebrow">▶ Up Next</span>
            <div class="focus-title">${esc(f.name)}</div>
            <div class="focus-meta">${esc(f.proj)}${stateBadge(first.project_id)} · ${first.duration}m · due ${formatDate(first.due_date)}</div>
            <div class="focus-actions">
                <button class="btn-big btn-go" data-id="${esc(first.id)}" data-act="complete">Done ✓</button>
                <button class="btn-big btn-skip" data-id="${esc(first.id)}" data-act="push">Push →</button>
            </div>
        </div>`;
        [[second, '2ND'], [third, '3RD']].forEach(([t, label]) => {
            if (!t) return;
            html += `<div class="queue-peek"><span class="queue-pos">${label}</span><span style="flex:1; min-width:0;">${esc(t.title)}${stateBadge(t.project_id)}</span><span class="qm">${t.duration}m</span></div>`;
        });
        queue.innerHTML = html;
    }

    function renderToDo() {
        const query = (document.getElementById('todoSearch')?.value || '').trim().toLowerCase();
        const clearBtn = document.getElementById('todoSearchClear');
        if (clearBtn) clearBtn.style.display = query ? 'block' : 'none';
        const tasks = query ? masterTasks.filter(t => t.title.toLowerCase().includes(query)) : masterTasks;
        if (query && tasks.length === 0) {
            document.getElementById('masterToDo').innerHTML = `<p style="opacity:0.6; font-weight:700; text-align:center;">No matches for "${esc(query)}"</p>`;
            return;
        }
        document.getElementById('masterToDo').innerHTML = tasks.map(t => {
            const impClass = `imp-${Math.min(10, Math.max(1, parseInt(t.importance) || 1))}`;
            return `
            <div class="todo-item${stateRowClass(t.project_id)}">
                <div class="imp-chip ${impClass}">${esc(t.importance)}</div>
                <div style="flex:1; min-width:0;">
                    <b>${esc(t.title)}</b>${stateBadge(t.project_id)}<br>
                    <small>${formatDate(t.due_date)} • ${t.duration}m</small>
                </div>
                <div style="display:flex; gap:6px; align-items:center;">
                    <button class="btn-edit" style="color:var(--red)" data-id="${esc(t.id)}" data-act="delete">✕</button>
                    <button class="btn-edit" data-id="${esc(t.id)}" data-act="edit">✎</button>
                    <button class="btn-done" data-id="${esc(t.id)}" data-act="complete">✓</button>
                </div>
            </div>`;
        }).join('');
    }

    function renderArchived(tasks) {
        document.getElementById('archivedToDo').innerHTML = tasks.map(t =>
            `<div class="todo-item completed-item"><div style="flex:1; min-width:0;"><strike>${esc(t.title)}</strike></div><button class="btn-edit" data-id="${esc(t.id)}" data-act="uncomplete">⟲</button></div>`
        ).join('');
    }

    const ACTIONS = { push: pushTask, complete: completeTask, delete: deleteTask, edit: editTask, uncomplete: uncompleteTask };
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-act]');
        if (!btn) return;
        const fn = ACTIONS[btn.dataset.act];
        if (fn) fn(btn.dataset.id);
    });

    function toggleRecurrence() {
        document.getElementById('recurrencePicker').classList.toggle('hidden');
    }

    /* One-time Monday-morning popup summarising last week. Shown at most once per week,
       tracked locally so it doesn't linger as stale info on the dashboard. */
    async function loadWeeklyReview() {
        try {
            if (dayOfWeek(localDateStr()) !== 1) return; // 1 = Monday

            const weekStart = getWeekStart(localDateStr());
            if (localStorage.getItem('weeklyReviewShown') === weekStart) return;

            const { data: cached } = await client.from('weekly_reviews').select('summary').eq('week_start', weekStart).maybeSingle();
            let summary = cached?.summary;

            if (!summary) {
                const prevWeekStart = addDays(weekStart, -7);
                const completedCount = (await client.from('subtasks').select('id', { count: 'exact', head: true }).eq('completed', true).gte('updated_at', prevWeekStart).lt('updated_at', weekStart)).count || 0;
                const activeCount = masterTasks.length;
                const states = Object.values(projectStates);
                const overdueCount = states.filter(s => s === 'overdue').length;
                const atRiskCount = states.filter(s => s === 'at-risk').length;

                if (completedCount === 0 && activeCount === 0) { localStorage.setItem('weeklyReviewShown', weekStart); return; }

                const { data, error } = await client.functions.invoke('ai-weekly-review', {
                    body: { completedCount, overdueCount, atRiskCount, activeCount, weekStart: prevWeekStart, weekEnd: addDays(prevWeekStart, 6) }
                });
                if (error || !data?.summary) return;

                summary = data.summary;
                await client.from('weekly_reviews').upsert({ week_start: weekStart, summary });
            }

            const node = document.createElement('div');
            node.innerHTML = `
                <h3 class="modal-title">📊 Your Week</h3>
                <p class="modal-msg">${esc(summary)}</p>
                <div class="modal-actions"><button class="submit-btn" style="flex:1;">Got it</button></div>`;
            const m = openModal(node, { dismissable: false });
            node.querySelector('.submit-btn').onclick = m.close;
            localStorage.setItem('weeklyReviewShown', weekStart);
        } catch {}
    }

    async function aiCapture() {
        const text = document.getElementById('nlCapture').value.trim();
        if (!text) return alert("Describe your project first");

        const btn = document.getElementById('aiCaptureBtn');
        const originalLabel = btn.innerText;
        btn.disabled = true;
        btn.innerText = "✨ Thinking…";

        try {
            const { data, error } = await client.functions.invoke('ai-capture', { body: { text, today: localDateStr() } });
            if (error) return alert("AI capture failed: " + error.message);

            if (data.title) document.getElementById('mainGoal').value = data.title;
            if (data.deadline && data.deadline >= localDateStr()) document.getElementById('goalDate').value = data.deadline;
            if (data.importance) setMainImp(data.importance);
            if (data.recurrence && VALID_RULES.includes(data.recurrence)) {
                document.getElementById('recurRule').value = data.recurrence;
                document.getElementById('recurLabel').innerText = data.recurrence;
                document.getElementById('recurrencePicker').classList.remove('hidden');
            }
        } catch (err) {
            alert("AI capture failed: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = originalLabel;
        }
    }

    function scheduleStagedSteps(steps, deadline) {
        const today = localDateStr();
        for (const step of steps) {
            let d = step.due_date && step.due_date >= today ? step.due_date : today;
            if (d > deadline) d = deadline;
            while (true) {
                const stagedLoad = stagingTasks.filter(t => t.due_date === d).reduce((s,t) => s + t.duration, 0);
                if (hasCapacity(d, step.duration + stagedLoad) || d >= deadline) break;
                d = addDays(d, 1);
            }
            stagingTasks.push({ title: step.title, duration: Math.min(15, Math.max(1, parseInt(step.duration) || 15)), due_date: d });
        }
    }

    function buildCapacityPayload(excludeProjectId, windowEnd) {
        const today = localDateStr();
        const loadByDate = {};
        for (const t of masterTasks) {
            if (t.project_id === excludeProjectId) continue;
            if (t.due_date >= today && t.due_date <= windowEnd) {
                loadByDate[t.due_date] = (loadByDate[t.due_date] || 0) + t.duration;
            }
        }
        const existingLoad = Object.entries(loadByDate).map(([date, minutes]) => ({ date, minutes }));

        const overrides = Object.entries(capacityOverrides)
            .filter(([date]) => date >= today && date <= windowEnd)
            .map(([date, limit]) => ({ date, limit }));

        const dayKeys = ['sun','mon','tue','wed','thu','fri','sat'];
        const dayLimits = {};
        dayKeys.forEach(d => dayLimits[d] = settings[`${d}_limit`] ?? 45);

        return { today, dayLimits, existingLoad, overrides };
    }

    async function generateSteps() {
        const goal = activeGoal.goal;
        const deadline = activeGoal.date;
        const instructions = document.getElementById('aiStepsInstructions')?.value?.trim() || '';

        const btn = document.getElementById('generateStepsBtn');
        const originalLabel = btn.innerText;
        btn.disabled = true;
        btn.innerText = "🧠 Thinking…";

        try {
            const today = localDateStr();
            const windowEnd = deadline < addDays(today, 90) ? deadline : addDays(today, 90);
            const { dayLimits, existingLoad, overrides } = buildCapacityPayload(null, windowEnd);

            const { data, error } = await client.functions.invoke('ai-project-brain', {
                body: { goal, deadline, today, dayLimits, existingLoad, overrides, instructions }
            });
            if (error) return uiAlert("Smart breakdown failed: " + error.message);
            if (!data?.steps?.length) return uiAlert("AI couldn't come up with any steps - try a more specific goal.");

            if (data.importance) setMainImp(data.importance);
            scheduleStagedSteps(data.steps, deadline);
            renderStaging();
        } catch (err) {
            uiAlert("Smart breakdown failed: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = originalLabel;
        }
    }

    async function applyMoves(moves, { undoable = true } = {}) {
        const previous = [];
        let count = 0, failed = 0;
        for (const m of moves) {
            const t = masterTasks.find(t => t.id == m.id);
            const prevDate = t?.due_date;
            const { error } = await client.from('subtasks').update({ due_date: m.due_date, updated_at: new Date().toISOString() }).eq('id', m.id);
            if (error) { failed++; continue; }
            if (t) t.due_date = m.due_date;
            if (prevDate && prevDate !== m.due_date) previous.push({ id: m.id, due_date: prevDate });
            count++;
        }
        if (failed) uiAlert(`${count} task(s) rescheduled, ${failed} failed.`);
        await refresh();
        if (undoable && previous.length) showUndoToast(`Rescheduled ${previous.length} task${previous.length === 1 ? '' : 's'}.`, previous);
    }

    function showUndoToast(message, previousMoves) {
        document.querySelectorAll('.toast').forEach(t => t.remove());
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<span style="flex:1;">${esc(message)}</span><button data-act="undo">Undo</button><button data-act="dismiss">✕</button>`;
        document.body.appendChild(toast);
        toast.querySelector('[data-act="undo"]').onclick = async () => {
            toast.remove();
            await applyMoves(previousMoves, { undoable: false });
        };
        toast.querySelector('[data-act="dismiss"]').onclick = () => toast.remove();
    }

    async function smartReschedule() {
        const btn = document.getElementById('smartRescheduleBtn');
        const originalLabel = btn.innerText;
        btn.disabled = true;
        btn.innerText = "🧠 Thinking…";

        try {
            const today = localDateStr();
            const tasks = masterTasks
                .filter(t => t.due_date <= addDays(today, 30))
                .slice(0, 30)
                .map(t => ({ id: t.id, title: t.title, duration: t.duration, due_date: t.due_date, goal_deadline: t.goal_deadline || null, importance: t.importance }));

            if (!tasks.length) return uiAlert("Nothing needs rescheduling right now.");

            let windowEnd = addDays(today, 90);
            for (const t of tasks) {
                if (t.goal_deadline && t.goal_deadline < windowEnd) windowEnd = t.goal_deadline;
            }
            if (windowEnd < addDays(today, 14)) windowEnd = addDays(today, 14);
            const { dayLimits, existingLoad, overrides } = buildCapacityPayload(null, windowEnd);

            const { data, error } = await client.functions.invoke('ai-reschedule', {
                body: { today, tasks, dayLimits, existingLoad, overrides }
            });
            if (error) return uiAlert("Smart reschedule failed: " + error.message);
            if (!data?.moves?.length) return uiAlert("Nothing needs rescheduling right now.");

            const ok = await uiConfirm(data.summary || `Reschedule ${data.moves.length} task(s)?`, { title: "Smart Reschedule", okLabel: "Apply" });
            if (ok) await applyMoves(data.moves);
        } catch (err) {
            uiAlert("Smart reschedule failed: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = originalLabel;
        }
    }

    async function getRecoveryPlan(projectId, btn) {
        const steps = masterTasks
            .filter(t => t.project_id === projectId)
            .map(t => ({ id: t.id, title: t.title, duration: t.duration, due_date: t.due_date }));
        if (!steps.length) return;

        const goal = projectNames[projectId] || 'Project';
        const deadline = masterTasks.find(t => t.project_id === projectId)?.goal_deadline;
        const today = localDateStr();
        const windowEnd = deadline && deadline < addDays(today, 90) ? deadline : addDays(today, 90);
        const { dayLimits, existingLoad, overrides } = buildCapacityPayload(projectId, windowEnd);

        const originalLabel = btn?.innerText;
        if (btn) { btn.disabled = true; btn.innerText = '🧠 Thinking…'; }

        try {
            const { data, error } = await client.functions.invoke('ai-project-recovery', {
                body: { goal, deadline, today, steps, dayLimits, existingLoad, overrides }
            });
            if (error) return uiAlert("Recovery plan failed: " + error.message);
            if (!data?.moves?.length) {
                recoveryAttempted.add(projectId);
                renderDashboard();
                return uiAlert(data?.summary || "AI couldn't find a way to recover this project's schedule.");
            }

            const ok = await uiConfirm(data.summary || `Reschedule ${data.moves.length} step(s)?`, { title: "Recovery plan for " + goal, okLabel: "Apply" });
            if (ok) {
                await applyMoves(data.moves);
                if (projectStates[projectId] === 'at-risk') {
                    recoveryAttempted.add(projectId);
                    renderDashboard();
                }
            }
        } catch (err) {
            uiAlert("Recovery plan failed: " + err.message);
        } finally {
            if (btn) { btn.disabled = false; btn.innerText = originalLabel; }
        }
    }

    function populateSettingsForm() {
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(d => {
            document.getElementById(`set-${d}`).value = settings[`${d}_limit`] ?? '';
        });
        if (settings.timezone) document.getElementById('set-tz').value = settings.timezone;
    }

    async function saveSettings() {
        const n = { timezone: document.getElementById('set-tz').value };
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(d => n[`${d}_limit`] = parseInt(document.getElementById(`set-${d}`).value) || 0);
        const { error } = await dbCall(client.from('user_settings').upsert(n), "Save settings");
        if (error) return;
        settings = n;
        showScreen('home');
        refresh();
    }

    function cancelPlanning() {
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');

        stagingTasks = [];
        document.getElementById('stagedList').innerHTML = '';
        document.getElementById('stageTitle').value = '';
        document.getElementById('stageMins').value = '15';
        document.getElementById('stageDate').value = '';
        document.getElementById('aiStepsInstructions').value = '';
    }
</script>
