<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionStream | Goal-Action Logic</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .container { width: 100%; max-width: 700px; margin: auto; padding: 20px; }
        
        /* SPOTLIGHT */
        #spotlight {
            background: var(--primary); color: white; padding: 35px; border-radius: 24px; 
            margin-bottom: 25px; text-align: center; box-shadow: 0 15px 30px -5px rgba(0,0,0,0.2);
        }
        .spotlight-task { font-size: 1.8rem; font-weight: 800; margin: 10px 0; line-height: 1.2; }
        
        /* FORM STYLING */
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .goal-header { border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); color: white; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        
        /* ACTION LIST */
        .task-item { 
            display: flex; align-items: center; padding: 14px; background: white; 
            border-radius: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0;
        }
        .importance-pill { 
            background: var(--primary); color: white; padding: 4px 10px; 
            border-radius: 6px; font-weight: 800; margin-right: 15px; font-size: 0.9rem;
        }
        .task-info { flex: 1; }
        .task-meta { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        
        .history-item { opacity: 0.6; display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; }
        .hidden { display: none; }
        .sub-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <div style="font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1.5px;">Current Focus</div>
        <div id="spotlightTitle" class="spotlight-task">...</div>
        <div id="spotlightDetails" style="font-size: 0.85rem; opacity: 0.8;"></div>
        <button onclick="completeSpotlight()" style="background: #fff; color: var(--primary); margin-top: 15px; width: 100%; border-radius: 12px;">Complete Task</button>
    </div>

    <div class="card">
        <div class="goal-header">
            <span class="sub-label">Step 1: Define Primary Goal</span>
            <div style="display: grid; grid-template-columns: 2fr 0.8fr 0.8fr; gap: 10px;">
                <input id="mainGoal" placeholder="Goal (e.g. Tax Return)">
                <select id="mainImp">
                    <option value="" disabled selected>Imp (1-10)</option>
                    </select>
                <input type="date" id="goalDate">
            </div>
        </div>
        
        <div>
            <span class="sub-label">Step 2: Break into 15m Actions</span>
            <input id="stepTitle" placeholder="Physical Action (e.g. 'Gather receipts')" style="margin-bottom:10px;">
            <div class="grid">
                <input type="date" id="stepDate">
                <input type="number" id="stepMins" placeholder="Mins (Max 15)">
                <button onclick="addStep()" style="background: #10b981;">Add to List</button>
            </div>
        </div>
    </div>

    <h3 style="font-size: 0.8rem; color: #64748b; text-transform: uppercase;">Action Inventory (By Priority)</h3>
    <div id="inventory"></div>

    <div id="historySection" class="card hidden">
        <h3 style="font-size: 0.8rem; color: #64748b; text-transform: uppercase;">Undo</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let tasks = [];

    window.onload = () => {
        // Populate importance dropdown 1-10
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        refresh();
    };

    function formatDate(iso) {
        if (!iso) return "N/A";
        const [y, m, d] = iso.split("-");
        return `${d}/${m}/${y.slice(-2)}`;
    }

    async function refresh() {
        const { data } = await client.from('subtasks').select('*').eq('completed', false);
        tasks = data || [];
        
        const now = new Date();
        tasks.sort((a, b) => {
            const score = (t) => {
                const diff = Math.max(0.1, (new Date(t.due_date) - now) / (1000 * 60 * 60 * 24));
                return t.importance / (diff + 0.5); 
            };
            return score(b) - score(a);
        });

        render();
        renderHistory();
    }

    async function addStep() {
        const goal = document.getElementById('mainGoal').value;
        const imp = parseInt(document.getElementById('mainImp').value);
        const gDate = document.getElementById('goalDate').value;
        
        const sTitle = document.getElementById('stepTitle').value;
        const sDate = document.getElementById('stepDate').value || gDate;
        const sMins = parseInt(document.getElementById('stepMins').value);

        // Validations
        if (!goal || !imp || !gDate || !sTitle || !sMins) return alert("Missing Goal or Step info!");
        if (sMins > 15) return alert("Task must be 15 mins or less!");
        if (new Date(sDate) > new Date(gDate)) return alert("Sub-task cannot be later than the Primary Goal date!");

        await client.from('subtasks').insert([{
            title: `${goal}: ${sTitle}`,
            importance: imp,
            duration: sMins,
            due_date: sDate,
            completed: false
        }]);

        document.getElementById('stepTitle').value = '';
        document.getElementById('stepMins').value = '';
        refresh();
    }

    async function completeTask(id) {
        await client.from('subtasks').update({ completed: true }).eq('id', id);
        refresh();
    }

    async function completeSpotlight() { if (tasks.length > 0) completeTask(tasks[0].id); }
    async function undoTask(id) { await client.from('subtasks').update({ completed: false }).eq('id', id); refresh(); }

    async function renderHistory() {
        const { data } = await client.from('subtasks').select('*').eq('completed', true).order('id', {ascending: false}).limit(2);
        const histSection = document.getElementById('historySection');
        if (data && data.length > 0) {
            histSection.classList.remove('hidden');
            document.getElementById('historyList').innerHTML = data.map(t => `
                <div class="history-item">
                    <span style="font-size:0.8rem">${t.title}</span>
                    <button onclick="undoTask('${t.id}')" style="width:auto; padding:4px 10px; font-size:0.7rem; background:#64748b;">Undo</button>
                </div>
            `).join('');
        } else histSection.classList.add('hidden');
    }

    function render() {
        const inv = document.getElementById('inventory');
        inv.innerHTML = '';

        if (tasks.length > 0) {
            const t = tasks[0];
            document.getElementById('spotlightTitle').innerText = t.title;
            document.getElementById('spotlightDetails').innerText = `Priority: ${t.importance} | ${t.duration}m | Due: ${formatDate(t.due_date)}`;
        } else {
            document.getElementById('spotlightTitle').innerText = "All Actions Done";
            document.getElementById('spotlightDetails').innerText = "Process a new goal to continue.";
        }

        tasks.forEach(t => {
            const item = document.createElement('div');
            item.className = 'task-item';
            item.innerHTML = `
                <div class="importance-pill">${t.importance}</div>
                <div class="task-info">
                    <div style="font-weight:700;">${t.title}</div>
                    <div class="task-meta">${t.duration}m | Due: ${formatDate(t.due_date)}</div>
                </div>
                <input type="checkbox" style="width:22px; height:22px;" onclick="completeTask('${t.id}')">
            `;
            inv.appendChild(item);
        });
    }
</script>
</body>
</html>
