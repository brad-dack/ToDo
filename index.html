<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionStream | Staged Planning</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        
        /* SPOTLIGHT */
        #spotlight {
            background: var(--primary); color: white; padding: 40px; border-radius: 24px; 
            margin-bottom: 30px; text-align: center;
        }
        .spotlight-task { font-size: 2rem; font-weight: 800; margin: 15px 0; }
        
        /* CARDS */
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .section-title { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        /* INPUTS */
        .grid { display: grid; grid-template-columns: 2fr 1fr 0.5fr; gap: 12px; margin-bottom: 15px; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); color: white; font-weight: 700; border: none; cursor: pointer; }
        
        /* PLANNING LIST (STAGE 2) */
        .planning-mode { border: 2px dashed var(--accent); background: #f0f7ff; }
        .staged-item { 
            display: flex; align-items: center; padding: 10px; background: white; 
            border: 1px solid #bfdbfe; border-radius: 8px; margin-bottom: 5px; cursor: grab;
        }
        
        /* MAIN INVENTORY (STAGE 4) */
        .inventory-item { 
            display: flex; align-items: center; padding: 12px; background: white; 
            border-radius: 10px; margin-bottom: 8px; border: 1px solid #e2e8f0;
        }
        .importance-tag { font-weight: 800; color: var(--accent); margin-right: 12px; min-width: 25px; }
        .hidden { display: none; }
        .drag-handle { color: #cbd5e1; margin-right: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <span class="section-title" style="color: rgba(255,255,255,0.6)">Current Focus</span>
        <div id="spotlightTitle" class="spotlight-task">...</div>
        <div id="spotlightDetails" style="opacity: 0.8; margin-bottom: 20px;"></div>
        <button onclick="completeSpotlight()" style="background: white; color: var(--primary); width: 200px;">Complete</button>
    </div>

    <div class="card" id="goalCapture">
        <span class="section-title">Stage 1: Define Goal</span>
        <div class="grid">
            <input id="mainGoal" placeholder="Goal Name">
            <input type="date" id="goalDate">
            <select id="mainImp"></select>
        </div>
        <button onclick="lockGoal()">Start Breakdown</button>
    </div>

    <div class="card hidden planning-mode" id="planningArea">
        <span class="section-title">Stage 2: Sequencing Actions for <span id="displayGoal" style="color:var(--accent)"></span></span>
        
        <div class="grid" style="grid-template-columns: 2fr 1fr 80px;">
            <input id="stageTitle" placeholder="Step title...">
            <input type="date" id="stageDate">
            <input type="number" id="stageMins" placeholder="Mins">
        </div>
        <button onclick="addToStaging()" style="background: #10b981; margin-bottom: 15px;">Add Step to Draft</button>

        <div id="stagedList" style="margin-bottom: 20px;"></div>

        <div style="display: flex; gap: 10px;">
            <button onclick="finalisePlanning()" style="flex: 2;">Finalise & Commit to Inventory</button>
            <button onclick="cancelPlanning()" style="background: #ef4444; flex: 1;">Cancel</button>
        </div>
    </div>

    <span class="section-title">Master Inventory (Prioritised)</span>
    <div id="masterInventory"></div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let masterTasks = [];
    let stagingTasks = []; // Local array for Stage 2
    let activeGoal = null;

    window.onload = () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        
        Sortable.create(document.getElementById('stagedList'), {
            animation: 150,
            onEnd: () => {
                // Reorder local stagingTasks based on visual order
                const items = document.querySelectorAll('.staged-item');
                const newOrder = [];
                items.forEach(el => {
                    const idx = el.dataset.idx;
                    newOrder.push(stagingTasks[idx]);
                });
                stagingTasks = newOrder;
                renderStaging();
            }
        });
        
        refresh();
    };

    async function refresh() {
        const { data } = await client.from('subtasks').select('*').eq('completed', false);
        masterTasks = data || [];
        
        // Final prioritization: Date ASC, then the order they were committed
        masterTasks.sort((a, b) => {
            const dateA = new Date(a.due_date);
            const dateB = new Date(b.due_date);
            if (dateA - dateB !== 0) return dateA - dateB;
            return (a.importance_ranking || 0) - (b.importance_ranking || 0);
        });

        renderMaster();
    }

    function lockGoal() {
        const goal = document.getElementById('mainGoal').value;
        const date = document.getElementById('goalDate').value;
        const imp = document.getElementById('mainImp').value;

        if (!goal || !date || !imp) return alert("Fill goal details.");
        
        activeGoal = { goal, date, imp };
        document.getElementById('displayGoal').innerText = goal;
        document.getElementById('stageDate').value = date;
        
        document.getElementById('goalCapture').classList.add('hidden');
        document.getElementById('planningArea').classList.remove('hidden');
    }

    function addToStaging() {
        const title = document.getElementById('stageTitle').value;
        const date = document.getElementById('stageDate').value;
        const mins = document.getElementById('stageMins').value;

        if (!title || !mins || !date) return alert("Fill action details.");
        if (mins > 15) return alert("Must be 15 mins or less.");
        if (new Date(date) > new Date(activeGoal.date)) return alert("Date exceeds goal deadline.");

        stagingTasks.push({ title, date, mins });
        document.getElementById('stageTitle').value = '';
        renderStaging();
    }

    function renderStaging() {
        const list = document.getElementById('stagedList');
        list.innerHTML = stagingTasks.map((t, i) => `
            <div class="staged-item" data-idx="${i}">
                <div class="drag-handle">::</div>
                <div style="flex:1; font-size:0.9rem;">${t.title} (${t.mins}m)</div>
                <div style="font-size:0.7rem; color:#64748b;">${t.date}</div>
            </div>
        `).join('');
    }

    async function finalisePlanning() {
        if (stagingTasks.length === 0) return alert("Add at least one step.");
        
        // Save all to Supabase with the importance_ranking reflecting the staged order
        const toInsert = stagingTasks.map((t, index) => ({
            title: `${activeGoal.goal}: ${t.title}`,
            importance: parseInt(activeGoal.imp),
            duration: parseInt(t.mins),
            due_date: t.date,
            completed: false,
            importance_ranking: index // Uses the sequence you just built
        }));

        await client.from('subtasks').insert(toInsert);
        
        // Reset
        stagingTasks = [];
        activeGoal = null;
        document.getElementById('mainGoal').value = '';
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
        refresh();
    }

    function cancelPlanning() {
        stagingTasks = [];
        activeGoal = null;
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
    }

    async function completeTask(id) {
        await client.from('subtasks').update({ completed: true }).eq('id', id);
        refresh();
    }

    async function completeSpotlight() { if (masterTasks.length > 0) completeTask(masterTasks[0].id); }

    function renderMaster() {
        const inv = document.getElementById('masterInventory');
        inv.innerHTML = '';

        if (masterTasks.length > 0) {
            const t = masterTasks[0];
            document.getElementById('spotlightTitle').innerText = t.title;
            document.getElementById('spotlightDetails').innerText = `Importance: ${t.importance} | ${t.duration}m | Due: ${t.due_date}`;
        } else {
            document.getElementById('spotlightTitle').innerText = "All Actions Done";
        }

        masterTasks.forEach(t => {
            const item = document.createElement('div');
            item.className = 'inventory-item';
            item.innerHTML = `
                <div class="importance-tag">${t.importance}</div>
                <div style="flex:1">
                    <div style="font-weight:700; font-size:0.95rem;">${t.title}</div>
                    <div style="font-size:0.75rem; color:#64748b;">${t.duration}m | Due: ${t.due_date}</div>
                </div>
                <input type="checkbox" style="width:20px; height:20px;" onclick="completeTask('${t.id}')">
            `;
            inv.appendChild(item);
        });
    }
</script>
</body>
</html>
