<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ActionStream | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { 
            --bg: #f8fafc; 
            --card: #ffffff; 
            --primary: #0f172a; 
            --accent: #2563eb; 
            --text: #1e293b; 
            --error: #ef4444; 
            --success: #10b981; 
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 12px; 
            line-height: 1.5;
        }

        .container { max-width: 500px; margin: auto; padding-bottom: 100px; }

        /* Dashboard (Top Section) */
        .dashboard { 
            background: var(--primary); 
            color: white; 
            padding: 24px 20px; 
            border-radius: 32px; 
            margin-bottom: 25px; 
            box-shadow: 0 20px 40px -12px rgba(15, 23, 42, 0.3); 
        }

        .week-bar { 
            display: flex; 
            gap: 6px; 
            margin-bottom: 24px; 
            background: rgba(255,255,255,0.05); 
            padding: 12px; 
            border-radius: 16px; 
        }

        .day-cap { flex: 1; text-align: center; }
        .cap-dot { height: 4px; width: 100%; border-radius: 2px; margin-top: 6px; transition: all 0.3s ease; }

        /* Priority Deck Cards */
        .priority-deck { display: flex; flex-direction: column; gap: 12px; }
        
        .prio-card { 
            background: rgba(255,255,255,0.05); 
            padding: 16px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }

        .prio-info { flex: 1; overflow: hidden; margin-right: 12px; }
        .prio-title { font-weight: 700; font-size: 0.95rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prio-meta { font-size: 0.75rem; opacity: 0.6; display: block; margin-top: 2px; }

        .prio-actions { display: flex; align-items: center; gap: 8px; }

        /* Buttons */
        button { font-family: inherit; cursor: pointer; transition: all 0.15s ease; border: none; }
        
        .btn-done { 
            background: var(--accent); 
            color: white; 
            width: 42px; 
            height: 42px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0;
        }
        .btn-done:active { transform: scale(0.9); }

        .btn-push { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            padding: 0 14px; 
            height: 42px; 
            border-radius: 12px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Forms & Inputs */
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .section-title { 
            font-size: 0.7rem; 
            font-weight: 800; 
            color: #64748b; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-bottom: 12px; 
            display: block; 
        }

        input, select { 
            width: 100%; 
            height: 50px; 
            padding: 0 16px; 
            border-radius: 14px; 
            border: 1px solid #cbd5e1; 
            font-size: 16px; 
            margin-bottom: 12px; 
            background: #fff;
            outline: none;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .submit-btn { background: var(--accent); color: white; width: 100%; height: 54px; border-radius: 16px; font-weight: 700; font-size: 1rem; }

        .row { display: flex; gap: 12px; align-items: flex-end; }
        .narrow { flex: 0 0 40%; }

        /* Inventory List */
        .inventory-item { 
            display: flex; 
            align-items: center; 
            padding: 16px; 
            background: white; 
            border-radius: 18px; 
            margin-bottom: 10px; 
            border: 1px solid var(--border); 
            gap: 12px;
        }
        .imp-badge { font-weight: 900; color: var(--accent); font-size: 0.9rem; min-width: 24px; text-align: center; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span class="section-title" style="color:rgba(255,255,255,0.5); margin:0;">Forecast</span>
            <button onclick="toggleSettings()" style="background:none; color:white; font-size:0.7rem; opacity:0.5; border:1px solid rgba(255,255,255,0.2); padding:4px 8px; border-radius:6px;">SETTINGS</button>
        </div>
        
        <div id="weekBar" class="week-bar"></div>

        <span class="section-title" style="color:rgba(255,255,255,0.5); margin: 0 0 12px 0;">Next 3 Priorities</span>
        <div id="priorityDeck" class="priority-deck"></div>
    </div>

    <div class="card" id="goalCapture">
        <span class="section-title">New Project Goal</span>
        <input id="mainGoal" placeholder="e.g., SEO Website Launch">
        <div class="row">
            <div>
                <label style="font-size:0.7rem; font-weight:700; color:#64748b; margin-left:4px">Target Deadline</label>
                <input type="date" id="goalDate">
            </div>
            <div class="narrow">
                <label style="font-size:0.7rem; font-weight:700; color:#64748b; margin-left:4px">Importance</label>
                <select id="mainImp"></select>
            </div>
        </div>
        <button class="submit-btn" onclick="lockGoal()">Break into Actions</button>
    </div>

    <div class="card hidden" id="planningArea" style="border: 2px solid var(--accent); background: #f0f7ff;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="displayGoal" style="margin:0; font-size:1rem;"></h3>
            <span id="displayDeadline" style="font-size:0.75rem; font-weight:700; color:var(--accent);"></span>
        </div>
        
        <input id="stageTitle" placeholder="Next physical step...">
        <div class="row">
            <div class="narrow"><input type="number" id="stageMins" placeholder="Mins"></div>
            <div><input type="date" id="stageDate"></div>
        </div>
        <button onclick="addToStaging()" style="background:var(--success); color:white; width:100%; height:45px; border-radius:12px; font-weight:700; margin-bottom:15px;">+ Add to Sequence</button>
        
        <div id="stagedList" style="margin-bottom:20px; border-top:1px solid #dbeafe; padding-top:10px;"></div>
        
        <div class="row">
            <button onclick="finalisePlanning()" class="submit-btn" style="flex:2">Commit to Schedule</button>
            <button onclick="cancelPlanning()" style="background:#64748b; color:white; flex:1; border-radius:16px;">Cancel</button>
        </div>
    </div>

    <span class="section-title">Active Inventory</span>
    <div id="masterInventory"></div>
</div>

<script>
    // INITIALIZATION
    const CONFIG = { 
        URL: "https://wuhklqulwhioiynoadtj.supabase.co", 
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx" 
    };
    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    
    let masterTasks = [], stagingTasks = [], activeGoal = null;
    let settings = { weekday_limit: 45, weekend_limit: 90 };

    const formatDate = (dStr) => { if(!dStr) return ""; const [y,m,d] = dStr.split("-"); return `${d}/${m}/${y.slice(-2)}`; };

    window.onload = async () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        await loadSettings();
        refresh();
    };

    // DATA FETCHING
    async function loadSettings() {
        const { data } = await client.from('user_settings').select('*').eq('id', 'default_user').single();
        if (data) settings = data;
    }

    async function refresh() {
        const { data: active } = await client.from('subtasks').select('*').eq('completed', false);
        masterTasks = active || [];
        // Sort by Date, then by Importance
        masterTasks.sort((a,b) => new Date(a.due_date) - new Date(b.due_date) || b.importance - a.importance);
        renderDashboard();
        renderMaster();
    }

    // RENDER FUNCTIONS
    function renderDashboard() {
        const bar = document.getElementById('weekBar'); 
        bar.innerHTML = '';
        const today = new Date();
        
        for(let i=0; i<7; i++) {
            const d = new Date(today); 
            d.setDate(today.getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            const load = masterTasks.filter(t => t.due_date === dStr).reduce((s, t) => s + parseInt(t.duration), 0);
            const limit = (d.getDay() === 0 || d.getDay() === 6) ? settings.weekend_limit : settings.weekday_limit;
            
            const color = load > limit ? 'var(--error)' : (load > 0 ? 'var(--success)' : 'rgba(255,255,255,0.2)');
            const opacity = load > 0 ? 1 : 0.2;
            
            bar.innerHTML += `
                <div class="day-cap">
                    <div style="font-size:0.6rem; opacity:0.6; font-weight:700">${['S','M','T','W','T','F','S'][d.getDay()]}</div>
                    <div class="cap-dot" style="background:${color}; opacity:${opacity}; box-shadow: ${load > limit ? '0 0 8px var(--error)' : 'none'}"></div>
                </div>`;
        }

        const deck = document.getElementById('priorityDeck'); 
        deck.innerHTML = '';
        const top3 = masterTasks.slice(0, 3);
        
        if(top3.length === 0) deck.innerHTML = '<div style="opacity:0.4; font-size:0.8rem; text-align:center; padding:20px;">No active priorities. Add a goal below.</div>';

        top3.forEach(t => {
            const div = document.createElement('div');
            div.className = 'prio-card';
            div.innerHTML = `
                <div class="prio-info">
                    <span class="prio-title">${t.title}</span>
                    <span class="prio-meta">${formatDate(t.due_date)} • ${t.duration}m</span>
                </div>
                <div class="prio-actions">
                    <button class="btn-push" onclick='pushTask("${t.id}", "${t.due_date}", "${t.goal_deadline}")'>Delay</button>
                    <button class="btn-done" onclick='completeTask("${t.id}")'>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </button>
                </div>
            `;
            deck.appendChild(div);
        });
    }

    function renderMaster() {
        const inv = document.getElementById('masterInventory'); 
        inv.innerHTML = '';
        // Rest of the tasks excluding top 3
        masterTasks.slice(3).forEach(t => {
            const d = document.createElement('div');
            d.className = 'inventory-item';
            d.innerHTML = `
                <div class="imp-badge">${t.importance}</div>
                <div style="flex:1; overflow:hidden;">
                    <div style="font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.title}</div>
                    <small style="color:#64748b">${formatDate(t.due_date)} • ${t.duration}m</small>
                </div>
                <button class="btn-done" style="width:34px; height:34px; border-radius:8px; background:#f1f5f9; color:#64748b" onclick='completeTask("${t.id}")'>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>`;
            inv.appendChild(d);
        });
    }

    // CORE LOGIC: DELAY / COMPLETE
    async function pushTask(id, currentStr, deadlineStr) {
        const current = new Date(currentStr);
        const tomorrow = new Date(current); 
        tomorrow.setDate(current.getDate() + 1);
        const tomStr = tomorrow.toISOString().split('T')[0];

        if (deadlineStr && tomStr > deadlineStr) {
            return alert(`🚫 Hard Block: This task is linked to a goal ending ${formatDate(deadlineStr)}. You cannot push it further.`);
        }

        const load = masterTasks.filter(t => t.due_date === tomStr).reduce((s, t) => s + parseInt(t.duration), 0);
        const dayNum = tomorrow.getDay();
        const limit = (dayNum === 0 || dayNum === 6) ? settings.weekend_limit : settings.weekday_limit;
        
        if (load >= limit) {
            if (!confirm(`⚠️ Tomorrow is at capacity (${load}/${limit}m). Delay anyway?`)) return;
        }

        await client.from('subtasks').update({ due_date: tomStr }).eq('id', id);
        refresh();
    }

    async function completeTask(id) {
        await client.from('subtasks').update({ completed: true }).eq('id', id);
        refresh();
    }

    // PLANNING WORKFLOW
    function lockGoal() {
        const goal = document.getElementById('mainGoal').value;
        const date = document.getElementById('goalDate').value;
        if(!goal || !date) return alert("Enter Goal Name & Deadline");
        
        activeGoal = { goal, date, imp: document.getElementById('mainImp').value };
        document.getElementById('displayGoal').innerText = goal;
        document.getElementById('displayDeadline').innerText = "Due: " + formatDate(date);
        document.getElementById('stageDate').value = date;
        
        document.getElementById('goalCapture').classList.add('hidden');
        document.getElementById('planningArea').classList.remove('hidden');
    }

    function addToStaging() {
        const title = document.getElementById('stageTitle').value;
        const mins = document.getElementById('stageMins').value;
        const date = document.getElementById('stageDate').value;
        
        if(!title || !mins || !date) return alert("Fill all action details");
        
        stagingTasks.push({ title, duration: mins, due_date: date });
        document.getElementById('stageTitle').value = '';
        document.getElementById('stagedList').innerHTML = stagingTasks.map(t => 
            `<div style="font-size:0.85rem; padding:8px; background:white; border-radius:8px; margin-bottom:6px; border:1px solid #dbeafe;">
                <b>${t.title}</b> <span style="float:right; opacity:0.6">${t.duration}m</span>
            </div>`).join('');
    }

    async function finalisePlanning() {
        if(stagingTasks.length === 0) return alert("Add at least one action.");
        
        const toInsert = stagingTasks.map(t => ({
            title: `${activeGoal.goal}: ${t.title}`,
            duration: parseInt(t.duration),
            due_date: t.due_date,
            importance: parseInt(activeGoal.imp),
            goal_deadline: activeGoal.date
        }));

        await client.from('subtasks').insert(toInsert);
        cancelPlanning();
        refresh();
    }

    function cancelPlanning() {
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
        stagingTasks = [];
        document.getElementById('stagedList').innerHTML = '';
        document.getElementById('mainGoal').value = '';
    }

    function toggleSettings() {
        const newWeek = prompt("Weekday Limit (mins):", settings.weekday_limit);
        const newEnd = prompt("Weekend Limit (mins):", settings.weekend_limit);
        if(newWeek && newEnd) {
            settings.weekday_limit = parseInt(newWeek);
            settings.weekend_limit = parseInt(newEnd);
            client.from('user_settings').upsert({ id: 'default_user', ...settings }).then(() => refresh());
        }
    }
</script>

</body>
</html>
