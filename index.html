<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionStream | 4-Stage GTD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        
        /* SECTION 1: SPOTLIGHT */
        #spotlight {
            background: var(--primary); color: white; padding: 40px; border-radius: 24px; 
            margin-bottom: 30px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .spotlight-task { font-size: 2rem; font-weight: 800; margin: 15px 0; }
        
        /* GENERAL CARDS */
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .section-title { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        
        /* INPUTS */
        .grid { display: grid; grid-template-columns: 2fr 0.8fr 1fr; gap: 12px; margin-bottom: 15px; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); color: white; font-weight: 700; border: none; cursor: pointer; }
        button.secondary { background: #10b981; }
        button.done { background: #64748b; }

        /* SECTION 4: INVENTORY */
        .task-item { 
            display: flex; align-items: center; padding: 15px; background: white; 
            border-radius: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; cursor: grab;
        }
        .drag-handle { color: #cbd5e1; margin-right: 15px; font-size: 1.2rem; }
        .importance-pill { background: #f1f5f9; color: var(--primary); padding: 4px 10px; border-radius: 6px; font-weight: 800; margin-right: 15px; font-size: 0.8rem; border: 1px solid #e2e8f0; }
        .task-info { flex: 1; }
        .task-meta { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        
        .hidden { display: none; }
        .planning-mode { border: 2px solid var(--accent); background: #f0f7ff; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <span class="section-title" style="color: rgba(255,255,255,0.6)">Current Focus</span>
        <div id="spotlightTitle" class="spotlight-task">Loading...</div>
        <div id="spotlightDetails" style="opacity: 0.8; margin-bottom: 20px;"></div>
        <button onclick="completeSpotlight()" style="background: white; color: var(--primary); width: 200px;">Complete</button>
    </div>

    <div class="card" id="goalSection">
        <span class="section-title">Stage 1: Define Goal</span>
        <div class="grid">
            <input id="mainGoal" placeholder="What is the outcome?">
            <select id="mainImp"></select>
            <input type="date" id="goalDate">
        </div>
        <button onclick="startPlanning()">Set Goal & Break Down</button>
    </div>

    <div class="card hidden planning-mode" id="breakdownSection">
        <span class="section-title">Stage 2: Planning Actions for: <span id="activeGoalName" style="color:var(--accent)"></span></span>
        <div class="grid">
            <input id="stepTitle" placeholder="Next physical step...">
            <input type="date" id="stepDate">
            <input type="number" id="stepMins" placeholder="Mins (Max 15)">
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="secondary" onclick="addStep()">Add Action</button>
            <button class="done" onclick="finishPlanning()">Finish Planning</button>
        </div>
    </div>

    <span class="section-title">Action Inventory (Drag to reorder)</span>
    <div id="inventory"></div>

    <div id="historySection" class="card hidden" style="background: #f8fafc; border-style: dashed;">
        <span class="section-title">Recently Completed</span>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let tasks = [];
    let currentPlanningGoal = null;

    window.onload = () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(`Imp: ${i}`, i);
        
        Sortable.create(document.getElementById('inventory'), {
            animation: 150,
            handle: '.drag-handle',
            onEnd: updateManualOrder
        });
        
        refresh();
    };

    function formatDate(iso) {
        if (!iso) return "";
        const [y, m, d] = iso.split("-");
        return `${d}/${m}/${y.slice(-2)}`;
    }

    async function refresh() {
        const { data } = await client.from('subtasks').select('*').eq('completed', false);
        tasks = data || [];
        
        tasks.sort((a, b) => {
            const dateA = new Date(a.due_date);
            const dateB = new Date(b.due_date);
            if (dateA - dateB !== 0) return dateA - dateB;
            return (a.importance_ranking || 0) - (b.importance_ranking || 0);
        });

        render();
        renderHistory();
    }

    function startPlanning() {
        const goal = document.getElementById('mainGoal').value;
        const imp = document.getElementById('mainImp').value;
        const date = document.getElementById('goalDate').value;

        if (!goal || !imp || !date) return alert("Define the goal first.");

        currentPlanningGoal = { goal, imp, date };
        document.getElementById('activeGoalName').innerText = goal;
        document.getElementById('stepDate').value = date;
        
        document.getElementById('goalSection').classList.add('hidden');
        document.getElementById('breakdownSection').classList.remove('hidden');
    }

    function finishPlanning() {
        currentPlanningGoal = null;
        document.getElementById('mainGoal').value = '';
        document.getElementById('goalSection').classList.remove('hidden');
        document.getElementById('breakdownSection').classList.add('hidden');
        refresh();
    }

    async function addStep() {
        const sTitle = document.getElementById('stepTitle').value;
        const sDate = document.getElementById('stepDate').value;
        const sMins = parseInt(document.getElementById('stepMins').value);

        if (!sTitle || !sMins || !sDate) return alert("Fill all action fields.");
        if (sMins > 15) return alert("Max 15 mins per action!");
        if (new Date(sDate) > new Date(currentPlanningGoal.date)) return alert("Step date cannot be after Goal date!");

        await client.from('subtasks').insert([{
            title: `${currentPlanningGoal.goal}: ${sTitle}`,
            importance: parseInt(currentPlanningGoal.imp),
            duration: sMins,
            due_date: sDate,
            completed: false,
            importance_ranking: tasks.length
        }]);

        document.getElementById('stepTitle').value = '';
        refresh();
    }

    async function updateManualOrder() {
        const items = document.querySelectorAll('.task-item');
        for (let i = 0; i < items.length; i++) {
            await client.from('subtasks').update({ importance_ranking: i }).eq('id', items[i].dataset.id);
        }
        refresh();
    }

    async function completeTask(id) {
        await client.from('subtasks').update({ completed: true }).eq('id', id);
        refresh();
    }

    async function undoTask(id) {
        await client.from('subtasks').update({ completed: false }).eq('id', id);
        refresh();
    }

    async function completeSpotlight() { if (tasks.length > 0) completeTask(tasks[0].id); }

    async function renderHistory() {
        const { data } = await client.from('subtasks').select('*').eq('completed', true).order('id', {ascending: false}).limit(2);
        const histSection = document.getElementById('historySection');
        if (data && data.length > 0) {
            histSection.classList.remove('hidden');
            document.getElementById('historyList').innerHTML = data.map(t => `
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem; padding:5px 0;">
                    <span>${t.title}</span>
                    <button onclick="undoTask('${t.id}')" style="width:auto; padding:2px 8px; font-size:0.7rem; background:#64748b;">Undo</button>
                </div>
            `).join('');
        } else histSection.classList.add('hidden');
    }

    function render() {
        const inv = document.getElementById('inventory');
        inv.innerHTML = '';

        if (tasks.length > 0) {
            const t = tasks[0];
            document.getElementById('spotlightTitle').innerText = t.title;
            document.getElementById('spotlightDetails').innerText = `Imp: ${t.importance} | ${t.duration}m | Due: ${formatDate(t.due_date)}`;
        } else {
            document.getElementById('spotlightTitle').innerText = "All Clear";
            document.getElementById('spotlightDetails').innerText = "Add a new goal to begin.";
        }

        tasks.forEach(t => {
            const item = document.createElement('div');
            item.className = 'task-item';
            item.dataset.id = t.id;
            item.innerHTML = `
                <div class="drag-handle">⋮⋮</div>
                <div class="importance-pill">${t.importance}</div>
                <div class="task-info">
                    <div style="font-weight:700; font-size:0.95rem;">${t.title}</div>
                    <div class="task-meta">${t.duration}m | ${formatDate(t.due_date)}</div>
                </div>
                <input type="checkbox" style="width:20px; height:20px;" onclick="completeTask('${t.id}')">
            `;
            inv.appendChild(item);
        });
    }
</script>
</body>
</html>
