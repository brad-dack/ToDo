<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ActionStream | Lifecycle GTD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; --text: #1e293b; --error: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; }
        .container { max-width: 500px; margin: auto; padding-bottom: 80px; }

        #spotlight { 
            background: var(--primary); color: white; padding: 30px 15px; border-radius: 24px; 
            margin-bottom: 25px; text-align: center; box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.2);
        }
        .spotlight-task { font-size: 1.6rem; font-weight: 800; margin: 10px 0; line-height: 1.1; }
        
        .card { background: var(--card); padding: 20px; border-radius: 18px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1.2px; margin: 25px 0 15px; display: block; }
        
        input, select, button { 
            padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; 
            font-size: 16px; width: 100%; margin-bottom: 12px; outline: none;
            height: 50px; 
        }
        button { background: var(--accent); color: white; font-weight: 700; border: none; cursor: pointer; height: auto; padding: 16px; }
        
        .row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
        .row > div { flex: 1; }
        .narrow-50 { flex: 0 0 50% !important; }

        .field-label { font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 4px; display: block; }

        .staged-item { 
            display: flex; align-items: center; padding: 14px; background: white; 
            border: 1px solid #bfdbfe; border-radius: 12px; margin-bottom: 12px; 
        }
        .recur-pill { background: #dcfce7; color: #166534; font-size: 0.65rem; padding: 3px 8px; border-radius: 6px; font-weight: 800; margin-left: 8px; text-transform: uppercase; }

        .inventory-item { display: flex; align-items: center; padding: 16px; background: white; border-radius: 16px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .imp-num { font-weight: 900; color: var(--accent); font-size: 1.2rem; min-width: 35px; }
        .checkbox { width: 34px; height: 34px; border-radius: 10px; accent-color: var(--accent); cursor: pointer; }
        
        .hidden { display: none; }
        .planning-mode { border: 2px solid var(--accent); background: #f0f7ff; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <span class="section-title" style="color: rgba(255,255,255,0.6); margin-top:0;">Top Priority</span>
        <div id="spotlightTitle" class="spotlight-task">Loading...</div>
        <div id="spotlightDetails" style="font-size: 0.85rem; opacity: 0.85; margin-bottom: 20px;"></div>
        <button id="spotlightBtn" style="background: white; color: var(--primary); border-radius: 14px; max-width: 240px; margin: auto;">Complete Action</button>
    </div>

    <div class="card" id="goalCapture">
        <span class="section-title" style="margin-top:0;">Stage 1: Define Project Rule</span>
        <input id="mainGoal" placeholder="Project Name (e.g. Tax Return)">
        
        <div class="row">
            <div><label class="field-label">Goal Deadline</label><input type="date" id="goalDate"></div>
            <div class="narrow-50">
                <label class="field-label">Importance</label>
                <select id="mainImp"></select>
            </div>
        </div>

        <label class="field-label">Project Recurrence</label>
        <select id="mainRecur">
            <option value="none">One-off Project</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="fortnightly">Fortnightly</option>
            <option value="monthly">Monthly</option>
            <option value="quarterly">Quarterly</option>
            <option value="bi-annually">Bi-Annually</option>
            <option value="annually">Annually</option>
        </select>

        <button onclick="lockGoal()">Start Breakdown</button>
    </div>

    <div class="card hidden planning-mode" id="planningArea">
        <div style="border-bottom: 1px solid #bfdbfe; padding-bottom: 12px; margin-bottom: 15px;">
            <div style="display:flex; justify-content: space-between; align-items: flex-start;">
                <h2 id="displayGoal" style="margin:0; font-size: 1.1rem; font-weight: 800; flex:1;"></h2>
                <div id="displayRecur" class="recur-pill"></div>
            </div>
        </div>

        <label class="field-label">Action Title</label>
        <input id="stageTitle" placeholder="Next physical step">

        <div class="row">
            <div class="narrow-50">
                <label class="field-label">Mins</label>
                <input type="number" id="stageMins" placeholder="Max 15">
            </div>
            <div>
                <label class="field-label">Action Date</label>
                <input type="date" id="stageDate">
            </div>
        </div>
        
        <button id="addOrUpdateBtn" onclick="addToStaging()" style="background: var(--success); width: 100%;">Add to Sequence</button>
        
        <div id="stagedList" style="margin: 25px 0;"></div>
        
        <div class="row">
            <button onclick="finalisePlanning()" style="flex: 2;">Commit Strategy</button>
            <button onclick="cancelPlanning()" style="background: #ef4444; flex: 1;">Cancel</button>
        </div>
    </div>

    <span class="section-title">Active Inventory</span>
    <div id="masterInventory"></div>
    <span class="section-title">Recently Completed</span>
    <div id="historyList"></div>
</div>

<script>
    const CONFIG = { URL: "https://wuhklqulwhioiynoadtj.supabase.co", KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx" };
    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let masterTasks = [], historyTasks = [], stagingTasks = [], activeGoal = null, editingId = null;

    const formatDate = (dateStr) => {
        if (!dateStr) return "";
        const [y, m, d] = dateStr.split("-");
        return `${d}/${m}/${y.slice(-2)}`;
    };

    window.onload = () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        Sortable.create(document.getElementById('stagedList'), { animation: 150, onEnd: () => {
            const items = Array.from(document.querySelectorAll('.staged-item'));
            stagingTasks = items.map(el => stagingTasks[parseInt(el.dataset.idx)]);
            renderStaging();
        }});
        refresh();
    };

    async function refresh() {
        const { data: active } = await client.from('subtasks').select('*').eq('completed', false);
        const { data: history } = await client.from('subtasks').select('*').eq('completed', true).order('created_at', { ascending: false }).limit(5);
        masterTasks = active || [];
        historyTasks = history || [];
        masterTasks.sort((a, b) => new Date(a.due_date) - new Date(b.due_date) || (a.importance_ranking - b.importance_ranking));
        renderMaster();
        renderHistory();
    }

    function lockGoal() {
        const goal = document.getElementById('mainGoal').value;
        const date = document.getElementById('goalDate').value;
        const imp = document.getElementById('mainImp').value;
        const recur = document.getElementById('mainRecur').value;
        if (!goal || !date) return alert("Details missing.");
        
        activeGoal = { goal, date, imp, recur };
        document.getElementById('displayGoal').innerText = goal;
        document.getElementById('displayImp').innerText = imp;
        document.getElementById('displayRecur').innerText = recur !== 'none' ? recur : "";
        document.getElementById('stageDate').value = date;
        
        document.getElementById('goalCapture').classList.add('hidden');
        document.getElementById('planningArea').classList.remove('hidden');
    }

    function addToStaging() {
        const title = document.getElementById('stageTitle').value;
        const date = document.getElementById('stageDate').value;
        const mins = parseInt(document.getElementById('stageMins').value);
        if (!title || !mins || !date || mins > 15) return alert("Check inputs (15m limit).");
        stagingTasks.push({ title, date, mins });
        document.getElementById('stageTitle').value = '';
        renderStaging();
    }

    async function finalisePlanning() {
        if (stagingTasks.length === 0) return cancelPlanning();
        const toInsert = stagingTasks.map((t, i) => ({ 
            title: `${activeGoal.goal}: ${t.title}`, 
            importance: activeGoal.imp, 
            duration: t.mins, 
            due_date: t.date, 
            recurrence: activeGoal.recur, // Inherit from Stage 1
            importance_ranking: i 
        }));
        await client.from('subtasks').insert(toInsert);
        
        // Reset Global Inputs
        document.getElementById('mainGoal').value = '';
        document.getElementById('goalDate').value = '';
        document.getElementById('mainImp').selectedIndex = 0;
        document.getElementById('mainRecur').value = 'none';
        
        cancelPlanning();
        refresh();
    }

    async function completeTask(task) {
        if (task.recurrence && task.recurrence !== 'none') {
            const nextDate = new Date(task.due_date);
            switch(task.recurrence) {
                case 'daily': nextDate.setDate(nextDate.getDate() + 1); break;
                case 'weekly': nextDate.setDate(nextDate.getDate() + 7); break;
                case 'fortnightly': nextDate.setDate(nextDate.getDate() + 14); break;
                case 'monthly': nextDate.setMonth(nextDate.getMonth() + 1); break;
                case 'quarterly': nextDate.setMonth(nextDate.getMonth() + 3); break;
                case 'bi-annually': nextDate.setMonth(nextDate.getMonth() + 6); break;
                case 'annually': nextDate.setFullYear(nextDate.getFullYear() + 1); break;
            }

            await client.from('subtasks').insert([{
                ...task, 
                id: undefined, 
                due_date: nextDate.toISOString().split('T')[0], 
                completed: false,
                created_at: undefined
            }]);
        }
        await client.from('subtasks').update({ completed: true }).eq('id', task.id);
        refresh();
    }

    function renderMaster() {
        const inv = document.getElementById('masterInventory'); inv.innerHTML = '';
        if (masterTasks.length === 0) {
            document.getElementById('spotlightTitle').innerText = "All Clear! 🚀";
            document.getElementById('spotlightDetails').innerText = "Inventory empty.";
            document.getElementById('spotlightBtn').style.display = 'none';
        } else {
            const t = masterTasks[0];
            document.getElementById('spotlightTitle').innerText = t.title;
            document.getElementById('spotlightDetails').innerText = `${t.duration}m | Due: ${formatDate(t.due_date)}`;
            document.getElementById('spotlightBtn').style.display = 'block';
            document.getElementById('spotlightBtn').onclick = () => completeTask(t);
        }
        masterTasks.forEach(t => {
            const d = document.createElement('div'); d.className = 'inventory-item';
            d.innerHTML = `<div class="imp-num">${t.importance}</div><div style="flex:1"><b>${t.title}</b><br><small>${formatDate(t.due_date)} • ${t.duration}m ${t.recurrence !== 'none' ? `[${t.recurrence}]` : ''}</small></div>
            <input type="checkbox" class="checkbox" style="margin-left:10px;" onclick='completeTask(${JSON.stringify(t)})'>`;
            inv.appendChild(d);
        });
    }

    async function undoComplete(id) {
        await client.from('subtasks').update({ completed: false }).eq('id', id);
        refresh();
    }

    function cancelPlanning() {
        stagingTasks = []; activeGoal = null;
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
    }

    function renderStaging() {
        const list = document.getElementById('stagedList');
        list.innerHTML = stagingTasks.map((t, i) => `
            <div class="staged-item" data-idx="${i}">
                <div style="flex:1;"><b>${t.title}</b><br><small>${formatDate(t.date)} • ${t.mins}m</small></div>
            </div>`).join('');
    }

    function renderHistory() {
        const h = document.getElementById('historyList'); h.innerHTML = '';
        historyTasks.forEach(t => {
            const d = document.createElement('div'); d.className = 'inventory-item'; d.style.opacity = '0.6';
            d.innerHTML = `<div style="flex:1"><strike>${t.title}</strike></div><button style="background:#fee2e2; color:#ef4444; width:auto; padding:6px 10px; font-size:0.7rem; height:auto;" onclick="undoComplete(${t.id})">Undo</button>`;
            h.appendChild(d);
        });
    }
</script>
</body>
</html>
