<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ActionStream | Pro GTD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; --text: #1e293b; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 10px; line-height: 1.4;
        }

        .container { max-width: 600px; margin: auto; padding-bottom: 40px; }
        
        /* MOBILE OPTIMIZED SPOTLIGHT */
        #spotlight { 
            background: var(--primary); color: white; 
            padding: 25px 15px; border-radius: 20px; 
            margin-bottom: 20px; text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .spotlight-task { font-size: 1.4rem; font-weight: 800; margin: 10px 0; word-wrap: break-word; }
        
        /* CARDS & INPUTS */
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .section-title { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        
        .field-label { font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 4px; display: block; }
        
        input, select, button { 
            padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; 
            font-size: 16px; /* Prevents iOS zoom on focus */
            width: 100%; margin-bottom: 10px;
        }

        button { background: var(--accent); color: white; font-weight: 700; border: none; cursor: pointer; transition: filter 0.2s; }
        button:active { filter: brightness(0.8); }
        
        /* PLANNING MODE UI */
        .planning-mode { border: 2px solid var(--accent); background: #f0f7ff; }
        .planning-header { display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #bfdbfe; padding-bottom: 15px; margin-bottom: 15px; }
        
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }

        .staged-item { 
            display: flex; align-items: center; padding: 12px; 
            background: white; border: 1px solid #bfdbfe; 
            border-radius: 10px; margin-bottom: 8px;
        }
        
        .recur-pill { background: #dcfce7; color: #166534; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-left: 5px; }
        .recur-link { font-size: 0.8rem; color: var(--accent); cursor: pointer; text-decoration: underline; background: none; border: none; width: auto; margin: 0 0 15px 0; padding: 0; }
        
        /* INVENTORY LIST */
        .inventory-item { 
            display: flex; align-items: center; padding: 15px; 
            background: white; border-radius: 14px; 
            margin-bottom: 10px; border: 1px solid #e2e8f0;
        }
        
        .imp-num { font-weight: 900; color: var(--accent); font-size: 1.1rem; min-width: 30px; }
        .task-content { flex: 1; padding-right: 10px; }
        .checkbox { width: 28px; height: 28px; border-radius: 8px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <span class="section-title" style="color: rgba(255,255,255,0.5)">Current Priority</span>
        <div id="spotlightTitle" class="spotlight-task">Loading...</div>
        <div id="spotlightDetails" style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 15px;"></div>
        <button onclick="completeSpotlight()" style="background: white; color: var(--primary); max-width: 250px;">Complete Action</button>
    </div>

    <div class="card" id="goalCapture">
        <span class="section-title">Stage 1: Capture Goal</span>
        <input id="mainGoal" placeholder="Outcome description">
        <div class="row">
            <div>
                <label class="field-label">Deadline</label>
                <input type="date" id="goalDate">
            </div>
            <div>
                <label class="field-label">Importance</label>
                <select id="mainImp"></select>
            </div>
        </div>
        <button onclick="lockGoal()" style="margin-top: 10px;">Start Strategic Breakdown</button>
    </div>

    <div class="card hidden planning-mode" id="planningArea">
        <div class="planning-header">
            <h2 id="displayGoal" style="margin:0; font-size: 1.1rem;"></h2>
            <div class="row" style="align-items: flex-end;">
                <div>
                    <label class="field-label">Goal Deadline</label>
                    <input type="date" id="activeGoalDeadline" onchange="updateGoalDeadline(this.value)">
                </div>
                <div style="text-align: right; font-weight: 900; color: var(--accent); font-size: 1.5rem;" id="displayImp"></div>
            </div>
        </div>

        <label class="field-label">Sub-Action Title</label>
        <input id="stageTitle" placeholder="The next physical step">
        
        <div class="row">
            <div>
                <label class="field-label">Step Date</label>
                <input type="date" id="stageDate">
            </div>
            <div>
                <label class="field-label">Mins</label>
                <input type="number" id="stageMins" placeholder="15 Max">
            </div>
        </div>
        
        <button class="recur-link" onclick="toggleRecur()">+ Set Recurrence</button>
        <div id="recurContainer" class="hidden">
            <select id="stageRecur">
                <option value="none">Once</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="fortnightly">Fortnightly</option>
                <option value="monthly">Monthly</option>
            </select>
        </div>

        <button onclick="addToStaging()" style="background: #10b981; margin-top: 10px;">Add Step to Sequence</button>

        <div id="stagedList" style="margin: 20px 0;"></div>

        <div class="row">
            <button onclick="finalisePlanning()" style="flex: 2;">Commit All</button>
            <button onclick="cancelPlanning()" style="background: #ef4444; flex: 1;">Cancel</button>
        </div>
    </div>

    <span class="section-title">Master Inventory</span>
    <div id="masterInventory"></div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let masterTasks = [];
    let stagingTasks = [];
    let activeGoal = null;

    window.onload = () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        
        Sortable.create(document.getElementById('stagedList'), {
            animation: 150,
            handle: '.staged-item',
            onEnd: () => {
                const items = Array.from(document.querySelectorAll('.staged-item'));
                stagingTasks = items.map(el => stagingTasks[parseInt(el.dataset.idx)]);
                renderStaging();
            }
        });
        refresh();
    };

    function toggleRecur() { document.getElementById('recurContainer').classList.toggle('hidden'); }
    function updateGoalDeadline(val) { if(activeGoal) activeGoal.date = val; }

    async function refresh() {
        try {
            const { data, error } = await client.from('subtasks').select('*').eq('completed', false);
            if (error) throw error;
            masterTasks = data || [];
            masterTasks.sort((a, b) => {
                const dateA = new Date(a.due_date);
                const dateB = new Date(b.due_date);
                if (dateA - dateB !== 0) return dateA - dateB;
                return (a.importance_ranking || 0) - (b.importance_ranking || 0);
            });
            renderMaster();
        } catch (e) { console.error(e); }
    }

    function lockGoal() {
        const goal = document.getElementById('mainGoal').value;
        const date = document.getElementById('goalDate').value;
        const imp = document.getElementById('mainImp').value;
        if (!goal || !date) return alert("Goal and Date required.");
        
        activeGoal = { goal, date, imp };
        document.getElementById('displayGoal').innerText = goal;
        document.getElementById('displayImp').innerText = imp;
        document.getElementById('activeGoalDeadline').value = date;
        document.getElementById('stageDate').value = date;
        
        document.getElementById('goalCapture').classList.add('hidden');
        document.getElementById('planningArea').classList.remove('hidden');
    }

    function addToStaging() {
        const title = document.getElementById('stageTitle').value;
        const date = document.getElementById('stageDate').value;
        const mins = document.getElementById('stageMins').value;
        const recur = document.getElementById('stageRecur').value;

        if (!title || !mins || !date) return alert("Fill all fields.");
        
        stagingTasks.push({ title, date, mins, recur });
        document.getElementById('stageTitle').value = '';
        document.getElementById('recurContainer').classList.add('hidden');
        document.getElementById('stageRecur').value = 'none';
        renderStaging();
    }

    function renderStaging() {
        const list = document.getElementById('stagedList');
        list.innerHTML = stagingTasks.map((t, i) => `
            <div class="staged-item" data-idx="${i}">
                <div style="color:#cbd5e1; margin-right:10px; font-weight:bold;">⋮⋮</div>
                <div style="flex:1;">
                    <div style="font-size:0.9rem; font-weight:700;">${t.title}${t.recur !== 'none' ? `<span class="recur-pill">${t.recur}</span>` : ''}</div>
                    <div style="font-size:0.7rem; color:#64748b;">${t.date} • ${t.mins}m</div>
                </div>
            </div>
        `).join('');
    }

    async function finalisePlanning() {
        if (stagingTasks.length === 0) return alert("No steps added.");
        
        const toInsert = stagingTasks.map((t, index) => ({
            title: `${activeGoal.goal}: ${t.title}`,
            importance: parseInt(activeGoal.imp),
            duration: parseInt(t.mins),
            due_date: t.date,
            completed: false,
            importance_ranking: index,
            notes: t.recur
        }));

        const { error } = await client.from('subtasks').insert(toInsert);
        if (error) return alert("Error: " + error.message);

        stagingTasks = []; activeGoal = null;
        document.getElementById('mainGoal').value = '';
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
        refresh();
    }

    async function completeTask(task) {
        if (task.notes && task.notes !== 'none') {
            const nextDate = new Date(task.due_date);
            if (task.notes === 'daily') nextDate.setDate(nextDate.getDate() + 1);
            else if (task.notes === 'weekly') nextDate.setDate(nextDate.getDate() + 7);
            else if (task.notes === 'fortnightly') nextDate.setDate(nextDate.getDate() + 14);
            else if (task.notes === 'monthly') nextDate.setMonth(nextDate.getMonth() + 1);

            await client.from('subtasks').insert([{
                title: task.title, importance: task.importance, duration: task.duration,
                due_date: nextDate.toISOString().split('T')[0], completed: false, notes: task.notes
            }]);
        }
        await client.from('subtasks').update({ completed: true }).eq('id', task.id);
        refresh();
    }

    function cancelPlanning() {
        stagingTasks = []; activeGoal = null;
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
    }

    async function completeSpotlight() { if (masterTasks.length > 0) completeTask(masterTasks[0]); }

    function renderMaster() {
        const inv = document.getElementById('masterInventory');
        inv.innerHTML = '';
        if (masterTasks.length > 0) {
            const t = masterTasks[0];
            document.getElementById('spotlightTitle').innerText = t.title;
            document.getElementById('spotlightDetails').innerText = `Imp: ${t.importance} | ${t.duration}m | Due: ${t.due_date}`;
        } else {
            document.getElementById('spotlightTitle').innerText = "All Actions Done";
            document.getElementById('spotlightDetails').innerText = "";
        }
        masterTasks.forEach(t => {
            const item = document.createElement('div');
            item.className = 'inventory-item';
            item.innerHTML = `
                <div class="imp-num">${t.importance}</div>
                <div class="task-content">
                    <div style="font-weight:700; font-size:0.9rem;">${t.title}${t.notes && t.notes !== 'none' ? `<span class="recur-pill">${t.notes}</span>` : ''}</div>
                    <div style="font-size:0.7rem; color:#64748b;">${t.due_date} • ${t.duration}m</div>
                </div>
                <input type="checkbox" class="checkbox" onclick='completeTask(${JSON.stringify(t)})'>
            `;
            inv.appendChild(item);
        });
    }
</script>
</body>
</html>
