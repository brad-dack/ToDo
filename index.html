<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Action Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --primary: #2563eb;
            --text: #1e293b;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
        }

        header { margin-bottom: 30px; }
        h1 { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.025em; }

        /* SPOTLIGHT SECTION */
        #spotlight {
            background: var(--primary);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }

        #spotlight .label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.8; letter-spacing: 0.05em; }
        #spotlight .task-name { font-size: 1.5rem; font-weight: 700; margin: 10px 0; }

        /* INPUT AREA */
        .input-group {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button.secondary { background: #64748b; }
        button:hover { opacity: 0.9; }

        /* LISTS */
        .section-title { font-size: 0.9rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 15px; }
        .task-item {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .task-item input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; }
        .task-meta { font-size: 0.8rem; color: #94a3b8; }
        
        .hidden { display: none; }
        .tag { font-size: 0.7rem; padding: 2px 8px; background: #e2e8f0; border-radius: 4px; color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Next Action Engine</h1>
    </header>

    <div id="spotlight">
        <div class="label">Current Focus</div>
        <div id="spotlightTitle" class="task-name">Loading your next move...</div>
        <div id="spotlightMeta" class="label">---</div>
        <button onclick="completeSpotlight()" style="background: white; color: var(--primary); margin-top: 15px;">Mark as Done</button>
    </div>

    <div class="input-group" id="capturePanel">
        <div class="section-title">Capture New Action</div>
        <input id="taskTitle" placeholder="What is the very next physical step? (e.g. Call Bob)">
        <div style="display: flex; gap: 10px;">
            <select id="taskContext">
                <option value="@Computer">@Computer</option>
                <option value="@Phone">@Phone</option>
                <option value="@Office">@Office</option>
                <option value="@Errands">@Errands</option>
            </select>
            <select id="taskTime">
                <option value="5">5 min</option>
                <option value="15">15 min</option>
                <option value="30">30 min</option>
                <option value="60">60+ min</option>
            </select>
        </div>
        <button onclick="processEntry()">Process into System</button>
    </div>

    <div id="breakdownPanel" class="input-group hidden">
        <div class="section-title" style="color: var(--accent);">⚠️ Action too large!</div>
        <p style="font-size: 0.85rem;">David Allen says: "If it takes more than 15 mins, it's a project." Break it into two tiny steps:</p>
        <input id="substep1" placeholder="First tiny step...">
        <input id="substep2" placeholder="Second tiny step...">
        <button onclick="saveBreakdown()">Split Action</button>
        <button class="secondary" onclick="cancelBreakdown()">Actually, I'll do it in one</button>
    </div>

    <div class="section-title">Available Actions</div>
    <div id="actionList"></div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    let supabaseClient;
    let allTasks = [];
    let pendingBreakdown = null;

    window.onload = () => {
        supabaseClient = supabase.createClient(CONFIG.URL, CONFIG.KEY);
        refreshUI();
    };

    async function refreshUI() {
        const { data, error } = await supabaseClient
            .from('subtasks') // Using your existing table name
            .select('*')
            .eq('completed', false)
            .order('importance', { ascending: false });
        
        allTasks = data || [];
        render();
    }

    function processEntry() {
        const title = document.getElementById('taskTitle').value;
        const time = parseInt(document.getElementById('taskTime').value);
        const context = document.getElementById('taskContext').value;

        if (!title) return alert("Describe the action!");

        // THE GTD RULE: If it's too long, force a breakdown
        if (time > 15) {
            pendingBreakdown = { title, time, context };
            document.getElementById('capturePanel').classList.add('hidden');
            document.getElementById('breakdownPanel').classList.remove('hidden');
        } else {
            saveTask(title, time, context);
        }
    }

    async function saveTask(title, duration, context) {
        await supabaseClient.from('subtasks').insert([{
            title: title,
            duration: duration,
            importance: 5, // Default
            due_date: new Date().toISOString().split('T')[0],
            completed: false
        }]);
        
        resetInputs();
        refreshUI();
    }

    async function saveBreakdown() {
        const s1 = document.getElementById('substep1').value;
        const s2 = document.getElementById('substep2').value;
        
        if(!s1 || !s2) return alert("Define both steps!");

        await supabaseClient.from('subtasks').insert([
            { title: s1, duration: 10, importance: 6 },
            { title: s2, duration: 10, importance: 5 }
        ]);

        cancelBreakdown();
        refreshUI();
    }

    function cancelBreakdown() {
        pendingBreakdown = null;
        document.getElementById('capturePanel').classList.remove('hidden');
        document.getElementById('breakdownPanel').classList.add('hidden');
        resetInputs();
    }

    function resetInputs() {
        document.getElementById('taskTitle').value = '';
        document.getElementById('substep1').value = '';
        document.getElementById('substep2').value = '';
    }

    async function completeTask(id) {
        await supabaseClient.from('subtasks').update({ completed: true }).eq('id', id);
        refreshUI();
    }

    async function completeSpotlight() {
        if (allTasks.length > 0) {
            await completeTask(allTasks[0].id);
        }
    }

    function render() {
        const listContainer = document.getElementById('actionList');
        const spotlightTitle = document.getElementById('spotlightTitle');
        const spotlightMeta = document.getElementById('spotlightMeta');
        
        listContainer.innerHTML = '';

        if (allTasks.length === 0) {
            spotlightTitle.innerText = "Clear Skies! ☀️";
            spotlightMeta.innerText = "Nothing in the inbox.";
            return;
        }

        // Spotlight is always the first item
        const topTask = allTasks[0];
        spotlightTitle.innerText = topTask.title;
        spotlightMeta.innerText = `${topTask.duration} mins | Priority: ${topTask.importance}`;

        // Render the rest
        allTasks.forEach((task, index) => {
            const item = document.createElement('div');
            item.className = 'task-item';
            item.innerHTML = `
                <input type="checkbox" onclick="completeTask('${task.id}')">
                <div style="flex:1">
                    <div style="font-weight:600; font-size:0.9rem">${task.title}</div>
                    <div class="task-meta">${task.duration}m <span class="tag">Next Action</span></div>
                </div>
            `;
            listContainer.appendChild(item);
        });
    }
</script>

</body>
</html>
