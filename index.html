<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionStream | Drag & Drop GTD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .container { width: 100%; max-width: 700px; margin: auto; padding: 20px; }
        
        #spotlight {
            background: var(--primary); color: white; padding: 35px; border-radius: 24px; 
            margin-bottom: 25px; text-align: center; box-shadow: 0 15px 30px -5px rgba(0,0,0,0.2);
        }
        .spotlight-task { font-size: 1.8rem; font-weight: 800; margin: 10px 0; line-height: 1.2; }
        
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); color: white; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        
        .task-item { 
            display: flex; align-items: center; padding: 14px; background: white; 
            border-radius: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0;
            cursor: grab;
        }
        .task-item:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.3; background: #e2e8f0; }
        
        .drag-handle { color: #cbd5e1; margin-right: 15px; font-size: 1.2rem; user-select: none; }
        .importance-pill { background: var(--primary); color: white; padding: 4px 10px; border-radius: 6px; font-weight: 800; margin-right: 15px; font-size: 0.8rem; }
        .task-info { flex: 1; }
        .task-meta { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        .hidden { display: none; }

        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <div style="font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1.5px;">Next Best Action</div>
        <div id="spotlightTitle" class="spotlight-task">...</div>
        <div id="spotlightDetails" style="font-size: 0.85rem; opacity: 0.8;"></div>
        <button onclick="completeSpotlight()" style="background: #fff; color: var(--primary); margin-top: 15px; width: 100%; border-radius: 12px; font-weight: 700;">Complete Task</button>
    </div>

    <div class="card">
        <div style="border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 15px;">
            <div style="display: grid; grid-template-columns: 2fr 0.8fr 0.8fr; gap: 10px;">
                <input id="mainGoal" placeholder="Goal Name">
                <select id="mainImp"></select>
                <input type="date" id="goalDate">
            </div>
        </div>
        <div>
            <input id="stepTitle" placeholder="Physical Action Step" style="margin-bottom:10px;">
            <div class="grid">
                <input type="date" id="stepDate">
                <input type="number" id="stepMins" placeholder="Mins (Max 15)">
                <button onclick="addStep()" style="background: #10b981;">Add Action</button>
            </div>
        </div>
    </div>

    <div id="inventory"></div>

    <div id="historySection" class="card hidden" style="margin-top: 20px; background: #f8fafc;">
        <h3 style="font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px;">Undo Recent</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let tasks = [];

    window.onload = () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        
        const el = document.getElementById('inventory');
        Sortable.create(el, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            handle: '.drag-handle',
            onEnd: async () => { await updateManualOrder(); }
        });
        
        refresh();
    };

    function formatDate(iso) {
        if (!iso) return "N/A";
        const [y, m, d] = iso.split("-");
        return `${d}/${m}/${y.slice(-2)}`;
    }

    async function refresh() {
        const { data, error } = await client.from('subtasks').select('*').eq('completed', false);
        if (error) return console.error("Refresh Error:", error);
        
        tasks = data || [];
        
        // Sort: Date First, then Manual Order (importance_ranking)
        tasks.sort((a, b) => {
            const dateA = new Date(a.due_date);
            const dateB = new Date(b.due_date);
            if (dateA - dateB !== 0) return dateA - dateB;
            return (a.importance_ranking || 0) - (b.importance_ranking || 0);
        });

        render();
        renderHistory();
    }

    async function addStep() {
        const goal = document.getElementById('mainGoal').value;
        const imp = parseInt(document.getElementById('mainImp').value);
        const gDate = document.getElementById('goalDate').value;
        const sTitle = document.getElementById('stepTitle').value;
        const sDate = document.getElementById('stepDate').value || gDate;
        const sMins = parseInt(document.getElementById('stepMins').value);

        if (!goal || !imp || !gDate || !sTitle || !sMins) return alert("Fill all fields!");
        if (sMins > 15) return alert("Break it down! Max 15 mins.");
        if (new Date(sDate) > new Date(gDate)) return alert("Sub-action cannot be after Goal deadline.");

        try {
            const { error } = await client.from('subtasks').insert([{
                title: `${goal}: ${sTitle}`,
                importance: imp,
                duration: sMins,
                due_date: sDate,
                completed: false,
                importance_ranking: tasks.length
            }]);

            if (error) throw error;
            document.getElementById('stepTitle').value = '';
            document.getElementById('stepMins').value = '';
            await refresh();
        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    async function updateManualOrder() {
        const items = document.querySelectorAll('.task-item');
        // Update each item's position in the DB based on current UI order
        for (let i = 0; i < items.length; i++) {
            const id = items[i].dataset.id;
            await client.from('subtasks').update({ importance_ranking: i }).eq('id', id);
        }
        await refresh();
    }

    async function completeTask(id) {
        await client.from('subtasks').update({ completed: true }).eq('id', id);
        refresh();
    }

    async function undoTask(id) {
        await client.from('subtasks').update({ completed: false }).eq('id', id);
        refresh();
    }

    async function completeSpotlight() { if (tasks.length > 0) completeTask(tasks[0].id); }

    async function renderHistory() {
        const { data } = await client.from('subtasks').select('*').eq('completed', true).order('id', {ascending: false}).limit(2);
        const histSection = document.getElementById('historySection');
        if (data && data.length > 0) {
            histSection.classList.remove('hidden');
            document.getElementById('historyList').innerHTML = data.map(t => `
                <div class="history-item">
                    <span style="font-size:0.75rem">${t.title}</span>
                    <button onclick="undoTask('${t.id}')" style="width:auto; padding:3px 8px; font-size:0.6rem; background:#64748b;">Undo</button>
                </div>
            `).join('');
        } else histSection.classList.add('hidden');
    }

    function render() {
        const inv = document.getElementById('inventory');
        inv.innerHTML = '';

        if (tasks.length > 0) {
            const t = tasks[0];
            document.getElementById('spotlightTitle').innerText = t.title;
            document.getElementById('spotlightDetails').innerText = `Imp: ${t.importance} | ${t.duration}m | Due: ${formatDate(t.due_date)}`;
        } else {
            document.getElementById('spotlightTitle').innerText = "All Actions Done";
            document.getElementById('spotlightDetails').innerText = "Ready for a new goal.";
        }

        tasks.forEach(t => {
            const item = document.createElement('div');
            item.className = 'task-item';
            item.dataset.id = t.id;
            item.innerHTML = `
                <div class="drag-handle">⋮⋮</div>
                <div class="importance-pill">${t.importance}</div>
                <div class="task-info">
                    <div style="font-weight:700; font-size:0.9rem;">${t.title}</div>
                    <div class="task-meta">${t.duration}m | Due: ${formatDate(t.due_date)}</div>
                </div>
                <input type="checkbox" style="width:20px; height:20px;" onclick="completeTask('${t.id}')">
            `;
            inv.appendChild(item);
        });
    }
</script>
</body>
</html>
