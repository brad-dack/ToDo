<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionStream | Pro GTD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; margin: auto; }
        
        #spotlight { background: var(--primary); color: white; padding: 40px; border-radius: 24px; margin-bottom: 30px; text-align: center; }
        .spotlight-task { font-size: 2rem; font-weight: 800; margin: 15px 0; }
        
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        
        /* INPUT STYLING */
        .field-label { font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 4px; display: block; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); color: white; font-weight: 700; border: none; cursor: pointer; }
        
        /* STAGE 2 PLANNING AREA */
        .planning-mode { border: 2px solid var(--accent); background: #f0f7ff; }
        .planning-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #bfdbfe; padding-bottom: 15px; margin-bottom: 20px; }
        .staged-item { display: flex; align-items: center; padding: 12px; background: white; border: 1px solid #bfdbfe; border-radius: 8px; margin-bottom: 6px; cursor: grab; }
        
        .recur-pill { background: #dcfce7; color: #166534; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-left: 8px; }
        .importance-tag { font-weight: 800; color: var(--accent); margin-right: 12px; }
        .inventory-item { display: flex; align-items: center; padding: 14px; background: white; border-radius: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <span class="section-title" style="color: rgba(255,255,255,0.5)">Current Priority</span>
        <div id="spotlightTitle" class="spotlight-task">...</div>
        <div id="spotlightDetails" style="opacity: 0.8; margin-bottom: 20px;"></div>
        <button onclick="completeSpotlight()" style="background: white; color: var(--primary); width: 220px;">Complete Action</button>
    </div>

    <div class="card" id="goalCapture">
        <span class="section-title">Stage 1: Capture Intent</span>
        <div style="display: grid; grid-template-columns: 2fr 1fr 0.5fr; gap: 12px;">
            <input id="mainGoal" placeholder="Outcome description">
            <input type="date" id="goalDate">
            <select id="mainImp"></select>
        </div>
        <button onclick="lockGoal()" style="margin-top: 15px;">Start Strategic Breakdown</button>
    </div>

    <div class="card hidden planning-mode" id="planningArea">
        <div class="planning-header">
            <div style="flex:1">
                <span class="section-title" style="margin-bottom: 2px;">Stage 2: Strategic Planning</span>
                <h2 id="displayGoal" style="margin:0; font-size: 1.25rem; color: var(--primary);"></h2>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div>
                    <label class="field-label">Imp</label>
                    <div id="displayImp" style="font-weight: 800; color: var(--accent); font-size: 1.2rem;"></div>
                </div>
                <div>
                    <label class="field-label">Goal Deadline</label>
                    <input type="date" id="activeGoalDeadline" style="padding: 5px; font-size: 0.8rem;" onchange="updateGoalDeadline(this.value)">
                </div>
            </div>
        </div>

        <div style="margin-bottom: 20px; background: rgba(255,255,255,0.5); padding: 15px; border-radius: 10px;">
            <div style="margin-bottom: 12px;">
                <label class="field-label">Action Title</label>
                <input id="stageTitle" placeholder="What is the next physical step?">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px;">
                <div>
                    <label class="field-label">Action Date</label>
                    <input type="date" id="stageDate">
                </div>
                <div>
                    <label class="field-label">Mins (Max 15)</label>
                    <input type="number" id="stageMins" placeholder="Mins">
                </div>
                <div>
                    <label class="field-label">Recurrence</label>
                    <select id="stageRecur">
                        <option value="none">Once</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="fortnightly">Fortnightly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                </div>
            </div>
            <button onclick="addToStaging()" style="background: #10b981;">Add to Draft Sequence</button>
        </div>

        <div id="stagedList" style="margin-bottom: 20px;"></div>

        <div style="display: flex; gap: 10px;">
            <button onclick="finalisePlanning()" style="flex: 2;">Commit to Inventory</button>
            <button onclick="cancelPlanning()" style="background: #ef4444; flex: 1;">Cancel</button>
        </div>
    </div>

    <span class="section-title">Master Inventory (Execution Order)</span>
    <div id="masterInventory"></div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let masterTasks = [];
    let stagingTasks = [];
    let activeGoal = null;

    window.onload = () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        
        Sortable.create(document.getElementById('stagedList'), {
            animation: 150,
            onEnd: () => {
                const items = document.querySelectorAll('.staged-item');
                const newOrder = [];
                items.forEach(el => newOrder.push(stagingTasks[el.dataset.idx]));
                stagingTasks = newOrder;
                renderStaging();
            }
        });
        refresh();
    };

    function updateGoalDeadline(val) { if(activeGoal) activeGoal.date = val; }

    async function refresh() {
        const { data } = await client.from('subtasks').select('*').eq('completed', false);
        masterTasks = data || [];
        masterTasks.sort((a, b) => {
            const dateA = new Date(a.due_date);
            const dateB = new Date(b.due_date);
            if (dateA - dateB !== 0) return dateA - dateB;
            return (a.importance_ranking || 0) - (b.importance_ranking || 0);
        });
        renderMaster();
    }

    function lockGoal() {
        const goal = document.getElementById('mainGoal').value;
        const date = document.getElementById('goalDate').value;
        const imp = document.getElementById('mainImp').value;
        if (!goal || !date || !imp) return alert("Define the goal details first.");
        
        activeGoal = { goal, date, imp };
        document.getElementById('displayGoal').innerText = goal;
        document.getElementById('displayImp').innerText = imp;
        document.getElementById('activeGoalDeadline').value = date;
        document.getElementById('stageDate').value = date;
        
        document.getElementById('goalCapture').classList.add('hidden');
        document.getElementById('planningArea').classList.remove('hidden');
    }

    function addToStaging() {
        const title = document.getElementById('stageTitle').value;
        const date = document.getElementById('stageDate').value;
        const mins = document.getElementById('stageMins').value;
        const recur = document.getElementById('stageRecur').value;

        if (!title || !mins || !date) return alert("Details required.");
        if (new Date(date) > new Date(activeGoal.date)) return alert("Step date cannot be later than Goal Deadline.");

        stagingTasks.push({ title, date, mins, recur });
        document.getElementById('stageTitle').value = '';
        renderStaging();
    }

    function renderStaging() {
        const list = document.getElementById('stagedList');
        list.innerHTML = stagingTasks.map((t, i) => `
            <div class="staged-item" data-idx="${i}">
                <div style="font-weight:bold; color:#cbd5e1; margin-right:12px;">::</div>
                <div style="flex:1;">
                    <div style="font-size:0.9rem; font-weight:700;">${t.title} ${t.recur !== 'none' ? `<span class="recur-pill">${t.recur}</span>` : ''}</div>
                    <div style="font-size:0.75rem; color:#64748b;">${t.date} | ${t.mins} mins</div>
                </div>
            </div>
        `).join('');
    }

    async function finalisePlanning() {
        if (stagingTasks.length === 0) return alert("No actions added.");
        
        const toInsert = stagingTasks.map((t, index) => ({
            title: `${activeGoal.goal}: ${t.title}`,
            importance: parseInt(activeGoal.imp),
            duration: parseInt(t.mins),
            due_date: t.date,
            completed: false,
            importance_ranking: index,
            notes: t.recur // Using notes field to temporarily store recurrence type
        }));

        await client.from('subtasks').insert(toInsert);
        stagingTasks = []; activeGoal = null;
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
        refresh();
    }

    async function completeTask(task) {
        // Handle Recurrence
        if (task.notes && task.notes !== 'none') {
            const nextDate = new Date(task.due_date);
            if (task.notes === 'daily') nextDate.setDate(nextDate.getDate() + 1);
            if (task.notes === 'weekly') nextDate.setDate(nextDate.getDate() + 7);
            if (task.notes === 'fortnightly') nextDate.setDate(nextDate.getDate() + 14);
            if (task.notes === 'monthly') nextDate.setMonth(nextDate.getMonth() + 1);

            await client.from('subtasks').insert([{
                ...task,
                id: undefined, // Create new ID
                due_date: nextDate.toISOString().split('T')[0],
                completed: false
            }]);
        }

        await client.from('subtasks').update({ completed: true }).eq('id', task.id);
        refresh();
    }

    function cancelPlanning() {
        stagingTasks = []; activeGoal = null;
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
    }

    async function completeSpotlight() { if (masterTasks.length > 0) completeTask(masterTasks[0]); }

    function renderMaster() {
        const inv = document.getElementById('masterInventory');
        inv.innerHTML = '';
        if (masterTasks.length > 0) {
            const t = masterTasks[0];
            document.getElementById('spotlightTitle').innerText = t.title;
            document.getElementById('spotlightDetails').innerText = `Importance: ${t.importance} | ${t.duration}m | Due: ${t.due_date}`;
        } else {
            document.getElementById('spotlightTitle').innerText = "All Clear";
        }

        masterTasks.forEach(t => {
            const item = document.createElement('div');
            item.className = 'inventory-item';
            item.innerHTML = `
                <div class="importance-tag">${t.importance}</div>
                <div style="flex:1">
                    <div style="font-weight:700; font-size:0.9rem;">${t.title} ${t.notes && t.notes !== 'none' ? `<span class="recur-pill">${t.notes}</span>` : ''}</div>
                    <div style="font-size:0.75rem; color:#64748b;">${t.duration}m | ${t.due_date}</div>
                </div>
                <input type="checkbox" style="width:20px; height:20px;" onclick='completeTask(${JSON.stringify(t)})'>
            `;
            inv.appendChild(item);
        });
    }
</script>
</body>
</html>
