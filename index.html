<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Planner</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
}

button {
    background: #2b7cff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.row {
    display: flex;
    gap: 10px;
}

.task {
    width: 48%;
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.task-info {
    flex: 1;
}

.hidden { display:none; }

.section {
    margin-top: 25px;
}
</style>
</head>

<body>

<div class="container">

<h1>Task Planner</h1>

<!-- CREATE -->
<div id="createScreen">
    <input id="taskTitle" placeholder="Task title">
    <input type="date" id="dueDate">
    <input type="number" id="importance" placeholder="Importance (0–10)">
    <input type="number" id="timeEstimate" placeholder="Time (minutes)">
    <button onclick="addTask()">Add Task</button>
</div>

<!-- BREAKDOWN -->
<div id="breakdownScreen" class="hidden">
    <h3>Break into Steps</h3>
    <div id="breakdownList"></div>
    <button onclick="saveSubtasks()">Save Steps</button>
</div>

<!-- NEXT TASK -->
<div class="section">
    <h2>Next Best Task</h2>
    <div id="nextTask"></div>
</div>

<!-- TODAY -->
<div class="section">
    <h2>Today</h2>
    <div id="todayList" class="row"></div>
</div>

<!-- TOMORROW -->
<div class="section">
    <h2>Tomorrow</h2>
    <div id="tomorrowList" class="row"></div>
</div>

<!-- LATER -->
<div class="section">
    <h2>Later</h2>
    <div id="laterList" class="row"></div>
</div>

</div>

<script>

// CONFIG
const CONFIG = {
    SUPABASE_URL: "https://wuhklqulwhioiynoadtj.supabase.co",
    SUPABASE_KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
};

let client;
let tasks = [];
let currentTask;
let currentTaskId;

const el = {
    title: taskTitle,
    dueDate: dueDate,
    importance: importance,
    time: timeEstimate,
    create: createScreen,
    breakdown: breakdownScreen,
    breakdownList: breakdownList
};

window.onload = async () => {
    client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
    await loadTasks();
};

// DATE HELPERS
function todayStr() {
    return new Date().toISOString().split("T")[0];
}

function tomorrowStr() {
    let d = new Date();
    d.setDate(d.getDate()+1);
    return d.toISOString().split("T")[0];
}

function formatDate(d) {
    let date = new Date(d);
    return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getFullYear()).slice(-2)}`;
}

// ADD TASK
async function addTask() {

    let title = el.title.value;
    let dueDate = el.dueDate.value;
    let importance = parseInt(el.importance.value);
    let time = parseInt(el.time.value);

    let { data } = await client.from("tasks")
        .insert([{ title, due_date: dueDate, importance, time_estimate: time }])
        .select();

    currentTask = data[0];
    currentTaskId = currentTask.id;

    showBreakdown(currentTask);
}

// BREAKDOWN
function showBreakdown(task) {

    el.create.classList.add("hidden");
    el.breakdown.classList.remove("hidden");
    el.breakdownList.innerHTML = "";

    let total = task.time_estimate;

    while (total > 0) {

        let step = Math.min(15, total);

        let div = document.createElement("div");

        div.innerHTML = `
            <input value="${task.title}">
            <input type="date" max="${task.due_date}" value="${task.due_date}">
            <span data-duration="${step}">${step} min</span>
        `;

        el.breakdownList.appendChild(div);

        total -= step;
    }
}

// SAVE SUBTASKS
async function saveSubtasks() {

    let items = el.breakdownList.children;
    let inserts = [];

    for (let item of items) {

        let inputs = item.querySelectorAll("input");
        let duration = parseInt(item.querySelector("span").dataset.duration);

        inserts.push({
            parent_id: currentTaskId,
            title: currentTask.title + " - " + inputs[0].value,
            due_date: inputs[1].value,
            duration: duration,
            importance: currentTask.importance
        });
    }

    await client.from("subtasks").insert(inserts);

    el.breakdown.classList.add("hidden");
    el.create.classList.remove("hidden");

    await loadTasks();
}

// LOAD TASKS
async function loadTasks() {

    let { data } = await client
        .from("subtasks")
        .select("*")
        .eq("completed", false);

    tasks = data;

    tasks.sort((a,b)=>{
        let d1 = new Date(a.due_date);
        let d2 = new Date(b.due_date);
        if (d1-d2 !== 0) return d1-d2;
        return b.importance - a.importance;
    });

    render();
}

// COMPLETE
async function completeTask(id){
    await client.from("subtasks").update({completed:true}).eq("id",id);
    await loadTasks();
}

// PUSH TO TOMORROW
async function pushTomorrow(task){
    let newDate = tomorrowStr();
    await client.from("subtasks").update({due_date:newDate}).eq("id",task.id);
    await loadTasks();
}

// RENDER
function render(){

    let today = todayStr();
    let tomorrow = tomorrowStr();

    let todayTasks = tasks.filter(t=>t.due_date===today).slice(0,3);
    let tomorrowTasks = tasks.filter(t=>t.due_date===tomorrow);
    let laterTasks = tasks.filter(t=>t.due_date>tomorrow);

    renderList("todayList", todayTasks);
    renderList("tomorrowList", tomorrowTasks);
    renderList("laterList", laterTasks);

    // NEXT BEST TASK
    let next = todayTasks[0];
    nextTask.innerHTML = next ? next.title : "Nothing urgent 🎉";
}

// RENDER LIST
function renderList(id, list){

    let container = document.getElementById(id);
    container.innerHTML = "";

    list.forEach(t=>{

        let div = document.createElement("div");
        div.className = "task";

        div.innerHTML = `
            <div class="task-info">
                <strong>${t.title}</strong><br>
                ${formatDate(t.due_date)} | ${t.duration} min
            </div>
            <div>
                <input type="checkbox" onclick="completeTask('${t.id}')">
                <button onclick='pushTomorrow(${JSON.stringify(t)})'>→</button>
            </div>
        `;

        container.appendChild(div);
    });
}

</script>

</body>
</html>
