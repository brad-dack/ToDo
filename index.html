<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionStream | GTD Precision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .container { width: 100%; max-width: 700px; margin: auto; padding: 20px; }
        
        #spotlight {
            background: var(--primary); color: white; padding: 35px; border-radius: 24px; 
            margin-bottom: 25px; text-align: center; box-shadow: 0 15px 30px -5px rgba(0,0,0,0.2);
        }
        .spotlight-task { font-size: 1.8rem; font-weight: 800; margin: 10px 0; line-height: 1.2; }
        
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); color: white; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button.undo { background: #64748b; font-size: 0.75rem; padding: 5px 10px; width: auto; }
        button.complete-btn { background: #fff; color: var(--primary); margin-top: 15px; font-size: 1.1rem; }

        .task-item { 
            display: flex; align-items: center; padding: 14px; background: white; 
            border-radius: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; border-left: 6px solid #cbd5e1;
        }
        .priority-high { border-left-color: #ef4444; }
        .task-info { flex: 1; }
        .task-meta { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        .history-item { opacity: 0.6; display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <div style="font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1.5px;">Next Action</div>
        <div id="spotlightTitle" class="spotlight-task">...</div>
        <div id="spotlightDetails" style="font-size: 0.85rem; opacity: 0.8;"></div>
        <button class="complete-btn" onclick="completeSpotlight()">Done</button>
    </div>

    <div class="card">
        <div class="grid" style="grid-template-columns: 2fr 1fr;">
            <input id="mainGoal" placeholder="Primary Goal/Project">
            <input type="date" id="goalDate">
        </div>
        
        <div style="background: #f1f5f9; padding: 15px; border-radius: 10px; margin-top: 10px;">
            <input id="stepTitle" placeholder="Physical Action (e.g. 'Draft email')" style="margin-bottom:10px;">
            <div class="grid">
                <input type="date" id="stepDate">
                <input type="number" id="stepMins" placeholder="Mins (max 15)">
                <select id="stepImp">
                    <option value="" disabled selected>Importance</option>
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                    <option value="10">10</option>
                </select>
            </div>
            <button onclick="addStep()" style="background: #10b981; margin-top:10px;">Add Step to Inventory</button>
        </div>
    </div>

    <h3 style="font-size: 0.8rem; color: #64748b; text-transform: uppercase;">Inventory</h3>
    <div id="inventory"></div>

    <div id="historySection" class="card hidden" style="margin-top: 30px;">
        <h3 style="font-size: 0.8rem; color: #64748b; text-transform: uppercase;">Recently Completed</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let tasks = [];

    window.onload = refresh;

    function formatDate(iso) {
        if (!iso) return "N/A";
        const [y, m, d] = iso.split("-");
        return `${d}/${m}/${y.slice(-2)}`;
    }

    async function refresh() {
        const { data } = await client.from('subtasks').select('*').eq('completed', false);
        tasks = data || [];
        
        const now = new Date();
        tasks.sort((a, b) => {
            const getScore = (t) => {
                const diff = (new Date(t.due_date) - now) / (1000 * 60 * 60 * 24);
                const weight = Math.max(0.1, diff + 1);
                return t.importance / weight; // Gravity toward high importance + near date
            };
            return getScore(b) - getScore(a);
        });

        render();
        renderHistory();
    }

    async function addStep() {
        const goal = document.getElementById('mainGoal').value;
        const title = document.getElementById('stepTitle').value;
        const mins = parseInt(document.getElementById('stepMins').value);
        const imp = parseInt(document.getElementById('stepImp').value);
        const date = document.getElementById('stepDate').value || document.getElementById('goalDate').value;

        if (!title || !mins || !imp || !date) return alert("All step fields required.");
        if (mins > 15) return alert("GTD Violation: Task must be 15 mins or less.");

        await client.from('subtasks').insert([{
            title: goal ? `${goal}: ${title}` : title,
            importance: imp,
            duration: mins,
            due_date: date,
            completed: false
        }]);

        document.getElementById('stepTitle').value = '';
        refresh();
    }

    async function completeTask(id) {
        await client.from('subtasks').update({ completed: true }).eq('id', id);
        refresh();
    }

    async function completeSpotlight() {
        if (tasks.length > 0) completeTask(tasks[0].id);
    }

    async function undoTask(id) {
        await client.from('subtasks').update({ completed: false }).eq('id', id);
        refresh();
    }

    async function renderHistory() {
        const { data } = await client.from('subtasks').select('*').eq('completed', true).order('id', {ascending: false}).limit(3);
        const histList = document.getElementById('historyList');
        const histSection = document.getElementById('historySection');
        
        if (data && data.length > 0) {
            histSection.classList.remove('hidden');
            histList.innerHTML = data.map(t => `
                <div class="history-item">
                    <span>${t.title}</span>
                    <button class="undo" onclick="undoTask('${t.id}')">Undo</button>
                </div>
            `).join('');
        } else {
            histSection.classList.add('hidden');
        }
    }

    function render() {
        const inv = document.getElementById('inventory');
        inv.innerHTML = '';

        if (tasks.length > 0) {
            const t = tasks[0];
            document.getElementById('spotlightTitle').innerText = t.title;
            document.getElementById('spotlightDetails').innerText = `Imp: ${t.importance} | ${t.duration}m | Due: ${formatDate(t.due_date)}`;
        } else {
            document.getElementById('spotlightTitle').innerText = "All Clear";
            document.getElementById('spotlightDetails').innerText = "Nothing left to process.";
        }

        tasks.forEach(t => {
            const item = document.createElement('div');
            item.className = `task-item ${t.importance >= 8 ? 'priority-high' : ''}`;
            item.innerHTML = `
                <div class="task-info">
                    <div style="font-weight:700;">[${t.importance}] ${t.title}</div>
                    <div class="task-meta">${t.duration} mins | Due: ${formatDate(t.due_date)}</div>
                </div>
                <input type="checkbox" style="width:22px; height:22px;" onclick="completeTask('${t.id}')">
            `;
            inv.appendChild(item);
        });
    }
</script>
</body>
</html>
