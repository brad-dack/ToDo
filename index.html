<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ActionStream | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; 
            --text: #1e293b; --error: #ef4444; --success: #10b981; --border: #e2e8f0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; }
        .container { max-width: 500px; margin: auto; padding-bottom: 100px; }

        /* Dashboard & Forecast */
        .dashboard { background: var(--primary); color: white; padding: 24px 20px; border-radius: 32px; margin-bottom: 25px; box-shadow: 0 20px 40px -12px rgba(15, 23, 42, 0.3); }
        .week-bar { display: flex; gap: 6px; margin-bottom: 24px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 16px; }
        .day-cap { flex: 1; text-align: center; }
        .cap-dot { height: 4px; width: 100%; border-radius: 2px; margin-top: 6px; }
        
        .priority-deck { display: flex; flex-direction: column; gap: 12px; }
        .prio-card { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        .prio-info { flex: 1; overflow: hidden; margin-right: 12px; }
        .prio-title { font-weight: 700; font-size: 0.95rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prio-meta { font-size: 0.75rem; opacity: 0.6; }

        /* UI Elements */
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; margin: 25px 0 12px; display: block; }
        input, select { width: 100%; height: 50px; padding: 0 16px; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 16px; margin-bottom: 12px; outline: none; background: white; }
        .submit-btn { background: var(--accent); color: white; width: 100%; height: 54px; border-radius: 16px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; }
        
        .todo-item { display: flex; align-items: center; padding: 16px; background: white; border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); gap: 12px; }
        .completed-item { opacity: 0.6; background: transparent; border: 1px dashed var(--border); }
        .staged-item { background: #f8fafc; padding: 10px; border-radius: 12px; margin-bottom: 5px; font-size: 0.8rem; border: 1px solid #e2e8f0; }

        /* Buttons */
        .btn-done { background: var(--accent); color: white; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; border: none; }
        .btn-push { background: rgba(255,255,255,0.1); color: white; padding: 0 14px; height: 42px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .btn-edit { background: none; border: none; color: #64748b; cursor: pointer; padding: 8px; font-size: 1.2rem; }
        .btn-bulk { background: rgba(255,255,255,0.15); color: white; border: none; font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-weight: 700; }

        /* Overlays */
        .recur-link { font-size: 0.65rem; color: var(--accent); text-decoration: none; font-weight: 700; cursor: pointer; position: absolute; right: 20px; top: 25px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .settings-card { background: white; width: 100%; max-width: 400px; border-radius: 24px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span class="section-title" style="color:rgba(255,255,255,0.5); margin:0;">Forecast</span>
            <div style="display:flex; gap:10px;">
                <button onclick="pushAllToday()" class="btn-bulk">PUSH ALL TODAY</button>
                <button onclick="toggleSettings()" class="btn-bulk">SETTINGS</button>
            </div>
        </div>
        <div id="weekBar" class="week-bar"></div>
        <span class="section-title" style="color:rgba(255,255,255,0.5); margin: 0 0 12px 0;">Next 3 Priorities</span>
        <div id="priorityDeck" class="priority-deck"></div>
    </div>

    <div class="card" id="goalCapture">
        <a class="recur-link" onclick="toggleRecurrence()">⚡ Reoccurring: <span id="recurLabel">None</span></a>
        <span class="section-title">New Project Goal</span>
        <input id="mainGoal" placeholder="Project Name">
        <div style="display:flex; gap:12px; align-items: flex-end;">
            <div><label style="font-size:0.7rem; color:#64748b;">Deadline</label><input type="date" id="goalDate"></div>
            <div style="flex:0 0 40%;"><label style="font-size:0.7rem; color:#64748b;">Importance</label><select id="mainImp"></select></div>
        </div>
        
        <div id="recurrencePicker" class="hidden" style="margin-top:10px; padding:15px; background:#f1f5f9; border-radius:12px;">
            <label style="font-size:0.7rem; font-weight:800;">Repeat Every:</label>
            <select id="recurRule" onchange="document.getElementById('recurLabel').innerText = this.value || 'None'">
                <option value="">None</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
                <option value="Fortnightly">Fortnightly</option>
                <option value="Monthly">Monthly</option>
                <option value="Quarterly">Quarterly</option>
                <option value="Bi-annually">Bi-annually</option>
                <option value="Annually">Annually</option>
            </select>
        </div>
        <button class="submit-btn" style="margin-top:10px;" onclick="lockGoal()">Breakdown Actions</button>
    </div>

    <div class="card hidden" id="planningArea" style="border: 2px solid var(--accent); background: #f0f7ff;">
        <h3 id="displayGoal" style="margin:0 0 15px 0; font-size:1rem;"></h3>
        <input id="stageTitle" placeholder="Action Title">
        <div style="display:flex; gap:12px;">
            <div style="flex:0 0 35%;"><label style="font-size:0.7rem;">Mins (15 max)</label><input type="number" id="stageMins" max="15" value="15"></div>
            <div><label style="font-size:0.7rem;">Action Date</label><input type="date" id="stageDate"></div>
        </div>
        <button onclick="addToStaging()" style="background:var(--success); color:white; width:100%; height:48px; border-radius:14px; font-weight:700; margin-bottom:15px; border:none; cursor:pointer;">+ Add to Sequence</button>
        <div id="stagedList" style="margin-bottom:20px; border-top:1px solid #dbeafe; padding-top:15px;"></div>
        <div style="display:flex; gap:12px;">
            <button onclick="finalisePlanning()" class="submit-btn" style="flex:2">Commit to List</button>
            <button onclick="cancelPlanning()" style="background:#64748b; color:white; flex:1; border-radius:16px; border:none; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <span class="section-title">Active ToDo List</span>
    <div id="masterToDo"></div>
    <span class="section-title" style="margin-top:40px;">Recently Completed</span>
    <div id="archivedToDo"></div>

    <div id="settingsOverlay" class="overlay hidden">
        <div class="settings-card">
            <span class="section-title">Weekly Capacity (Mins)</span>
            <div id="settingsGrid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;"></div>
            <div style="margin-bottom:20px;">
                <label style="font-size:0.6rem; font-weight:800; color:#64748b; text-transform:uppercase;">Timezone</label>
                <select id="set-tz">
                    <option value="Australia/Perth">Perth (AWST)</option>
                    <option value="Australia/Sydney">Sydney (AEST)</option>
                    <option value="UTC">UTC</option>
                </select>
            </div>
            <button class="submit-btn" onclick="saveSettings()">Save Schedule</button>
            <button onclick="toggleSettings()" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = { URL: "https://wuhklqulwhioiynoadtj.supabase.co", KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx" };
    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let masterTasks = [], stagingTasks = [], activeGoal = null, settings = {};

    const formatDate = (dStr) => { if(!dStr) return ""; const [y,m,d] = dStr.split("-"); return `${d}/${m}/${y.slice(-2)}`; };

    window.onload = async () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        const grid = document.getElementById('settingsGrid');
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(d => grid.innerHTML += `<div><label style="font-size:0.6rem; font-weight:800; color:#64748b; text-transform:uppercase;">${d}</label><input type="number" id="set-${d}"></div>`);
        await loadSettings();
        refresh();
    };

    async function loadSettings() {
        const { data } = await client.from('user_settings').select('*').eq('id', 'default_user').single();
        if (data) settings = data;
    }

    async function refresh() {
        const { data: active } = await client.from('subtasks').select('*').eq('completed', false);
        const { data: completed } = await client.from('subtasks').select('*').eq('completed', true).order('updated_at', { ascending: false }).limit(5);
        masterTasks = active || [];
        masterTasks.sort((a,b) => new Date(a.due_date) - new Date(b.due_date) || b.importance - a.importance);
        renderDashboard();
        renderToDo();
        renderArchived(completed || []);
    }

    /* --- Recurrence & Goal Logic --- */
    function toggleRecurrence() { document.getElementById('recurrencePicker').classList.toggle('hidden'); }

    function lockGoal() {
        const goal = document.getElementById('mainGoal').value;
        const date = document.getElementById('goalDate').value;
        const recur = document.getElementById('recurRule').value;
        if(!goal || !date) return alert("Goal Name & Deadline required");
        activeGoal = { goal, date, imp: document.getElementById('mainImp').value, recur, id: 'proj_' + Date.now() };
        document.getElementById('displayGoal').innerText = `Project: ${goal} ${recur ? '(Repeat: '+recur+')' : ''}`;
        document.getElementById('stageDate').value = date;
        document.getElementById('goalCapture').classList.add('hidden');
        document.getElementById('planningArea').classList.remove('hidden');
    }

    function addToStaging() {
        const title = document.getElementById('stageTitle').value;
        const mins = parseInt(document.getElementById('stageMins').value);
        const date = document.getElementById('stageDate').value;
        if(mins > 15) return alert("break task down smaller (15min max)");
        if(date > activeGoal.date) return alert("Date exceeds project deadline");
        stagingTasks.push({ title, duration: mins, due_date: date });
        document.getElementById('stageTitle').value = '';
        renderStaging();
    }

    function renderStaging() {
        document.getElementById('stagedList').innerHTML = stagingTasks.map(t => `<div class="staged-item"><b>${t.title}</b> - ${t.duration}m on ${formatDate(t.due_date)}</div>`).join('');
    }

    async function finalisePlanning() {
        const toInsert = stagingTasks.map(t => ({ 
            title: `${activeGoal.goal}: ${t.title}`, 
            duration: t.duration, due_date: t.due_date, 
            importance: parseInt(activeGoal.imp), goal_deadline: activeGoal.date,
            project_id: activeGoal.id, recurrence_rule: activeGoal.recur || null,
            updated_at: new Date().toISOString() 
        }));
        await client.from('subtasks').insert(toInsert);
        cancelPlanning(); refresh();
    }

    /* --- Core Actions --- */
    async function completeTask(id) {
        const task = masterTasks.find(t => t.id == id);
        if (!task) return;

        const { error } = await client.from('subtasks')
            .update({ completed: true, updated_at: new Date().toISOString() })
            .eq('id', id);

        if (error) return console.error("Complete Error:", error);

        if (task.recurrence_rule && task.project_id) {
            const { data: remaining } = await client.from('subtasks')
                .select('id')
                .eq('project_id', task.project_id)
                .eq('completed', false);

            if (!remaining || remaining.length === 0) {
                await handleRecurrence(task);
            }
        }
        refresh();
    }

    async function uncompleteTask(id) {
        const { error } = await client.from('subtasks').update({ completed: false }).eq('id', id);
        if (error) console.error("Undo Error:", error);
        refresh();
    }

    async function pushTask(id) {
        const t = masterTasks.find(task => task.id == id);
        if (!t) return;
        const tom = new Date(); tom.setDate(tom.getDate() + 1);
        const tomStr = tom.toISOString().split('T')[0];

        if (t.goal_deadline && tomStr > t.goal_deadline) {
            alert("Cannot push: Past project deadline!");
            return;
        }
        await client.from('subtasks').update({ due_date: tomStr }).eq('id', id);
        refresh();
    }

    async function deleteTask(id) {
        const task = masterTasks.find(t => t.id == id);
        if (!task) return;
        let mode = confirm("Delete ENTIRE project? (Cancel for just this task)") ? "All" : "One";
        if (mode === "All" && task.project_id) {
            await client.from('subtasks').delete().eq('project_id', task.project_id);
        } else {
            await client.from('subtasks').delete().eq('id', id);
        }
        refresh();
    }

    async function handleRecurrence(task) {
        const offsets = { Daily: 1, Weekly: 7, Fortnightly: 14, Monthly: 30, Quarterly: 90, 'Bi-annually': 182, Annually: 365 };
        const daysToAdd = offsets[task.recurrence_rule];
        if (!daysToAdd) return;

        const { data: templateTasks } = await client.from('subtasks').select('*').eq('project_id', task.project_id);
        if (!templateTasks) return;

        const newProjId = 'proj_' + Date.now();
        const newBatch = templateTasks.map(t => {
            let d = new Date(t.due_date); d.setDate(d.getDate() + daysToAdd);
            let g = new Date(t.goal_deadline); g.setDate(g.getDate() + daysToAdd);
            
            // WE MUST REMOVE THE OLD ID SO SUPABASE CAN CREATE A NEW ONE
            const { id, ...taskData } = t; 
            
            return {
                ...taskData,
                due_date: d.toISOString().split('T')[0],
                goal_deadline: g.toISOString().split('T')[0],
                project_id: newProjId,
                completed: false,
                updated_at: new Date().toISOString()
            };
        });
        await client.from('subtasks').insert(newBatch);
    }

   async function editTask(id) {
        const t = masterTasks.find(task => task.id == id);
        if (!t) return;

        // Base options
        let promptText = "1: Edit Title/Mins/Date";
        
        // Dynamic option: Only show if the task belongs to a recurring project
        if (t.recurrence_rule) {
            promptText += "\n2: Change Recurrence (" + t.recurrence_rule + ")";
        }

        const action = prompt(promptText, "1");

        if (action === "1") {
            const newTitle = prompt("Update Title:", t.title);
            const newMins = prompt("Update Minutes (max 15):", t.duration);
            const newDate = prompt("Update Due Date (YYYY-MM-DD):", t.due_date);
            
            if (newTitle && newMins && newDate) {
                const duration = parseInt(newMins);
                if (duration > 15) return alert("Task must be 15 mins or less.");
                await client.from('subtasks').update({ 
                    title: newTitle, 
                    duration: duration, 
                    due_date: newDate 
                }).eq('id', id);
            }
        } 
        else if (action === "2" && t.recurrence_rule) {
            const newRule = prompt("New Frequency (Daily, Weekly, Fortnightly, Monthly, Quarterly, Annually):", t.recurrence_rule);
            const validRules = ['Daily', 'Weekly', 'Fortnightly', 'Monthly', 'Quarterly', 'Bi-annually', 'Annually'];
            
            if (newRule && validRules.includes(newRule)) {
                // Update ALL active tasks in this project so the next cycle picks up the new rule
                await client.from('subtasks')
                    .update({ recurrence_rule: newRule })
                    .eq('project_id', t.project_id);
                alert("Recurrence updated to " + newRule);
            } else if (newRule) {
                alert("Invalid rule. Please use standard frequencies.");
            }
        }

        refresh();
    }

    async function pushAllToday() {
        const todayStr = new Date().toISOString().split('T')[0];
        const tomStr = new Date(new Date().setDate(new Date().getDate() + 1)).toISOString().split('T')[0];
        const todayTasks = masterTasks.filter(t => t.due_date === todayStr);
        for (let t of todayTasks) {
            if (t.goal_deadline && tomStr > t.goal_deadline) continue; 
            await client.from('subtasks').update({ due_date: tomStr }).eq('id', t.id);
        }
        refresh();
    }

    /* --- UI Rendering --- */
    function renderDashboard() {
        const bar = document.getElementById('weekBar'); bar.innerHTML = '';
        const keys = ['sun_limit', 'mon_limit', 'tue_limit', 'wed_limit', 'thu_limit', 'fri_limit', 'sat_limit'];
        for(let i=0; i<7; i++) {
            const d = new Date(); d.setDate(d.getDate() + i);
            const load = masterTasks.filter(t => t.due_date === d.toISOString().split('T')[0]).reduce((s, t) => s + t.duration, 0);
            const color = load > (settings[keys[d.getDay()]] || 45) ? 'var(--error)' : (load > 0 ? 'var(--success)' : 'rgba(255,255,255,0.1)');
            bar.innerHTML += `<div class="day-cap"><div style="font-size:0.6rem; opacity:0.6;">${['S','M','T','W','T','F','S'][d.getDay()]}</div><div class="cap-dot" style="background:${color};"></div></div>`;
        }
        const deck = document.getElementById('priorityDeck'); deck.innerHTML = '';
        masterTasks.slice(0, 3).forEach(t => {
            deck.innerHTML += `
                <div class="prio-card">
                    <div class="prio-info"><span class="prio-title">${t.title}</span><span class="prio-meta">${formatDate(t.due_date)} • ${t.duration}m</span></div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-push" onclick='pushTask("${t.id}")'>→</button>
                        <button class="btn-done" onclick='completeTask("${t.id}")'>✓</button>
                    </div>
                </div>`;
        });
    }

    function renderToDo() {
        const list = document.getElementById('masterToDo'); list.innerHTML = '';
        masterTasks.forEach(t => {
            list.innerHTML += `
                <div class="todo-item">
                    <div style="font-weight:900; color:var(--accent); font-size:0.8rem; width:20px;">${t.importance}</div>
                    <div style="flex:1;"><b>${t.title}</b><br><small>${formatDate(t.due_date)} • ${t.duration}m</small></div>
                    <button class="btn-edit" style="color:#ef4444;" onclick='deleteTask("${t.id}")'>✕</button>
                    <button class="btn-edit" onclick='editTask("${t.id}")'>✎</button>
                    <button class="btn-done" style="background:#f1f5f9; color:#64748b" onclick='completeTask("${t.id}")'>✓</button>
                </div>`;
        });
    }

    function renderArchived(tasks) {
        const list = document.getElementById('archivedToDo'); list.innerHTML = '';
        tasks.forEach(t => {
            list.innerHTML += `<div class="todo-item completed-item"><div style="flex:1;"><strike>${t.title}</strike></div><button class="btn-edit" style="font-size:1rem;" onclick='uncompleteTask("${t.id}")'>⟲</button></div>`;
        });
    }

    function toggleSettings() { document.getElementById('settingsOverlay').classList.toggle('hidden'); }
    async function saveSettings() {
        const n = { id: 'default_user', timezone: document.getElementById('set-tz').value };
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(d => n[`${d}_limit`] = parseInt(document.getElementById(`set-${d}`).value));
        await client.from('user_settings').upsert(n); settings = n; toggleSettings(); refresh();
    }
    function cancelPlanning() {
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
        document.getElementById('mainGoal').value = ''; document.getElementById('goalDate').value = '';
        stagingTasks = []; document.getElementById('stagedList').innerHTML = '';
    }
</script>
</body>
</html>
