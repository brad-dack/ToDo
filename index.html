<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionStream | 15m GTD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #0f172a; --accent: #3b82f6; --text: #334155; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; padding: 40px 20px; }
        
        #spotlight {
            background: var(--primary); color: white; padding: 40px; border-radius: 24px; 
            margin-bottom: 30px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .spotlight-task { font-size: 1.6rem; font-weight: 700; margin: 15px 0; color: #fff; }
        
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; flex: 1; }
        
        button { background: var(--accent); color: white; font-weight: 600; border: none; cursor: pointer; min-width: 120px; }
        button.add-step { background: #10b981; }
        button.finish { background: #64748b; }
        button.complete { background: #fff; color: var(--primary); margin-top: 15px; width: 100%; }

        .task-list { margin-top: 20px; }
        .task-item { 
            display: flex; align-items: center; padding: 16px; background: white; 
            border-radius: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0;
        }
        .task-info { flex: 1; }
        .task-meta { font-size: 0.75rem; color: #94a3b8; }
        .importance-tag { 
            font-weight: 800; padding: 2px 8px; border-radius: 4px; 
            background: #fee2e2; color: #ef4444; margin-right: 8px;
        }
        .hidden { display: none; }
        .warning { color: #ef4444; font-size: 0.8rem; margin-top: -5px; margin-bottom: 10px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div id="spotlight">
        <div style="font-size: 0.8rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px;">Top Action Priority</div>
        <div id="spotlightTitle" class="spotlight-task">No actions available.</div>
        <div id="spotlightDetails" style="font-size: 0.85rem; opacity: 0.8;">Add a task to begin.</div>
        <button class="complete" onclick="completeSpotlight()">Mark Completed</button>
    </div>

    <div class="card" id="processingCard">
        <h2 id="flowHeader" style="font-size: 1rem; margin-bottom:15px;">Capture New Concept</h2>
        
        <input id="currentTitle" placeholder="What is the goal/project?" style="width:100%; margin-bottom:10px;">
        
        <div id="stepInputs">
            <div class="input-row">
                <input id="stepTitle" placeholder="Physical step (e.g., 'Draft email')">
            </div>
            <div class="input-row">
                <input type="date" id="stepDate">
                <input type="number" id="stepMinutes" placeholder="Mins (max 15)" max="15">
                <select id="stepImp">
                    <option value="" disabled selected>Imp (1-10)</option>
                    <option value="1">1 (Low)</option><option value="5">5</option><option value="10">10 (High)</option>
                </select>
            </div>
            <div id="limitWarning" class="warning hidden">⚠️ GTD Rule: Tasks must be ≤ 15 minutes.</div>
            
            <div style="display:flex; gap:10px;">
                <button class="add-step" onclick="saveStep()">Add Step</button>
                <button class="finish" onclick="resetFlow()">Done Processing</button>
            </div>
        </div>
    </div>

    <h2 style="font-size: 0.85rem; color: #94a3b8; text-transform: uppercase;">Upcoming Action Inventory</h2>
    <div id="inventory" class="task-list"></div>
</div>

<script>
    const CONFIG = {
        URL: "https://wuhklqulwhioiynoadtj.supabase.co",
        KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
    };

    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let allActions = [];

    window.onload = refresh;

    async function refresh() {
        const { data } = await client.from('subtasks').select('*').eq('completed', false);
        allActions = data || [];
        
        // Spotlight Logic: Closest Date + Highest Importance
        allActions.sort((a, b) => {
            const dateA = new Date(a.due_date);
            const dateB = new Date(b.due_date);
            if (dateA - dateB !== 0) return dateA - dateB;
            return b.importance - a.importance;
        });

        render();
    }

    async function saveStep() {
        const goal = document.getElementById('currentTitle').value;
        const title = document.getElementById('stepTitle').value;
        const mins = parseInt(document.getElementById('stepMinutes').value);
        const imp = parseInt(document.getElementById('stepImp').value);
        const date = document.getElementById('stepDate').value;

        if (mins > 15) {
            document.getElementById('limitWarning').classList.remove('hidden');
            return;
        }

        if (!title || !mins || !imp || !date) return alert("Please fill all step fields.");

        document.getElementById('limitWarning').classList.add('hidden');

        // Combine goal and step for clarity
        const finalTitle = goal ? `${goal}: ${title}` : title;

        await client.from('subtasks').insert([{
            title: finalTitle,
            importance: imp,
            duration: mins,
            due_date: date,
            completed: false
        }]);

        // Keep goal but clear step for rapid entry
        document.getElementById('stepTitle').value = '';
        document.getElementById('stepTitle').focus();
        refresh();
    }

    function resetFlow() {
        document.getElementById('currentTitle').value = '';
        document.getElementById('stepTitle').value = '';
        document.getElementById('stepMinutes').value = '';
        document.getElementById('stepDate').value = '';
        refresh();
    }

    async function completeTask(id) {
        await client.from('subtasks').update({ completed: true }).eq('id', id);
        refresh();
    }

    async function completeSpotlight() {
        if (allActions.length > 0) completeTask(allActions[0].id);
    }

    function render() {
        const inventory = document.getElementById('inventory');
        inventory.innerHTML = '';

        if (allActions.length > 0) {
            const top = allActions[0];
            document.getElementById('spotlightTitle').innerText = top.title;
            document.getElementById('spotlightDetails').innerText = `${top.duration}m | Imp: ${top.importance} | Due: ${top.due_date}`;
        } else {
            document.getElementById('spotlightTitle').innerText = "Nothing Scheduled";
            document.getElementById('spotlightDetails').innerText = "Ready for the next concept.";
        }

        allActions.forEach(t => {
            const item = document.createElement('div');
            item.className = 'task-item';
            item.innerHTML = `
                <div class="task-info">
                    <div style="font-weight:600; font-size:0.9rem;">
                        <span class="importance-tag">! ${t.importance}</span>${t.title}
                    </div>
                    <div class="task-meta">⏱️ ${t.duration}m | 📅 ${t.due_date}</div>
                </div>
                <input type="checkbox" style="width:20px; height:20px; cursor:pointer;" onclick="completeTask('${t.id}')">
            `;
            inventory.appendChild(item);
        });
    }
</script>
</body>
</html>
