<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ActionStream | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; 
            --text: #1e293b; --error: #ef4444; --success: #10b981; --border: #e2e8f0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; }
        .container { max-width: 500px; margin: auto; padding-bottom: 100px; }

        /* Dashboard & Forecast */
        .dashboard { background: var(--primary); color: white; padding: 24px 20px; border-radius: 32px; margin-bottom: 25px; box-shadow: 0 20px 40px -12px rgba(15, 23, 42, 0.3); }
        .week-bar { display: flex; gap: 6px; margin-bottom: 24px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 16px; }
        .day-cap { flex: 1; text-align: center; }
        .cap-dot { height: 4px; width: 100%; border-radius: 2px; margin-top: 6px; }
        
        .priority-deck { display: flex; flex-direction: column; gap: 12px; }
        .prio-card { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        .prio-info { flex: 1; overflow: hidden; margin-right: 12px; }
        .prio-title { font-weight: 700; font-size: 0.95rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prio-meta { font-size: 0.75rem; opacity: 0.6; }

        /* UI Elements */
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; margin: 25px 0 12px; display: block; }
        input, select { width: 100%; height: 50px; padding: 0 16px; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 16px; margin-bottom: 12px; outline: none; background: white; }
        .submit-btn { background: var(--accent); color: white; width: 100%; height: 54px; border-radius: 16px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; }
        
        .todo-item { display: flex; align-items: center; padding: 16px; background: white; border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); gap: 12px; }
        .completed-item { opacity: 0.6; background: transparent; border: 1px dashed var(--border); }
        .staged-item { background: #f8fafc; padding: 10px; border-radius: 12px; margin-bottom: 5px; font-size: 0.8rem; border: 1px solid #e2e8f0; }

        /* Buttons */
        .btn-done { background: var(--accent); color: white; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; border: none; }
        .btn-push { background: rgba(255,255,255,0.1); color: white; padding: 0 14px; height: 42px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .btn-edit { background: none; border: none; color: #64748b; cursor: pointer; padding: 8px; font-size: 1.2rem; }
        .btn-bulk { background: rgba(255,255,255,0.15); color: white; border: none; font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-weight: 700; }

        /* Overlays */
        .recur-link { font-size: 0.65rem; color: var(--accent); text-decoration: none; font-weight: 700; cursor: pointer; position: absolute; right: 20px; top: 25px; }

        /* Risk badges & banners */
        .risk-banner { padding: 12px 14px; border-radius: 14px; margin-bottom: 16px; font-size: 0.75rem; line-height: 1.4; }
        .risk-banner-overdue { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.35); color: #fecaca; }
        .risk-banner-atrisk { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.35); color: #fde68a; }
        .risk-banner b { color: white; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 0.55rem; font-weight: 800; letter-spacing: 0.5px; margin-left: 6px; vertical-align: middle; }
        .badge-overdue { background: var(--error); color: white; }
        .badge-atrisk { background: #f59e0b; color: white; }
        .todo-overdue { border-left: 4px solid var(--error); }
        .todo-atrisk { border-left: 4px solid #f59e0b; }
        .prio-overdue { border: 1px solid rgba(239,68,68,0.5); }
        .prio-atrisk { border: 1px solid rgba(245,158,11,0.5); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .settings-card { background: white; width: 100%; max-width: 400px; border-radius: 24px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span class="section-title" style="color:rgba(255,255,255,0.5); margin:0;">Forecast</span>
            <div style="display:flex; gap:10px;">
                <button onclick="pushAllToday()" class="btn-bulk">PUSH ALL TODAY</button>
                <button onclick="toggleSettings()" class="btn-bulk">SETTINGS</button>
            </div>
        </div>
        <div id="weekBar" class="week-bar"></div>
        <div id="riskBanners"></div>
        <span class="section-title" style="color:rgba(255,255,255,0.5); margin: 0 0 12px 0;">Next 3 Priorities</span>
        <div id="priorityDeck" class="priority-deck"></div>
    </div>

    <div class="card" id="goalCapture">
        <a class="recur-link" onclick="toggleRecurrence()">⚡ Reoccurring: <span id="recurLabel">None</span></a>
        <span class="section-title">New Project Goal</span>
        <input id="mainGoal" placeholder="Project Name">
        <div style="display:flex; gap:12px; align-items: flex-end;">
            <div><label style="font-size:0.7rem; color:#64748b;">Deadline</label><input type="date" id="goalDate"></div>
            <div style="flex:0 0 40%;"><label style="font-size:0.7rem; color:#64748b;">Importance</label><select id="mainImp"></select></div>
        </div>
        
        <div id="recurrencePicker" class="hidden" style="margin-top:10px; padding:15px; background:#f1f5f9; border-radius:12px;">
            <label style="font-size:0.7rem; font-weight:800;">Repeat Every:</label>
            <select id="recurRule" onchange="document.getElementById('recurLabel').innerText = this.value || 'None'">
                <option value="">None</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
                <option value="Fortnightly">Fortnightly</option>
                <option value="Monthly">Monthly</option>
                <option value="Quarterly">Quarterly</option>
                <option value="Bi-annually">Bi-annually</option>
                <option value="Annually">Annually</option>
            </select>
        </div>
        <button class="submit-btn" style="margin-top:10px;" onclick="lockGoal()">Breakdown Actions</button>
    </div>

    <div class="card hidden" id="planningArea" style="border: 2px solid var(--accent); background: #f0f7ff;">
        <h3 id="displayGoal" style="margin:0 0 15px 0; font-size:1rem;"></h3>
        <input id="stageTitle" placeholder="Action Title">
        <div style="display:flex; gap:12px;">
            <div style="flex:0 0 35%;"><label style="font-size:0.7rem;">Mins (15 max)</label><input type="number" id="stageMins" max="15" value="15"></div>
            <div><label style="font-size:0.7rem;">Action Date</label><input type="date" id="stageDate"></div>
        </div>
        <button onclick="addToStaging()" style="background:var(--success); color:white; width:100%; height:48px; border-radius:14px; font-weight:700; margin-bottom:15px; border:none; cursor:pointer;">+ Add to Sequence</button>
        <div id="stagedList" style="margin-bottom:20px; border-top:1px solid #dbeafe; padding-top:15px;"></div>
        <div style="display:flex; gap:12px;">
            <button onclick="finalisePlanning()" class="submit-btn" style="flex:2">Commit to List</button>
            <button onclick="cancelPlanning()" style="background:#64748b; color:white; flex:1; border-radius:16px; border:none; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <span class="section-title">Active ToDo List</span>
    <div id="masterToDo"></div>
    <span class="section-title" style="margin-top:40px;">Recently Completed</span>
    <div id="archivedToDo"></div>

    <div id="settingsOverlay" class="overlay hidden">
        <div class="settings-card">
            <span class="section-title">Weekly Capacity (Mins)</span>
            <div id="settingsGrid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;"></div>
            <div style="margin-bottom:20px;">
                <label style="font-size:0.6rem; font-weight:800; color:#64748b; text-transform:uppercase;">Timezone</label>
                <select id="set-tz">
                    <option value="Australia/Perth">Perth (AWST)</option>
                    <option value="Australia/Sydney">Sydney (AEST)</option>
                    <option value="UTC">UTC</option>
                </select>
            </div>
            <button class="submit-btn" onclick="saveSettings()">Save Schedule</button>
            <button onclick="toggleSettings()" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
    const CONFIG = { URL: "https://wuhklqulwhioiynoadtj.supabase.co", KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx" };
    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let masterTasks = [], stagingTasks = [], activeGoal = null, settings = {};

    const formatDate = (dStr) => { if(!dStr) return ""; const [y,m,d] = dStr.split("-"); return `${d}/${m}/${y.slice(-2)}`; };

    const ESC_MAP = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ESC_MAP[c]);

    const tz = () => settings.timezone || 'Australia/Perth';
    const localDateStr = (d = new Date()) => {
        const parts = new Intl.DateTimeFormat('en-CA', { timeZone: tz(), year:'numeric', month:'2-digit', day:'2-digit' }).formatToParts(d);
        const g = (t) => parts.find(p => p.type === t).value;
        return `${g('year')}-${g('month')}-${g('day')}`;
    };
    const parseDateUTC = (dateStr) => {
        const [y,m,d] = dateStr.split('-').map(Number);
        return new Date(Date.UTC(y, m-1, d));
    };
    const addDays = (dateStr, days) => {
        const dt = parseDateUTC(dateStr);
        dt.setUTCDate(dt.getUTCDate() + days);
        return dt.toISOString().split('T')[0];
    };
    const addMonths = (dateStr, months) => {
        const dt = parseDateUTC(dateStr);
        dt.setUTCMonth(dt.getUTCMonth() + months);
        return dt.toISOString().split('T')[0];
    };
    const dayOfWeek = (dateStr) => parseDateUTC(dateStr).getUTCDay();

    const RECUR_OFFSETS = {
        Daily: { d: 1 }, Weekly: { d: 7 }, Fortnightly: { d: 14 },
        Monthly: { m: 1 }, Quarterly: { m: 3 }, 'Bi-annually': { m: 6 }, Annually: { m: 12 }
    };
    const shiftByRule = (dateStr, rule) => {
        const o = RECUR_OFFSETS[rule];
        if (!o) return dateStr;
        return o.d ? addDays(dateStr, o.d) : addMonths(dateStr, o.m);
    };

    const dbCall = async (promise, label) => {
        const { data, error } = await promise;
        if (error) { alert(`${label} failed: ${error.message}`); return { error }; }
        return { data };
    };

    window.onload = async () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        const grid = document.getElementById('settingsGrid');
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(d => grid.innerHTML += `<div><label style="font-size:0.6rem; font-weight:800; color:#64748b; text-transform:uppercase;">${d}</label><input type="number" id="set-${d}"></div>`);
        
        new Sortable(document.getElementById('stagedList'), {
            animation: 150,
            onEnd: (evt) => {
                const item = stagingTasks.splice(evt.oldIndex, 1)[0];
                stagingTasks.splice(evt.newIndex, 0, item);
            }
        });

        await loadSettings();
        refresh();
    };

    async function loadSettings() {
        const { data } = await client.from('user_settings').select('*').eq('id', 'default_user').single();
        if (data) settings = data;
    }

    let projectStates = {}, projectNames = {};

    async function refresh() {
        const { data: active } = await client.from('subtasks').select('*').eq('completed', false);
        const { data: completed } = await client.from('subtasks').select('*').eq('completed', true).order('updated_at', { ascending: false }).limit(5);
        masterTasks = active || [];
        masterTasks.sort((a,b) => new Date(a.due_date) - new Date(b.due_date) || b.importance - a.importance);
        computeProjectStates();
        renderDashboard();
        renderToDo();
        renderArchived(completed || []);
    }

    function computeProjectStates() {
        projectStates = {}; projectNames = {};
        const todayStr = localDateStr();
        const dayKeys = ['sun','mon','tue','wed','thu','fri','sat'];

        const byProject = {};
        for (const t of masterTasks) {
            if (!t.project_id) continue;
            if (!byProject[t.project_id]) byProject[t.project_id] = { tasks: [], goal_deadline: t.goal_deadline };
            byProject[t.project_id].tasks.push(t);
            if (!projectNames[t.project_id] && t.title) {
                const idx = t.title.indexOf(':');
                projectNames[t.project_id] = idx > 0 ? t.title.slice(0, idx) : t.title;
            }
        }

        for (const [pid, info] of Object.entries(byProject)) {
            const deadline = info.goal_deadline;
            if (!deadline) { projectStates[pid] = 'normal'; continue; }

            if (deadline < todayStr) { projectStates[pid] = 'overdue'; continue; }

            const projectMinutes = info.tasks.reduce((s,t) => s + t.duration, 0);
            let pool = 0, cursor = todayStr;
            while (cursor <= deadline) {
                const limit = settings[dayKeys[dayOfWeek(cursor)] + '_limit'] || 0;
                const otherLoad = masterTasks
                    .filter(t => t.due_date === cursor && t.project_id !== pid)
                    .reduce((s,t) => s + t.duration, 0);
                pool += Math.max(0, limit - otherLoad);
                cursor = addDays(cursor, 1);
            }
            projectStates[pid] = projectMinutes > pool ? 'at-risk' : 'normal';
        }
    }

    const stateBadge = (pid) => {
        const s = projectStates[pid];
        if (s === 'overdue') return ' <span class="badge badge-overdue">OVERDUE</span>';
        if (s === 'at-risk') return ' <span class="badge badge-atrisk">AT RISK</span>';
        return '';
    };
    const stateRowClass = (pid) => {
        const s = projectStates[pid];
        return s === 'overdue' ? ' todo-overdue' : s === 'at-risk' ? ' todo-atrisk' : '';
    };
    const statePrioClass = (pid) => {
        const s = projectStates[pid];
        return s === 'overdue' ? ' prio-overdue' : s === 'at-risk' ? ' prio-atrisk' : '';
    };

    function hasCapacity(dateStr, taskDuration, ignoreTaskId = null) {
        const days = ['sun','mon','tue','wed','thu','fri','sat'];
        const limit = settings[`${days[dayOfWeek(dateStr)]}_limit`] || 45;
        
        const currentLoad = masterTasks
            .filter(t => t.due_date === dateStr && t.id !== ignoreTaskId)
            .reduce((s, t) => s + t.duration, 0);
            
        return (currentLoad + taskDuration) <= limit;
    }

    function lockGoal() {
        const goal = document.getElementById('mainGoal').value.trim();
        const date = document.getElementById('goalDate').value;
        if(!goal || !date) return alert("Goal Name & Deadline required");
        if(date < localDateStr()) return alert("Deadline cannot be in the past");
        activeGoal = { goal, date, imp: document.getElementById('mainImp').value, recur: document.getElementById('recurRule').value, id: 'proj_' + Date.now() };
        document.getElementById('displayGoal').innerText = `Project: ${goal}`;
        document.getElementById('stageDate').value = date;
        document.getElementById('goalCapture').classList.add('hidden');
        document.getElementById('planningArea').classList.remove('hidden');
    }

    function addToStaging() {
        const title = document.getElementById('stageTitle').value.trim();
        const mins = parseInt(document.getElementById('stageMins').value);
        const date = document.getElementById('stageDate').value;

        if(!title) return alert("Action title required");
        if(!date) return alert("Action date required");
        if(!Number.isFinite(mins) || mins <= 0) return alert("Minutes must be a positive number");
        if(mins > 15) return alert("Max 15 mins per action");
        if(date > activeGoal.date) return alert("Action date past deadline");
        
        const stagedLoad = stagingTasks.filter(t => t.due_date === date).reduce((s,t) => s + t.duration, 0);
        if(!hasCapacity(date, mins + stagedLoad)) return alert("Day is at capacity!");

        stagingTasks.push({ title, duration: mins, due_date: date });
        document.getElementById('stageTitle').value = '';
        renderStaging();
    }

    function renderStaging() {
        document.getElementById('stagedList').innerHTML = stagingTasks.map(t =>
            `<div class="staged-item" style="cursor:grab">☰ <b>${esc(t.title)}</b> (${t.duration}m) - ${formatDate(t.due_date)}</div>`
        ).join('');
    }

    async function finalisePlanning() {
        const toInsert = stagingTasks.map((t, idx) => ({ 
            title: `${activeGoal.goal}: ${t.title}`, 
            duration: t.duration, 
            due_date: t.due_date, 
            importance: parseInt(activeGoal.imp), 
            goal_deadline: activeGoal.date,
            project_id: activeGoal.id, 
            recurrence_rule: activeGoal.recur || null,
            sort_order: idx 
        }));

        if (!toInsert.length) return alert("Add at least one action before committing");
        const { error } = await client.from('subtasks').insert(toInsert);

        if (error) {
            alert("Error saving tasks: " + error.message);
        } else {
            // BUG FIX: Reset project inputs
            document.getElementById('mainGoal').value = '';
            document.getElementById('goalDate').value = '';
            document.getElementById('recurRule').value = '';
            document.getElementById('recurLabel').innerText = 'None';
            
            cancelPlanning(); 
            refresh();
        }
    }

    async function pushTask(id) {
        const t = masterTasks.find(task => task.id == id);
        if (!t) return;
        const targetDateStr = addDays(t.due_date, 1);

        if (t.goal_deadline && targetDateStr > t.goal_deadline) return alert("Cannot push: Past project deadline!");
        if (!hasCapacity(targetDateStr, t.duration, t.id)) return alert(`${formatDate(targetDateStr)} is already at capacity!`);

        const { error } = await dbCall(client.from('subtasks').update({ due_date: targetDateStr, updated_at: new Date().toISOString() }).eq('id', id), "Push");
        if (!error) refresh();
    }

    async function pushAllToday() {
        const todayStr = localDateStr();
        const tomStr = addDays(todayStr, 1);
        const tasks = masterTasks.filter(t => t.due_date === todayStr);

        let count = 0, failed = 0;
        for (let t of tasks) {
            if ((!t.goal_deadline || tomStr <= t.goal_deadline) && hasCapacity(tomStr, t.duration, t.id)) {
                const { error } = await client.from('subtasks').update({ due_date: tomStr }).eq('id', t.id);
                if (error) { failed++; continue; }
                t.due_date = tomStr;
                count++;
            }
        }
        alert(`Pushed ${count} tasks${failed ? ` (${failed} failed)` : ''}.`);
        refresh();
    }

    async function completeTask(id) {
        const task = masterTasks.find(t => t.id == id);
        const { error } = await dbCall(client.from('subtasks').update({ completed: true, updated_at: new Date().toISOString() }).eq('id', id), "Complete");
        if (error) return;

        if (task?.recurrence_rule) {
            const { data } = await client.from('subtasks').select('id').eq('project_id', task.project_id).eq('completed', false);
            if (!data || data.length === 0) await handleRecurrence(task);
        }
        refresh();
    }

    async function handleRecurrence(task) {
        if (!RECUR_OFFSETS[task.recurrence_rule]) return;
        const { data: templates, error } = await client.from('subtasks').select('*').eq('project_id', task.project_id);
        if (error || !templates) { alert("Recurrence clone failed: " + (error?.message || "no rows")); return; }
        const newProjId = 'proj_' + Date.now();

        const newBatch = templates.map(t => {
            const { id, created_at, updated_at, ...data } = t;
            return {
                ...data,
                due_date: shiftByRule(t.due_date, task.recurrence_rule),
                goal_deadline: t.goal_deadline ? shiftByRule(t.goal_deadline, task.recurrence_rule) : null,
                project_id: newProjId,
                completed: false
            };
        });
        await dbCall(client.from('subtasks').insert(newBatch), "Recurrence clone");
    }

    async function deleteTask(id) {
        if (!confirm("Delete this task?")) return;
        const { error } = await dbCall(client.from('subtasks').delete().eq('id', id), "Delete");
        if (!error) refresh();
    }

    const VALID_RULES = ['Daily', 'Weekly', 'Fortnightly', 'Monthly', 'Quarterly', 'Bi-annually', 'Annually'];

    async function editTask(id) {
        const t = masterTasks.find(task => task.id == id);
        if (!t) return;
        let menu = "1: Edit Title/Mins/Date/Importance";
        if (t.recurrence_rule) menu += "\n2: Change Recurrence Frequency";
        const action = prompt(menu, "1");

        if (action === "1") {
            const newTitle = prompt("Update Title:", t.title);
            if (newTitle === null) return;
            const newMins = prompt("Update Minutes (max 15):", t.duration);
            if (newMins === null) return;
            const newDate = prompt("Update Date (YYYY-MM-DD):", t.due_date);
            if (newDate === null) return;
            const newImp = prompt("Update Importance (1-10):", t.importance);
            if (newImp === null) return;

            const duration = parseInt(newMins);
            const importance = parseInt(newImp);
            if (!newTitle.trim()) return alert("Title required.");
            if (!Number.isFinite(duration) || duration <= 0) return alert("Minutes must be a positive number.");
            if (duration > 15) return alert("Task must be 15 mins or less.");
            if (!/^\d{4}-\d{2}-\d{2}$/.test(newDate)) return alert("Date must be YYYY-MM-DD.");
            if (!Number.isFinite(importance) || importance < 1 || importance > 10) return alert("Importance must be 1-10.");
            if (t.goal_deadline && newDate > t.goal_deadline) return alert("Date is past project deadline.");
            if (!hasCapacity(newDate, duration, t.id)) return alert("Target date is at capacity!");

            const { error } = await dbCall(client.from('subtasks').update({ title: newTitle.trim(), duration, due_date: newDate, importance }).eq('id', id), "Edit");
            if (error) return;
        } else if (action === "2" && t.recurrence_rule) {
            const newRule = prompt("New Frequency (" + VALID_RULES.join('/') + "):", t.recurrence_rule);
            if (newRule === null) return;
            if (!VALID_RULES.includes(newRule)) return alert("Invalid frequency.");
            const { error } = await dbCall(client.from('subtasks').update({ recurrence_rule: newRule }).eq('project_id', t.project_id), "Edit recurrence");
            if (error) return;
        } else {
            return;
        }
        refresh();
    }

    async function uncompleteTask(id) {
        const { error } = await dbCall(client.from('subtasks').update({ completed: false }).eq('id', id), "Uncomplete");
        if (!error) refresh();
    }

    function renderDashboard() {
        const todayStr = localDateStr();
        const dayLabels = ['S','M','T','W','T','F','S'];
        const dayKeys = ['sun','mon','tue','wed','thu','fri','sat'];
        const bar = document.getElementById('weekBar');
        bar.innerHTML = Array.from({length: 7}, (_, i) => {
            const dateStr = addDays(todayStr, i);
            const dow = dayOfWeek(dateStr);
            const load = masterTasks.filter(t => t.due_date === dateStr).reduce((s, t) => s + t.duration, 0);
            const limit = settings[dayKeys[dow] + '_limit'] || 45;
            const pct = limit ? load / limit : 0;
            const color = load >= limit ? 'var(--error)'
                : pct >= 0.66 ? '#f59e0b'
                : load > 0 ? 'var(--success)'
                : 'rgba(255,255,255,0.1)';
            const todayMark = i === 0 ? 'border:1px solid rgba(255,255,255,0.4); border-radius:8px; padding:2px;' : '';
            return `<div class="day-cap" style="${todayMark}"><div style="font-size:0.6rem; opacity:0.6;">${dayLabels[dow]}</div><div class="cap-dot" style="background:${color};"></div></div>`;
        }).join('');

        const deck = document.getElementById('priorityDeck');
        deck.innerHTML = masterTasks.slice(0, 3).map(t =>
            `<div class="prio-card${statePrioClass(t.project_id)}"><div class="prio-info"><span class="prio-title">${esc(t.title)}${stateBadge(t.project_id)}</span><span class="prio-meta">${formatDate(t.due_date)}</span></div><div style="display:flex; gap:8px;"><button class="btn-push" data-id="${esc(t.id)}" data-act="push">→</button><button class="btn-done" data-id="${esc(t.id)}" data-act="complete">✓</button></div></div>`
        ).join('');

        const banners = document.getElementById('riskBanners');
        const overdue = [], atRisk = [];
        for (const [pid, s] of Object.entries(projectStates)) {
            if (s === 'overdue') overdue.push(pid);
            else if (s === 'at-risk') atRisk.push(pid);
        }
        const parts = [];
        if (overdue.length) parts.push(`<div class="risk-banner risk-banner-overdue"><b>Overdue:</b> ${overdue.map(p => esc(projectNames[p] || 'Untitled')).join(', ')}</div>`);
        if (atRisk.length) parts.push(`<div class="risk-banner risk-banner-atrisk"><b>At risk:</b> ${atRisk.map(p => esc(projectNames[p] || 'Untitled')).join(', ')} — won't fit before deadline at current pace</div>`);
        banners.innerHTML = parts.join('');
    }

    function renderToDo() {
        document.getElementById('masterToDo').innerHTML = masterTasks.map(t => `
            <div class="todo-item${stateRowClass(t.project_id)}">
                <div style="font-weight:900; color:var(--accent); width:20px;">${esc(t.importance)}</div>
                <div style="flex:1;">
                    <b>${esc(t.title)}</b>${stateBadge(t.project_id)}<br>
                    <small>${formatDate(t.due_date)} • ${t.duration}m</small>
                </div>
                <div style="display:flex; gap:5px; align-items:center;">
                    <button class="btn-edit" style="color:#ef4444" data-id="${esc(t.id)}" data-act="delete">✕</button>
                    <button class="btn-edit" data-id="${esc(t.id)}" data-act="edit">✎</button>
                    <button class="btn-done" data-id="${esc(t.id)}" data-act="complete">✓</button>
                </div>
            </div>`).join('');
    }

    function renderArchived(tasks) {
        document.getElementById('archivedToDo').innerHTML = tasks.map(t =>
            `<div class="todo-item completed-item"><div style="flex:1;"><strike>${esc(t.title)}</strike></div><button class="btn-edit" data-id="${esc(t.id)}" data-act="uncomplete">⟲</button></div>`
        ).join('');
    }

    const ACTIONS = { push: pushTask, complete: completeTask, delete: deleteTask, edit: editTask, uncomplete: uncompleteTask };
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-act]');
        if (!btn) return;
        const fn = ACTIONS[btn.dataset.act];
        if (fn) fn(btn.dataset.id);
    });

    /* --- BUG FIX: Restoration of toggleRecurrence --- */
    function toggleRecurrence() {
        document.getElementById('recurrencePicker').classList.toggle('hidden');
    }
    
    function toggleSettings() {
        const overlay = document.getElementById('settingsOverlay');
        const opening = overlay.classList.contains('hidden');
        overlay.classList.toggle('hidden');
        if (opening) {
            ['mon','tue','wed','thu','fri','sat','sun'].forEach(d => {
                document.getElementById(`set-${d}`).value = settings[`${d}_limit`] ?? '';
            });
            if (settings.timezone) document.getElementById('set-tz').value = settings.timezone;
        }
    }

    async function saveSettings() {
        const n = { id: 'default_user', timezone: document.getElementById('set-tz').value };
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(d => n[`${d}_limit`] = parseInt(document.getElementById(`set-${d}`).value) || 0);
        const { error } = await dbCall(client.from('user_settings').upsert(n), "Save settings");
        if (error) return;
        settings = n; toggleSettings(); refresh();
    }

    function cancelPlanning() {
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
        
        // BUG FIX: Clear the staging inputs and list
        stagingTasks = []; 
        document.getElementById('stagedList').innerHTML = '';
        document.getElementById('stageTitle').value = '';
        document.getElementById('stageMins').value = '15';
        document.getElementById('stageDate').value = '';
    }
</script>
</body>
</html>
