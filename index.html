<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ActionStream | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; 
            --text: #1e293b; --error: #ef4444; --success: #10b981; --border: #e2e8f0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; }
        .container { max-width: 500px; margin: auto; padding-bottom: 100px; }

        /* Dashboard & Priority Deck */
        .dashboard { background: var(--primary); color: white; padding: 24px 20px; border-radius: 32px; margin-bottom: 25px; box-shadow: 0 20px 40px -12px rgba(15, 23, 42, 0.3); }
        .week-bar { display: flex; gap: 6px; margin-bottom: 24px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 16px; }
        .day-cap { flex: 1; text-align: center; }
        .cap-dot { height: 4px; width: 100%; border-radius: 2px; margin-top: 6px; }
        
        .priority-deck { display: flex; flex-direction: column; gap: 12px; }
        .prio-card { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        .prio-info { flex: 1; overflow: hidden; margin-right: 12px; }
        .prio-title { font-weight: 700; font-size: 0.95rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prio-meta { font-size: 0.75rem; opacity: 0.6; }

        .btn-done { background: var(--accent); color: white; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; border: none; }
        .btn-push { background: rgba(255,255,255,0.1); color: white; padding: 0 14px; height: 42px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }

        /* UI Components */
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; margin: 25px 0 12px; display: block; }
        input, select { width: 100%; height: 50px; padding: 0 16px; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 16px; margin-bottom: 12px; outline: none; }
        .submit-btn { background: var(--accent); color: white; width: 100%; height: 54px; border-radius: 16px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; }
        .row { display: flex; gap: 12px; align-items: flex-end; }
        
        /* Staged Planning List */
        .staged-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border-radius: 12px; margin-bottom: 8px; border: 1px solid #dbeafe; font-size: 0.85rem; }
        .btn-mini-edit { background: #f1f5f9; color: #475569; border: none; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; }

        /* ToDo List Items */
        .todo-item { display: flex; align-items: center; padding: 16px; background: white; border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); gap: 12px; }
        .imp-badge { font-weight: 900; color: var(--accent); font-size: 0.9rem; min-width: 24px; text-align: center; }
        
        /* Archived Section */
        .archived-item { opacity: 0.6; background: transparent; border: 1px dashed var(--border); }
        .btn-undo { background: #f1f5f9; color: var(--accent); border: none; padding: 6px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span class="section-title" style="color:rgba(255,255,255,0.5); margin:0;">Forecast</span>
            <button onclick="toggleSettings()" style="background:none; color:white; font-size:0.7rem; opacity:0.5; border:1px solid rgba(255,255,255,0.2); padding:4px 8px; border-radius:6px; cursor:pointer;">SETTINGS</button>
        </div>
        <div id="weekBar" class="week-bar"></div>
        <span class="section-title" style="color:rgba(255,255,255,0.5); margin: 0 0 12px 0;">Next 3 Priorities</span>
        <div id="priorityDeck" class="priority-deck"></div>
    </div>

    <div class="card" id="goalCapture">
        <span class="section-title">New Project Goal</span>
        <input id="mainGoal" placeholder="Project Name">
        <div class="row">
            <div><label style="font-size:0.7rem; color:#64748b;">Deadline</label><input type="date" id="goalDate"></div>
            <div style="flex:0 0 40%;"><label style="font-size:0.7rem; color:#64748b;">Imp</label><select id="mainImp"></select></div>
        </div>
        <button class="submit-btn" onclick="lockGoal()">Breakdown Actions</button>
    </div>

    <div class="card hidden" id="planningArea" style="border: 2px solid var(--accent); background: #f0f7ff;">
        <h3 id="displayGoal" style="margin:0 0 15px 0; font-size:1rem;"></h3>
        <input id="stageTitle" placeholder="Action Title">
        <div class="row">
            <div style="flex:0 0 35%;"><label style="font-size:0.7rem;">Mins</label><input type="number" id="stageMins"></div>
            <div><label style="font-size:0.7rem;">Action Date</label><input type="date" id="stageDate"></div>
        </div>
        <button id="addStagingBtn" onclick="addToStaging()" style="background:var(--success); color:white; width:100%; height:48px; border-radius:14px; font-weight:700; margin-bottom:15px; border:none; cursor:pointer;">+ Add to Sequence</button>
        
        <div id="stagedList" style="margin-bottom:20px; border-top:1px solid #dbeafe; padding-top:15px;"></div>
        
        <div class="row">
            <button onclick="finalisePlanning()" class="submit-btn" style="flex:2">Commit to List</button>
            <button onclick="cancelPlanning()" style="background:#64748b; color:white; flex:1; border-radius:16px; border:none; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <span class="section-title">Active ToDo List</span>
    <div id="masterToDo"></div>

    <span class="section-title" style="margin-top:40px;">Recently Completed</span>
    <div id="archivedToDo"></div>
</div>

<script>
    const CONFIG = { URL: "https://wuhklqulwhioiynoadtj.supabase.co", KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx" };
    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let masterTasks = [], stagingTasks = [], activeGoal = null, currentEditIdx = null;
    let settings = { weekday_limit: 45, weekend_limit: 90 };

    const formatDate = (dStr) => { if(!dStr) return ""; const [y,m,d] = dStr.split("-"); return `${d}/${m}/${y.slice(-2)}`; };

    window.onload = async () => {
        const sel = document.getElementById('mainImp');
        for(let i=1; i<=10; i++) sel.options[sel.options.length] = new Option(i, i);
        await loadSettings();
        refresh();
    };

    async function loadSettings() {
        const { data } = await client.from('user_settings').select('*').eq('id', 'default_user').single();
        if (data) settings = data;
    }

    async function refresh() {
        const { data: active } = await client.from('subtasks').select('*').eq('completed', false);
        const { data: completed } = await client.from('subtasks').select('*').eq('completed', true).order('updated_at', { ascending: false }).limit(5);
        
        masterTasks = active || [];
        masterTasks.sort((a,b) => new Date(a.due_date) - new Date(b.due_date) || b.importance - a.importance);
        
        renderDashboard();
        renderToDo();
        renderArchived(completed || []);
    }

    function renderDashboard() {
        const bar = document.getElementById('weekBar'); bar.innerHTML = '';
        const today = new Date();
        for(let i=0; i<7; i++) {
            const d = new Date(today); d.setDate(today.getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            const load = masterTasks.filter(t => t.due_date === dStr).reduce((s, t) => s + parseInt(t.duration), 0);
            const limit = (d.getDay() === 0 || d.getDay() === 6) ? settings.weekend_limit : settings.weekday_limit;
            const color = load > limit ? 'var(--error)' : (load > 0 ? 'var(--success)' : 'rgba(255,255,255,0.1)');
            bar.innerHTML += `<div class="day-cap"><div style="font-size:0.6rem; opacity:0.6;">${['S','M','T','W','T','F','S'][d.getDay()]}</div><div class="cap-dot" style="background:${color};"></div></div>`;
        }

        const deck = document.getElementById('priorityDeck'); deck.innerHTML = '';
        masterTasks.slice(0, 3).forEach(t => {
            const div = document.createElement('div');
            div.className = 'prio-card';
            div.innerHTML = `
                <div class="prio-info"><span class="prio-title">${t.title}</span><span class="prio-meta">${formatDate(t.due_date)} • ${t.duration}m</span></div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-push" onclick='pushTask("${t.id}", "${t.due_date}", "${t.goal_deadline}")'>Delay</button>
                    <button class="btn-done" onclick='completeTask("${t.id}")'><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
                </div>`;
            deck.appendChild(div);
        });
    }

    function renderToDo() {
        const list = document.getElementById('masterToDo'); list.innerHTML = '';
        masterTasks.forEach(t => {
            const d = document.createElement('div');
            d.className = 'todo-item';
            d.innerHTML = `<div class="imp-badge">${t.importance}</div>
                <div style="flex:1; overflow:hidden;"><b>${t.title}</b><br><small style="color:#64748b">${formatDate(t.due_date)} • ${t.duration}m</small></div>
                <button class="btn-done" style="width:34px; height:34px; border-radius:8px; background:#f1f5f9; color:#64748b" onclick='completeTask("${t.id}")'><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>`;
            list.appendChild(d);
        });
    }

    function renderArchived(tasks) {
        const list = document.getElementById('archivedToDo'); list.innerHTML = '';
        tasks.forEach(t => {
            const d = document.createElement('div');
            d.className = 'todo-item archived-item';
            d.innerHTML = `
                <div style="flex:1; overflow:hidden;"><strike>${t.title}</strike></div>
                <button class="btn-undo" onclick='undoComplete("${t.id}")'>UNDO</button>`;
            list.appendChild(d);
        });
    }

    // Task Functions
    async function undoComplete(id) {
        await client.from('subtasks').update({ completed: false }).eq('id', id);
        refresh();
    }

    async function completeTask(id) {
        await client.from('subtasks').update({ completed: true, updated_at: new Date().toISOString() }).eq('id', id);
        refresh();
    }

    async function pushTask(id, currentStr, deadlineStr) {
        const tom = new Date(currentStr); tom.setDate(tom.getDate() + 1);
        const tomStr = tom.toISOString().split('T')[0];
        if (deadlineStr && tomStr > deadlineStr) return alert(`🚫 Blocked: Goal deadline is ${formatDate(deadlineStr)}.`);
        await client.from('subtasks').update({ due_date: tomStr }).eq('id', id);
        refresh();
    }

    // Planning Logic
    function lockGoal() {
        const goal = document.getElementById('mainGoal').value;
        const date = document.getElementById('goalDate').value;
        if(!goal || !date) return alert("Goal Name & Deadline required");
        activeGoal = { goal, date, imp: document.getElementById('mainImp').value };
        document.getElementById('displayGoal').innerText = goal;
        document.getElementById('stageDate').value = date;
        document.getElementById('goalCapture').classList.add('hidden');
        document.getElementById('planningArea').classList.remove('hidden');
    }

    function addToStaging() {
        const title = document.getElementById('stageTitle').value;
        const mins = document.getElementById('stageMins').value;
        const date = document.getElementById('stageDate').value;
        if(!title || !mins || !date) return alert("Missing action info");

        const action = { title, duration: mins, due_date: date };
        if(currentEditIdx !== null) {
            stagingTasks[currentEditIdx] = action;
            currentEditIdx = null;
            document.getElementById('addStagingBtn').innerText = "+ Add to Sequence";
        } else {
            stagingTasks.push(action);
        }
        
        document.getElementById('stageTitle').value = '';
        renderStaging();
    }

    function editStaged(idx) {
        const t = stagingTasks[idx];
        document.getElementById('stageTitle').value = t.title;
        document.getElementById('stageMins').value = t.duration;
        document.getElementById('stageDate').value = t.due_date;
        currentEditIdx = idx;
        document.getElementById('addStagingBtn').innerText = "Update Action Item";
    }

    function renderStaging() {
        document.getElementById('stagedList').innerHTML = stagingTasks.map((t, i) => `
            <div class="staged-item">
                <div><b>${t.title}</b><br><small>${formatDate(t.due_date)} • ${t.duration}m</small></div>
                <button class="btn-mini-edit" onclick="editStaged(${i})">Edit</button>
            </div>`).join('');
    }

    async function finalisePlanning() {
        if(stagingTasks.length === 0) return alert("Add actions first");
        const toInsert = stagingTasks.map(t => ({ 
            title: `${activeGoal.goal}: ${t.title}`, 
            duration: parseInt(t.duration), 
            due_date: t.due_date, 
            importance: parseInt(activeGoal.imp), 
            goal_deadline: activeGoal.date,
            updated_at: new Date().toISOString()
        }));
        await client.from('subtasks').insert(toInsert);
        cancelPlanning(); refresh();
    }

    function cancelPlanning() {
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');
        stagingTasks = []; currentEditIdx = null;
        document.getElementById('stagedList').innerHTML = '';
        document.getElementById('mainGoal').value = '';
    }

    function toggleSettings() {
        const w = prompt("Weekday Mins:", settings.weekday_limit);
        const e = prompt("Weekend Mins:", settings.weekend_limit);
        if(w && e) {
            settings = { weekday_limit: parseInt(w), weekend_limit: parseInt(e) };
            client.from('user_settings').upsert({ id: 'default_user', ...settings }).then(() => refresh());
        }
    }
</script>
</body>
</html>
