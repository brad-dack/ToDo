<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ActionStream | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root {
            --bg: #fff9ec; --ink: #1a1a1a;
            --yellow: #ffd23f; --teal: #00c2b8; --blue: #4d96ff; --green: #6bcb77; --orange: #ff9f45; --red: #ff5252;
            --shadow: 4px 4px 0 var(--ink);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Trebuchet MS', Verdana, -apple-system, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 14px; }
        .container { max-width: 500px; margin: auto; padding-bottom: 130px; }

        .card { background: white; border: 3px solid var(--ink); border-radius: 16px; padding: 18px; margin-bottom: 18px; box-shadow: var(--shadow); position: relative; }

        .hero { background: var(--yellow); }
        .hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
        .hero h1 { margin: 0 0 2px; font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; }
        .hero .sub { font-size: 0.78rem; font-weight: 700; margin-bottom: 16px; }
        .streak-chip { background: white; border: 2.5px solid var(--ink); border-radius: 10px; padding: 6px 10px; font-size: 0.7rem; font-weight: 900; box-shadow: 2px 2px 0 var(--ink); white-space: nowrap; }

        /* Vertical capacity bars */
        .week-bar { display: flex; gap: 6px; margin-bottom: 16px; }
        .day-cap { flex: 1; text-align: center; font-size: 0.62rem; font-weight: 900; cursor: pointer; }
        .day-cap .lbl { background: white; border: 2px solid var(--ink); border-radius: 8px; padding: 3px 0; display: block; margin-bottom: 4px; }
        .day-cap.today .lbl { background: var(--ink); color: var(--yellow); }
        .day-cap.has-override .lbl { border-color: var(--teal); box-shadow: 0 0 0 1.5px var(--teal); }
        .cap-bar { height: 38px; width: 100%; border-radius: 8px; background: white; border: 2px solid var(--ink); position: relative; overflow: hidden; }
        .cap-fill { position: absolute; bottom: 0; left: 0; width: 100%; border-top: 2px solid var(--ink); }

        /* Up Next queue */
        .focus-card { background: white; border: 3px solid var(--ink); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
        .focus-eyebrow { font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; background: var(--ink); color: var(--yellow); padding: 3px 8px; border-radius: 6px; display: inline-block; }
        .focus-title { font-size: 1.15rem; font-weight: 900; margin: 10px 0 2px; }
        .focus-meta { font-size: 0.72rem; font-weight: 700; opacity: 0.65; margin-bottom: 14px; }
        .focus-actions { display: flex; gap: 10px; }
        .btn-big { flex: 1; height: 48px; border-radius: 12px; font-weight: 900; font-size: 0.9rem; border: 3px solid var(--ink); cursor: pointer; font-family: inherit; box-shadow: 3px 3px 0 var(--ink); }
        .btn-big:active { transform: translate(2px,2px); box-shadow: none; }
        .btn-go { background: var(--green); color: var(--ink); }
        .btn-skip { background: white; color: var(--ink); }
        .queue-peek { display: flex; align-items: center; gap: 10px; background: white; border: 2.5px solid var(--ink); border-radius: 12px; padding: 9px 12px; margin-bottom: 8px; font-size: 0.78rem; font-weight: 700; box-shadow: 2px 2px 0 var(--ink); }
        .queue-pos { background: var(--ink); color: white; font-size: 0.6rem; font-weight: 900; border-radius: 6px; padding: 2px 7px; flex-shrink: 0; }
        .queue-peek .qm { margin-left: auto; font-size: 0.65rem; opacity: 0.6; white-space: nowrap; }

        .section-title { font-size: 0.72rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin: 26px 4px 12px; display: inline-block; background: var(--ink); color: white; padding: 4px 10px; border-radius: 8px; transform: rotate(-1deg); }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.55rem; font-weight: 900; letter-spacing: 0.5px; margin-left: 6px; vertical-align: middle; border: 2px solid var(--ink); color: var(--ink); }
        .badge-overdue { background: var(--red); color: white; }
        .badge-atrisk { background: var(--orange); }

        .todo-item { display: flex; align-items: center; gap: 10px; padding: 14px; background: white; border: 3px solid var(--ink); border-radius: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
        .todo-item b { font-size: 0.88rem; }
        .todo-item small { font-weight: 700; opacity: 0.6; }
        .completed-item { opacity: 0.5; box-shadow: none; background: var(--bg); border-style: dashed; }
        .todo-overdue { background: #ffe5e5; }
        .todo-atrisk { background: #fff0dd; }

        /* Importance scale: one blue, 1 = lightest -> 10 = darkest */
        .imp-chip { width: 34px; height: 34px; border-radius: 10px; border: 2.5px solid var(--ink); font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 2px 2px 0 var(--ink); color: var(--ink); }
        .imp-1  { background: #eff6ff; }
        .imp-2  { background: #dbeafe; }
        .imp-3  { background: #bfdbfe; }
        .imp-4  { background: #93c5fd; }
        .imp-5  { background: #60a5fa; }
        .imp-6  { background: #3b82f6; color: white; }
        .imp-7  { background: #2563eb; color: white; }
        .imp-8  { background: #1d4ed8; color: white; }
        .imp-9  { background: #1e40af; color: white; }
        .imp-10 { background: #172554; color: white; }

        .btn-done { background: var(--green); color: var(--ink); width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; border: 2.5px solid var(--ink); box-shadow: 2px 2px 0 var(--ink); font-weight: 900; }
        .btn-done:active, .submit-btn:active, .nav-btn-add:active, .btn-push:active { transform: translate(2px,2px); box-shadow: none; }
        .btn-push { background: white; color: var(--ink); width: 42px; height: 42px; border-radius: 11px; font-size: 0.95rem; font-weight: 900; border: 2.5px solid var(--ink); cursor: pointer; box-shadow: 2px 2px 0 var(--ink); flex-shrink: 0; }
        /* Bigger tap targets for edit / delete on mobile */
        .btn-edit { background: white; border: 2.5px solid var(--ink); color: var(--ink); cursor: pointer; width: 42px; height: 42px; border-radius: 11px; font-size: 1.15rem; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 2px 2px 0 var(--ink); }
        .btn-edit:active { transform: translate(2px,2px); box-shadow: none; }
        .btn-bulk { background: var(--teal); color: var(--ink); border: 2.5px solid var(--ink); font-size: 0.62rem; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 900; box-shadow: 2px 2px 0 var(--ink); letter-spacing: 0.5px; }

        input, select { width: 100%; height: 50px; padding: 0 14px; border-radius: 12px; border: 3px solid var(--ink); font-size: 16px; margin-bottom: 12px; outline: none; background: white; font-family: inherit; font-weight: 700; }
        textarea { width: 100%; padding: 12px 14px; border-radius: 12px; border: 3px solid var(--ink); font-size: 16px; margin-bottom: 12px; outline: none; background: white; font-family: inherit; font-weight: 700; resize: vertical; }
        input:focus, select:focus, textarea:focus { box-shadow: 3px 3px 0 var(--teal); }
        .submit-btn { background: var(--blue); color: white; width: 100%; height: 54px; border-radius: 14px; font-weight: 900; font-size: 1rem; border: 3px solid var(--ink); cursor: pointer; box-shadow: var(--shadow); font-family: inherit; letter-spacing: 0.5px; }
        .staged-item { background: var(--bg); padding: 10px 12px; border-radius: 10px; margin-bottom: 8px; font-size: 0.8rem; border: 2px solid var(--ink); font-weight: 700; cursor: grab; }
        .field-label { font-size: 0.62rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .page-header h2 { margin: 4px 0 18px; font-size: 1.5rem; font-weight: 900; }
        .page-header h2 span { background: var(--teal); color: var(--ink); padding: 2px 10px; border-radius: 10px; border: 3px solid var(--ink); display: inline-block; transform: rotate(-1.5deg); box-shadow: 3px 3px 0 var(--ink); }
        .recur-link { font-size: 0.85rem; color: var(--blue); text-decoration: none; font-weight: 800; cursor: pointer; position: absolute; right: 20px; top: 20px; }
        .deadline-ref { font-weight: 400; opacity: 0.7; font-size: 0.8rem; }
        .hidden { display: none; }

        /* ---- Themed modals ---- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(26,26,26,0.55); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 18px; }
        .modal-card { background: white; border: 3px solid var(--ink); border-radius: 18px; box-shadow: 6px 6px 0 var(--ink); padding: 20px; width: 100%; max-width: 420px; max-height: 86vh; overflow-y: auto; }
        .modal-title { margin: 0 0 14px; font-size: 1.2rem; font-weight: 900; }
        .modal-msg { font-size: 0.9rem; font-weight: 700; line-height: 1.5; margin: 0 0 4px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
        .modal-cancel { background: white; color: var(--ink); border: 3px solid var(--ink); border-radius: 14px; font-weight: 900; font-family: inherit; cursor: pointer; flex: 1; height: 54px; box-shadow: var(--shadow); }
        .modal-cancel:active { transform: translate(2px,2px); box-shadow: none; }
        .imp-picker-btn { width: 100%; min-height: 50px; border-radius: 12px; border: 3px solid var(--ink); background: white; font-family: inherit; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 12px; text-align: left; }
        .imp-picker-btn span { min-width: 0; line-height: 1.3; }
        .imp-picker-btn:active { transform: translate(2px,2px); }
        .imp-pick-row { width: 100%; display: flex; align-items: center; gap: 12px; padding: 10px 12px; margin-bottom: 8px; border: 2.5px solid var(--ink); border-radius: 12px; background: white; cursor: pointer; font-family: inherit; font-size: 0.82rem; font-weight: 700; text-align: left; }
        .imp-pick-row:active { transform: translate(2px,2px); }
        .cap-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .cap-meter { flex: 1; height: 16px; background: var(--bg); border: 2.5px solid var(--ink); border-radius: 8px; overflow: hidden; }
        .cap-meter-fill { height: 100%; }
        .cap-label { font-size: 0.72rem; font-weight: 900; white-space: nowrap; }
        .cap-controls { background: var(--bg); border: 2px solid var(--ink); border-radius: 12px; padding: 12px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
        .qty-btn { background: white; border: 2.5px solid var(--ink); border-radius: 10px; height: 42px; font-weight: 900; font-family: inherit; cursor: pointer; box-shadow: 2px 2px 0 var(--ink); flex: 1; }
        .qty-btn:active { transform: translate(2px,2px); box-shadow: none; }
        .day-task { display: flex; align-items: center; gap: 8px; padding: 10px; border: 2px solid var(--ink); border-radius: 12px; margin-bottom: 8px; }

        /* ---- Bottom Nav: chunky toy bar ---- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: center; padding: 14px 16px 18px; pointer-events: none; }
        .bottom-nav-bar {
            pointer-events: all; max-width: 440px; width: 100%;
            background: white; border: 3px solid var(--ink); border-radius: 20px;
            display: flex; align-items: center; justify-content: space-around; padding: 8px 20px;
            box-shadow: 5px 5px 0 var(--ink);
        }
        .nav-btn { background: none; border: none; color: var(--ink); opacity: 0.45; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; cursor: pointer; padding: 8px 16px; font-family: inherit; }
        .nav-btn svg { width: 24px; height: 24px; }
        .nav-btn.active { opacity: 1; }
        .nav-btn.active::after { content: ''; width: 22px; height: 4px; background: var(--teal); border: 1.5px solid var(--ink); border-radius: 3px; margin-top: 2px; }
        .nav-btn-add {
            background: var(--teal); color: var(--ink); width: 58px; height: 58px; border-radius: 16px;
            border: 3px solid var(--ink); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin-top: -34px; box-shadow: 4px 4px 0 var(--ink);
        }
        .nav-btn-add svg { width: 28px; height: 28px; }

        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body>

<div class="container">

    <!-- ============ HOME SCREEN ============ -->
    <div class="screen active" id="screen-home">
        <div class="card hero">
            <div class="hero-top">
                <div>
                    <h1 id="greeting">Hello! 👋</h1>
                    <div class="sub" id="todaySummary">Loading…</div>
                </div>
                <div class="streak-chip" id="streakChip">🔥 0 DAY STREAK</div>
            </div>
            <div id="weekBar" class="week-bar"></div>
            <div id="focusQueue"></div>
            <div style="display:flex; justify-content:flex-end; margin-top:6px;">
                <button class="btn-bulk" onclick="pushAllToday()">PUSH ALL TODAY →</button>
            </div>
        </div>

        <div id="weeklyReviewCard"></div>

        <span class="section-title">📋 Active ToDo List</span>
        <div id="masterToDo"></div>
        <span class="section-title">✅ Recently Completed</span>
        <div id="archivedToDo"></div>
    </div>

    <!-- ============ ADD PROJECT SCREEN ============ -->
    <div class="screen" id="screen-add">
        <div class="page-header"><h2><span>New Project 🚀</span></h2></div>

        <div class="card" id="goalCapture">
            <a class="recur-link" onclick="toggleRecurrence()">⚡ Reoccurring: <span id="recurLabel">Never</span></a>
            <span class="section-title" style="margin-top:0;">🎯 Project Goal</span>

            <input id="mainGoal" placeholder="Project Name">
            <div><label class="field-label">Deadline</label><input type="date" id="goalDate"></div>
            <div>
                <label class="field-label">Importance</label>
                <input type="hidden" id="mainImp" value="5">
                <button type="button" class="imp-picker-btn" id="mainImpBtn" onclick="openImportancePicker(parseInt(document.getElementById('mainImp').value), setMainImp)"></button>
            </div>

            <div id="recurrencePicker" class="hidden" style="margin-top:10px; padding:15px; background:var(--bg); border-radius:12px; border:2px solid var(--ink);">
                <label class="field-label">Repeat Every:</label>
                <select id="recurRule" onchange="document.getElementById('recurLabel').innerText = this.value || 'Never'">
                    <option value="">Never</option>
                    <option value="Daily">Daily</option>
                    <option value="Weekly">Weekly</option>
                    <option value="Fortnightly">Fortnightly</option>
                    <option value="Monthly">Monthly</option>
                    <option value="Quarterly">Quarterly</option>
                    <option value="Bi-annually">Bi-annually</option>
                    <option value="Annually">Annually</option>
                </select>
            </div>

            <label class="field-label" style="margin-top:10px; display:block;">✨ Describe it (optional)</label>
            <textarea id="nlCapture" rows="2" placeholder="e.g. service the car sometime next month, not urgent"></textarea>
            <button type="button" class="btn-bulk" id="aiCaptureBtn" onclick="aiCapture()" style="margin-bottom:14px;">✨ Auto-fill with AI</button>

            <button class="submit-btn" style="margin-top:10px;" onclick="lockGoal()">Breakdown Actions →</button>
        </div>

        <div class="card hidden" id="planningArea" style="background:#e0f7f5;">
            <h3 id="displayGoal" style="margin:0 0 15px 0; font-size:1.05rem; font-weight:900;"></h3>
            <input id="stageTitle" placeholder="Action Title">
            <div style="display:flex; gap:12px;">
                <div style="flex:0 0 35%; min-width:0;"><label class="field-label">Mins (15 max)</label><input type="number" id="stageMins" max="15" value="15"></div>
                <div style="flex:1; min-width:0;"><label class="field-label">Action Date</label><input type="date" id="stageDate"></div>
            </div>
            <button onclick="addToStaging()" style="background:var(--green); color:var(--ink); width:100%; height:50px; border-radius:12px; font-weight:900; margin-bottom:15px; border:3px solid var(--ink); cursor:pointer; box-shadow:var(--shadow); font-family:inherit;">+ Add to Sequence</button>
            <div id="stagedList" style="margin-bottom:15px;"></div>
            <div style="display:flex; gap:12px;">
                <button onclick="finalisePlanning()" class="submit-btn" style="flex:2">Commit! 🎉</button>
                <button onclick="cancelPlanning()" style="background:white; color:var(--ink); flex:1; border-radius:14px; border:3px solid var(--ink); cursor:pointer; font-weight:900; font-family:inherit; box-shadow:var(--shadow);">Nope</button>
            </div>
        </div>
    </div>

    <!-- ============ SETTINGS SCREEN ============ -->
    <div class="screen" id="screen-settings">
        <div class="page-header"><h2><span>Settings 🔧</span></h2></div>
        <div class="card">
            <span class="section-title" style="margin-top:0;">⏱️ Weekly Capacity (Mins)</span>
            <div id="settingsGrid" class="settings-grid"></div>
            <div style="margin-bottom:20px;">
                <label class="field-label">Timezone</label>
                <select id="set-tz">
                    <option value="Australia/Perth">Perth (AWST)</option>
                    <option value="Australia/Sydney">Sydney (AEST)</option>
                    <option value="UTC">UTC</option>
                </select>
            </div>
            <button class="submit-btn" onclick="saveSettings()">Save Schedule 💾</button>
        </div>
    </div>
</div>

<!-- ============ BOTTOM NAV ============ -->
<div class="bottom-nav">
    <div class="bottom-nav-bar">
        <button class="nav-btn active" data-screen="home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1Z"/></svg>
            Home
        </button>
        <button class="nav-btn-add" data-screen="add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="nav-btn" data-screen="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
            Settings
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
    const CONFIG = { URL: "https://wuhklqulwhioiynoadtj.supabase.co", KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx" };
    const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let masterTasks = [], stagingTasks = [], activeGoal = null, settings = {}, streakCount = 0, capacityOverrides = {};

    const formatDate = (dStr) => { if(!dStr) return ""; const [y,m,d] = dStr.split("-"); return `${d}/${m}/${y.slice(-2)}`; };

    const ESC_MAP = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ESC_MAP[c]);

    const IMPORTANCE_LABELS = [
        "Nobody will care. Not even you.",
        "Future you might smile. Maybe.",
        "Nice to have. Sprinkles on the donut.",
        "Someone notices if it's missing, briefly.",
        "World keeps spinning, just slightly wobblier.",
        "Skipping this creates a mess. Your mess.",
        "This one actually matters. Don't skip it.",
        "Things will get bad if ignored.",
        "Real consequences are waiting on the other side.",
        "Smoke is visible. All hands on deck."
    ];

    const impButtonHtml = (val) => {
        const v = Math.min(10, Math.max(1, parseInt(val) || 5));
        return `<div class="imp-chip imp-${v}" style="width:30px;height:30px;font-size:0.8rem;flex:0 0 auto;">${v}</div><span style="flex:1; font-size:0.8rem;">${esc(IMPORTANCE_LABELS[v-1])}</span><span style="opacity:0.5;">▾</span>`;
    };

    const setMainImp = (v) => {
        document.getElementById('mainImp').value = v;
        document.getElementById('mainImpBtn').innerHTML = impButtonHtml(v);
    };

    function openImportancePicker(currentVal, onSelect) {
        const node = document.createElement('div');
        node.innerHTML = `<h3 class="modal-title">How important is this?</h3>` +
            Array.from({length:10}, (_,i) => i+1).map(v => `
                <button type="button" class="imp-pick-row" data-val="${v}" style="${v===currentVal ? 'box-shadow:0 0 0 3px var(--teal);' : ''}">
                    <div class="imp-chip imp-${v}">${v}</div>
                    <span>${esc(IMPORTANCE_LABELS[v-1])}</span>
                </button>`).join('') +
            `<div class="modal-actions"><button class="modal-cancel" style="flex:1;">Cancel</button></div>`;
        const m = openModal(node);
        node.querySelector('.modal-cancel').onclick = m.close;
        node.querySelectorAll('.imp-pick-row').forEach(b => b.onclick = () => { onSelect(parseInt(b.dataset.val)); m.close(); });
    }

    const tz = () => settings.timezone || 'Australia/Perth';
    const localDateStr = (d = new Date()) => {
        const parts = new Intl.DateTimeFormat('en-CA', { timeZone: tz(), year:'numeric', month:'2-digit', day:'2-digit' }).formatToParts(d);
        const g = (t) => parts.find(p => p.type === t).value;
        return `${g('year')}-${g('month')}-${g('day')}`;
    };
    const parseDateUTC = (dateStr) => {
        const [y,m,d] = dateStr.split('-').map(Number);
        return new Date(Date.UTC(y, m-1, d));
    };
    const addDays = (dateStr, days) => {
        const dt = parseDateUTC(dateStr);
        dt.setUTCDate(dt.getUTCDate() + days);
        return dt.toISOString().split('T')[0];
    };
    const addMonths = (dateStr, months) => {
        const dt = parseDateUTC(dateStr);
        dt.setUTCMonth(dt.getUTCMonth() + months);
        return dt.toISOString().split('T')[0];
    };
    const dayOfWeek = (dateStr) => parseDateUTC(dateStr).getUTCDay();
    const getWeekStart = (dateStr) => {
        const dow = dayOfWeek(dateStr); // 0 = Sunday
        const offsetToMonday = dow === 0 ? -6 : 1 - dow;
        return addDays(dateStr, offsetToMonday);
    };

    const RECUR_OFFSETS = {
        Daily: { d: 1 }, Weekly: { d: 7 }, Fortnightly: { d: 14 },
        Monthly: { m: 1 }, Quarterly: { m: 3 }, 'Bi-annually': { m: 6 }, Annually: { m: 12 }
    };
    const shiftByRule = (dateStr, rule) => {
        const o = RECUR_OFFSETS[rule];
        if (!o) return dateStr;
        return o.d ? addDays(dateStr, o.d) : addMonths(dateStr, o.m);
    };

    const dbCall = async (promise, label) => {
        const { data, error } = await promise;
        if (error) { uiAlert(`${label} failed: ${error.message}`); return { error }; }
        return { data };
    };

    /* Effective minute capacity for a date: per-date override wins, else weekday setting. */
    const dayLimit = (dateStr, fallback = 45) => {
        if (dateStr in capacityOverrides) return capacityOverrides[dateStr];
        const dayKeys = ['sun','mon','tue','wed','thu','fri','sat'];
        return settings[dayKeys[dayOfWeek(dateStr)] + '_limit'] || fallback;
    };

        const close = () => overlay.remove();
        if (dismissable) overlay.addEventListener('mousedown', e => { if (e.target === overlay) close(); });
        return { overlay, card, close };

    async function loadSettings() {
        const { data } = await client.from('user_settings').select('*').eq('id', 'default_user').single();
        if (data) settings = data;
    }

    async function loadOverrides() {
        const { data, error } = await client.from('capacity_overrides').select('*');
        capacityOverrides = {};
        if (!error && data) data.forEach(r => { capacityOverrides[r.date] = r.limit_override; });
    }

    let projectStates = {}, projectNames = {};

    async function refresh() {
        await loadOverrides();
        const { data: active } = await client.from('subtasks').select('*').eq('completed', false);
        const { data: completed } = await client.from('subtasks').select('*').eq('completed', true).order('updated_at', { ascending: false }).limit(5);
        masterTasks = active || [];
        masterTasks.sort((a,b) => new Date(a.due_date) - new Date(b.due_date) || b.importance - a.importance);
        computeProjectStates();
        streakCount = await computeStreak();
        renderDashboard();
        renderToDo();
        renderArchived(completed || []);
        loadWeeklyReview();

    async function computeStreak() {
        const { data } = await client.from('subtasks').select('created_at,updated_at');
        if (!data) return 0;
        const activeDates = new Set();
        data.forEach(r => {
            if (r.created_at) activeDates.add(localDateStr(new Date(r.created_at)));
            if (r.updated_at) activeDates.add(localDateStr(new Date(r.updated_at)));
        });
        let streak = 0;
        let cursor = localDateStr();
        while (activeDates.has(cursor)) {
            streak++;
            cursor = addDays(cursor, -1);
        }
        return streak;
    }

    function computeProjectStates() {
        projectStates = {}; projectNames = {};
        const todayStr = localDateStr();

        const byProject = {};
        for (const t of masterTasks) {
            if (!t.project_id) continue;
            if (!byProject[t.project_id]) byProject[t.project_id] = { tasks: [], goal_deadline: t.goal_deadline };
            byProject[t.project_id].tasks.push(t);
            if (!projectNames[t.project_id] && t.title) {
                const idx = t.title.indexOf(':');
                projectNames[t.project_id] = idx > 0 ? t.title.slice(0, idx) : t.title;
            }
        }

        for (const [pid, info] of Object.entries(byProject)) {
            const deadline = info.goal_deadline;
            if (!deadline) { projectStates[pid] = 'normal'; continue; }

            if (deadline < todayStr) { projectStates[pid] = 'overdue'; continue; }

            const projectMinutes = info.tasks.reduce((s,t) => s + t.duration, 0);
            let pool = 0, cursor = todayStr;
            while (cursor <= deadline) {
                const limit = dayLimit(cursor, 0);
                const otherLoad = masterTasks
                    .filter(t => t.due_date === cursor && t.project_id !== pid)
                    .reduce((s,t) => s + t.duration, 0);
                pool += Math.max(0, limit - otherLoad);
                cursor = addDays(cursor, 1);
            }
            projectStates[pid] = projectMinutes > pool ? 'at-risk' : 'normal';
        }
    }

    const stateBadge = (pid) => {
        const s = projectStates[pid];
        if (s === 'overdue') return ' <span class="badge badge-overdue">OVERDUE</span>';
        if (s === 'at-risk') return ' <span class="badge badge-atrisk">AT RISK</span>';
        return '';
    };
    const stateRowClass = (pid) => {
        const s = projectStates[pid];
        return s === 'overdue' ? ' todo-overdue' : s === 'at-risk' ? ' todo-atrisk' : '';
    };

    function hasCapacity(dateStr, taskDuration, ignoreTaskId = null) {
        const limit = dayLimit(dateStr);
        const currentLoad = masterTasks
            .filter(t => t.due_date === dateStr && t.id !== ignoreTaskId)
            .reduce((s, t) => s + t.duration, 0);
        return (currentLoad + taskDuration) <= limit;
    }

    function lockGoal() {
        const goal = document.getElementById('mainGoal').value.trim();
        const date = document.getElementById('goalDate').value;
        if(!goal || !date) return uiAlert("Goal Name & Deadline required");
        if(date < localDateStr()) return uiAlert("Deadline cannot be in the past");
        activeGoal = { goal, date, imp: document.getElementById('mainImp').value, recur: document.getElementById('recurRule').value, id: 'proj_' + Date.now() };
        document.getElementById('displayGoal').innerHTML = `${esc(goal)} <span class="deadline-ref">· due ${formatDate(date)}</span>`;
        const stageDate = document.getElementById('stageDate');
        stageDate.value = date;
        stageDate.max = date;
        document.getElementById('goalCapture').classList.add('hidden');
        document.getElementById('planningArea').classList.remove('hidden');
    }

    function addToStaging() {
        const title = document.getElementById('stageTitle').value.trim();
        const mins = parseInt(document.getElementById('stageMins').value);
        const date = document.getElementById('stageDate').value;

        if(!title) return uiAlert("Action title required");
        if(!date) return uiAlert("Action date required");
        if(!Number.isFinite(mins) || mins <= 0) return uiAlert("Minutes must be a positive number");
        if(mins > 15) return uiAlert("Max 15 mins per action");
        if(date > activeGoal.date) return uiAlert("Action date past deadline");

        const stagedLoad = stagingTasks.filter(t => t.due_date === date).reduce((s,t) => s + t.duration, 0);
        if(!hasCapacity(date, mins + stagedLoad)) return uiAlert("Day is at capacity!");

        stagingTasks.push({ title, duration: mins, due_date: date });
        document.getElementById('stageTitle').value = '';
        renderStaging();
    }

    function renderStaging() {
        document.getElementById('stagedList').innerHTML = stagingTasks.map(t =>
            `<div class="staged-item">☰ <b>${esc(t.title)}</b> (${t.duration}m) - ${formatDate(t.due_date)}</div>`
        ).join('');
    }

    async function finalisePlanning() {
        const toInsert = stagingTasks.map((t, idx) => ({
            title: `${activeGoal.goal}: ${t.title}`,
            duration: t.duration,
            due_date: t.due_date,
            importance: parseInt(activeGoal.imp),
            goal_deadline: activeGoal.date,
            project_id: activeGoal.id,
            recurrence_rule: activeGoal.recur || null,
            sort_order: idx
        }));

        if (!toInsert.length) return uiAlert("Add at least one action before committing");
        const { error } = await client.from('subtasks').insert(toInsert);

        if (error) {
            uiAlert("Error saving tasks: " + error.message);
        } else {
            document.getElementById('mainGoal').value = '';
            document.getElementById('goalDate').value = '';
            document.getElementById('recurRule').value = '';
            document.getElementById('recurLabel').innerText = 'Never';
            setMainImp(5);

            cancelPlanning();
            showScreen('home');
            refresh();
        }
    }

    async function pushTask(id) {
        const t = masterTasks.find(task => task.id == id);
        if (!t) return;
        const targetDateStr = addDays(t.due_date, 1);

        if (t.goal_deadline && targetDateStr > t.goal_deadline) return uiAlert("Cannot push: Past project deadline!");
        if (!hasCapacity(targetDateStr, t.duration, t.id)) return uiAlert(`${formatDate(targetDateStr)} is already at capacity!`);

        const { error } = await dbCall(client.from('subtasks').update({ due_date: targetDateStr, updated_at: new Date().toISOString() }).eq('id', id), "Push");
        if (!error) refresh();
    }

    async function pushAllToday() {
        const todayStr = localDateStr();
        const tomStr = addDays(todayStr, 1);
        const tasks = masterTasks.filter(t => t.due_date === todayStr);

        let count = 0, failed = 0;
        for (let t of tasks) {
            if ((!t.goal_deadline || tomStr <= t.goal_deadline) && hasCapacity(tomStr, t.duration, t.id)) {
                const { error } = await client.from('subtasks').update({ due_date: tomStr, updated_at: new Date().toISOString() }).eq('id', t.id);
                if (error) { failed++; continue; }
                t.due_date = tomStr;
                count++;
            }
        }
        uiAlert(`Pushed ${count} tasks${failed ? ` (${failed} failed)` : ''}.`);
        refresh();
    }

    async function completeTask(id) {
        const task = masterTasks.find(t => t.id == id);
        const { error } = await dbCall(client.from('subtasks').update({ completed: true, updated_at: new Date().toISOString() }).eq('id', id), "Complete");
        if (error) return;

        if (task?.recurrence_rule) {
            const { data } = await client.from('subtasks').select('id').eq('project_id', task.project_id).eq('completed', false);
            if (!data || data.length === 0) await handleRecurrence(task);
        }
        refresh();
    }

    async function handleRecurrence(task) {
        if (!RECUR_OFFSETS[task.recurrence_rule]) return;
        const { data: templates, error } = await client.from('subtasks').select('*').eq('project_id', task.project_id);
        if (error || !templates) { uiAlert("Recurrence clone failed: " + (error?.message || "no rows")); return; }
        const newProjId = 'proj_' + Date.now();

        const newBatch = templates.map(t => {
            const { id, created_at, updated_at, ...data } = t;
            return {
                ...data,
                due_date: shiftByRule(t.due_date, task.recurrence_rule),
                goal_deadline: t.goal_deadline ? shiftByRule(t.goal_deadline, task.recurrence_rule) : null,
                project_id: newProjId,
                completed: false
            };
        });
        await dbCall(client.from('subtasks').insert(newBatch), "Recurrence clone");
    }

    async function deleteTask(id) {
        if (!await uiConfirm("This action can't be undone.", { title: "Delete task?", okLabel: "Delete", danger: true })) return;
        const { error } = await dbCall(client.from('subtasks').delete().eq('id', id), "Delete");
        if (!error) refresh();
    }

    const VALID_RULES = ['Daily', 'Weekly', 'Fortnightly', 'Monthly', 'Quarterly', 'Bi-annually', 'Annually'];

    /* Edit via a themed form modal (replaces the chained browser prompts) */
    function editTask(id) {
        const t = masterTasks.find(task => task.id == id);
        if (!t) return;
        const node = document.createElement('div');
        const impOpts = Array.from({length:10}, (_,i) => `<option value="${i+1}" ${t.importance == i+1 ? 'selected' : ''}>${i+1}</option>`).join('');
        const recurBlock = t.recurrence_rule ? `
            <label class="field-label">Recurrence (whole project)</label>
            <select id="edit-recur">${VALID_RULES.map(r => `<option ${t.recurrence_rule === r ? 'selected' : ''}>${r}</option>`).join('')}</select>` : '';
        node.innerHTML = `
            <h3 class="modal-title">Edit Action</h3>
            <label class="field-label">Title</label>
            <input id="edit-title" value="${esc(t.title)}">
            <div style="display:flex; gap:12px;">
                <div style="flex:0 0 38%; min-width:0;"><label class="field-label">Mins (15 max)</label><input type="number" id="edit-mins" max="15" value="${esc(t.duration)}"></div>
                <div style="flex:1; min-width:0;"><label class="field-label">Date</label><input type="date" id="edit-date" value="${esc(t.due_date)}"${t.goal_deadline ? ` max="${esc(t.goal_deadline)}"` : ''}></div>
            </div>
            <label class="field-label">Importance</label>
            <select id="edit-imp">${impOpts}</select>
            ${recurBlock}
            <div class="modal-actions">
                <button class="modal-cancel">Cancel</button>
                <button class="submit-btn" id="edit-save" style="flex:2;">Save</button>
            </div>`;
        const m = openModal(node);
        node.querySelector('.modal-cancel').onclick = m.close;
        node.querySelector('#edit-save').onclick = async () => {
            const newTitle = node.querySelector('#edit-title').value.trim();
            const duration = parseInt(node.querySelector('#edit-mins').value);
            const newDate = node.querySelector('#edit-date').value;
            const importance = parseInt(node.querySelector('#edit-imp').value);

            if (!newTitle) return uiAlert("Title required.");
            if (!Number.isFinite(duration) || duration <= 0) return uiAlert("Minutes must be a positive number.");
            if (duration > 15) return uiAlert("Task must be 15 mins or less.");
            if (!/^\d{4}-\d{2}-\d{2}$/.test(newDate)) return uiAlert("Please pick a date.");
            if (t.goal_deadline && newDate > t.goal_deadline) return uiAlert("Date is past project deadline.");
            if (!hasCapacity(newDate, duration, t.id)) return uiAlert("Target date is at capacity!");

            const { error } = await dbCall(client.from('subtasks').update({ title: newTitle, duration, due_date: newDate, importance, updated_at: new Date().toISOString() }).eq('id', id), "Edit");
            if (error) return;

            if (t.recurrence_rule) {
                const newRule = node.querySelector('#edit-recur').value;
                if (newRule !== t.recurrence_rule && VALID_RULES.includes(newRule)) {
                    await dbCall(client.from('subtasks').update({ recurrence_rule: newRule, updated_at: new Date().toISOString() }).eq('project_id', t.project_id), "Edit recurrence");
                }
            }
            m.close();
            refresh();
        };
    }

    async function uncompleteTask(id) {
        const { error } = await dbCall(client.from('subtasks').update({ completed: false, updated_at: new Date().toISOString() }).eq('id', id), "Uncomplete");
        if (!error) refresh();
    }

    /* ---------- Day-detail popup with per-date capacity controls ---------- */
    function openDayModal(dateStr) {
        const node = document.createElement('div');
        openModal(node);
        renderDayModalBody(dateStr, node);
    }

    function renderDayModalBody(dateStr, node) {
        const tasks = masterTasks.filter(t => t.due_date === dateStr).sort((a,b) => b.importance - a.importance);
        const load = tasks.reduce((s,t) => s + t.duration, 0);
        const limit = dayLimit(dateStr);
        const pct = limit ? Math.min(100, (load / limit) * 100) : (load > 0 ? 100 : 0);
        const over = dateStr in capacityOverrides;
        const color = (load >= limit && limit > 0) ? 'var(--red)' : pct >= 66 ? 'var(--orange)' : load > 0 ? 'var(--green)' : 'var(--green)';
        const dObj = parseDateUTC(dateStr);
        let heading = new Intl.DateTimeFormat('en-AU', { weekday:'long', day:'numeric', month:'long', timeZone:'UTC' }).format(dObj);
        if (dateStr === localDateStr()) heading = 'Today · ' + heading;

        const taskHtml = tasks.length ? tasks.map(t => {
            const impClass = `imp-${Math.min(10, Math.max(1, parseInt(t.importance) || 1))}`;
            const s = splitTitle(t.title);
            return `<div class="day-task">
                <div class="imp-chip ${impClass}" style="width:28px; height:28px; font-size:0.8rem;">${esc(t.importance)}</div>
                <div style="flex:1; min-width:0;"><b style="font-size:0.85rem;">${esc(s.name)}</b><br><small style="opacity:0.6;">${esc(s.proj) || '—'} • ${t.duration}m</small></div>
                <button class="btn-push dm-push" data-id="${esc(t.id)}">→</button>
                <button class="btn-done dm-done" data-id="${esc(t.id)}">✓</button>
                <button class="btn-edit dm-del" data-id="${esc(t.id)}" style="color:var(--red);">✕</button>
            </div>`;
        }).join('') : `<p class="modal-msg" style="text-align:center; opacity:0.6;">Nothing planned 🎉</p>`;

        node.innerHTML = `
            <h3 class="modal-title">${esc(heading)}</h3>
            <div class="cap-row">
                <div class="cap-meter"><div class="cap-meter-fill" style="width:${pct}%; background:${color};"></div></div>
                <span class="cap-label">${load} / ${limit}m</span>
            </div>
            <div class="cap-controls">
                <span class="field-label">Capacity for this date</span>
                <div style="display:flex; gap:8px; align-items:center;">
                    <button class="qty-btn dm-minus">− 15</button>
                    <button class="qty-btn dm-plus">+ 15</button>
                    ${over ? `<button class="qty-btn dm-reset" style="background:var(--bg);">Reset</button>` : ''}
                </div>
                ${over ? `<small style="opacity:0.6;">✦ Custom capacity set for this date only</small>` : `<small style="opacity:0.6;">Using your weekly default</small>`}
            </div>
            <span class="field-label">Tasks</span>
            <div style="margin-top:8px;">${taskHtml}</div>
            <div class="modal-actions"><button class="submit-btn dm-close" style="background:var(--ink);">Close</button></div>`;

        node.querySelector('.dm-close').onclick = () => { const o = node.closest('.modal-overlay'); if (o) o.remove(); };
        node.querySelector('.dm-minus').onclick = () => adjustOverride(dateStr, -15, node);
        node.querySelector('.dm-plus').onclick = () => adjustOverride(dateStr, 15, node);
        const reset = node.querySelector('.dm-reset');
        if (reset) reset.onclick = () => resetOverride(dateStr, node);
        node.querySelectorAll('.dm-done').forEach(b => b.onclick = async () => { await completeTask(b.dataset.id); renderDayModalBody(dateStr, node); });
        node.querySelectorAll('.dm-push').forEach(b => b.onclick = async () => { await pushTask(b.dataset.id); renderDayModalBody(dateStr, node); });
        node.querySelectorAll('.dm-del').forEach(b => b.onclick = async () => { await deleteTask(b.dataset.id); renderDayModalBody(dateStr, node); });
    }

    async function adjustOverride(dateStr, delta, node) {
        const next = Math.max(0, dayLimit(dateStr) + delta);
        const { error } = await dbCall(client.from('capacity_overrides').upsert({ date: dateStr, limit_override: next }), "Set capacity");
        if (error) return;
        await loadOverrides();
        computeProjectStates(); renderDashboard(); renderToDo();
        renderDayModalBody(dateStr, node);
    }

    async function resetOverride(dateStr, node) {
        const { error } = await dbCall(client.from('capacity_overrides').delete().eq('date', dateStr), "Reset capacity");
        if (error) return;
        await loadOverrides();
        computeProjectStates(); renderDashboard(); renderToDo();
        renderDayModalBody(dateStr, node);
    }

    function renderDashboard() {
        const todayStr = localDateStr();
        const dayLabels = ['S','M','T','W','T','F','S'];
        const dayKeys = ['sun','mon','tue','wed','thu','fri','sat'];

        const hour = new Date().getHours();
        const greeting = hour < 12 ? 'Good morning! ☀️' : hour < 18 ? 'Good afternoon! 👋' : 'Good evening! 🌙';
        document.getElementById('greeting').innerText = greeting;

        const todayTasks = masterTasks.filter(t => t.due_date === todayStr);
        const todayLoad = todayTasks.reduce((s,t) => s + t.duration, 0);
        const todayLimit = dayLimit(todayStr);
        const remaining = Math.max(0, todayLimit - todayLoad);
        document.getElementById('todaySummary').innerText = `${todayTasks.length} action${todayTasks.length===1?'':'s'} today · ${remaining} min${remaining===1?'':'s'} left in the tank`;

        document.getElementById('streakChip').innerText = `🔥 ${streakCount} DAY STREAK`;

        const bar = document.getElementById('weekBar');
        bar.innerHTML = Array.from({length: 7}, (_, i) => {
            const dateStr = addDays(todayStr, i);
            const dow = dayOfWeek(dateStr);
            const load = masterTasks.filter(t => t.due_date === dateStr).reduce((s, t) => s + t.duration, 0);
            const limit = dayLimit(dateStr);
            const pct = limit ? Math.min(100, (load / limit) * 100) : (load > 0 ? 100 : 0);
            const color = (load >= limit && limit > 0) ? 'var(--red)'
                : pct >= 66 ? 'var(--orange)'
                : load > 0 ? 'var(--green)'
                : '';
            const fill = load > 0 ? `<div class="cap-fill" style="height:${pct}%; background:${color};"></div>` : '';
            const cls = `day-cap${i === 0 ? ' today' : ''}${dateStr in capacityOverrides ? ' has-override' : ''}`;
            return `<div class="${cls}" data-date="${dateStr}"><span class="lbl">${dayLabels[dow]}</span><div class="cap-bar">${fill}</div></div>`;
        }).join('');

        renderQueue();
    }

    const splitTitle = (title) => {
        const idx = title.indexOf(':');
        return idx > 0 ? { proj: title.slice(0, idx), name: title.slice(idx + 2) } : { proj: '', name: title };
    };

    function renderQueue() {
        const queue = document.getElementById('focusQueue');
        if (!masterTasks.length) {
            queue.innerHTML = `<div class="focus-card"><span class="focus-eyebrow">▶ Up Next</span><div class="focus-title">All clear! 🎉</div><div class="focus-meta">No active tasks.</div></div>`;
            return;
        }
        const [first, second, third] = masterTasks;
        const f = splitTitle(first.title);
        let html = `<div class="focus-card">
            <span class="focus-eyebrow">▶ Up Next</span>
            <div class="focus-title">${esc(f.name)}</div>
            <div class="focus-meta">${esc(f.proj)}${stateBadge(first.project_id)} · ${first.duration}m · due ${formatDate(first.due_date)}</div>
            <div class="focus-actions">
                <button class="btn-big btn-go" data-id="${esc(first.id)}" data-act="complete">Done ✓</button>
                <button class="btn-big btn-skip" data-id="${esc(first.id)}" data-act="push">Push →</button>
            </div>
        </div>`;
        [[second, '2ND'], [third, '3RD']].forEach(([t, label]) => {
            if (!t) return;
            const s = splitTitle(t.title);
            html += `<div class="queue-peek"><span class="queue-pos">${label}</span> ${esc(s.name)}${stateBadge(t.project_id)}<span class="qm">${t.duration}m</span></div>`;
        });
        queue.innerHTML = html;
    }

    function renderToDo() {
        document.getElementById('masterToDo').innerHTML = masterTasks.map(t => {
            const impClass = `imp-${Math.min(10, Math.max(1, parseInt(t.importance) || 1))}`;
            return `
            <div class="todo-item${stateRowClass(t.project_id)}">
                <div class="imp-chip ${impClass}">${esc(t.importance)}</div>
                <div style="flex:1; min-width:0;">
                    <b>${esc(t.title)}</b>${stateBadge(t.project_id)}<br>
                    <small>${formatDate(t.due_date)} • ${t.duration}m</small>
                </div>
                <div style="display:flex; gap:6px; align-items:center;">
                    <button class="btn-edit" style="color:var(--red)" data-id="${esc(t.id)}" data-act="delete">✕</button>
                    <button class="btn-edit" data-id="${esc(t.id)}" data-act="edit">✎</button>
                    <button class="btn-done" data-id="${esc(t.id)}" data-act="complete">✓</button>
                </div>
            </div>`;
        }).join('');
    }

    function renderArchived(tasks) {
        document.getElementById('archivedToDo').innerHTML = tasks.map(t =>
            `<div class="todo-item completed-item"><div style="flex:1; min-width:0;"><strike>${esc(t.title)}</strike></div><button class="btn-edit" data-id="${esc(t.id)}" data-act="uncomplete">⟲</button></div>`
        ).join('');
    }

    const ACTIONS = { push: pushTask, complete: completeTask, delete: deleteTask, edit: editTask, uncomplete: uncompleteTask };
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-act]');
        if (!btn) return;
        const fn = ACTIONS[btn.dataset.act];
        if (fn) fn(btn.dataset.id);
    });

    function toggleRecurrence() {
        document.getElementById('recurrencePicker').classList.toggle('hidden');
    }

    async function loadWeeklyReview() {
        const card = document.getElementById('weeklyReviewCard');
        try {
            const weekStart = getWeekStart(localDateStr());
            const { data: cached } = await client.from('weekly_reviews').select('summary').eq('week_start', weekStart).maybeSingle();
            if (cached) return renderWeeklyReview(cached.summary);

            const completedCount = (await client.from('subtasks').select('id', { count: 'exact', head: true }).eq('completed', true).gte('updated_at', weekStart)).count || 0;
            const activeCount = masterTasks.length;
            const states = Object.values(projectStates);
            const overdueCount = states.filter(s => s === 'overdue').length;
            const atRiskCount = states.filter(s => s === 'at-risk').length;

            if (completedCount === 0 && activeCount === 0) return;

            const weekEnd = addDays(weekStart, 6);
            const { data, error } = await client.functions.invoke('ai-weekly-review', {
                body: { completedCount, overdueCount, atRiskCount, activeCount, weekStart, weekEnd }
            });
            if (error || !data?.summary) return;

            await client.from('weekly_reviews').upsert({ week_start: weekStart, summary: data.summary });
            renderWeeklyReview(data.summary);
        } catch {
            card.innerHTML = '';
        }
    }

    function renderWeeklyReview(summary) {
        document.getElementById('weeklyReviewCard').innerHTML = `
            <div class="focus-card">
                <span class="focus-eyebrow">📊 Your Week</span>
                <div class="focus-meta" style="margin-top:10px; margin-bottom:0; opacity:0.85; font-size:0.85rem;">${esc(summary)}</div>
            </div>`;
    }

    async function aiCapture() {
        const text = document.getElementById('nlCapture').value.trim();
        if (!text) return alert("Describe your project first");

        const btn = document.getElementById('aiCaptureBtn');
        const originalLabel = btn.innerText;
        btn.disabled = true;
        btn.innerText = "✨ Thinking…";

        try {
            const { data, error } = await client.functions.invoke('ai-capture', { body: { text, today: localDateStr() } });
            if (error) return alert("AI capture failed: " + error.message);

            if (data.title) document.getElementById('mainGoal').value = data.title;
            if (data.deadline && data.deadline >= localDateStr()) document.getElementById('goalDate').value = data.deadline;
            if (data.importance) setMainImp(data.importance);
            if (data.recurrence && VALID_RULES.includes(data.recurrence)) {
                document.getElementById('recurRule').value = data.recurrence;
                document.getElementById('recurLabel').innerText = data.recurrence;
                document.getElementById('recurrencePicker').classList.remove('hidden');
            }
        } catch (err) {
            alert("AI capture failed: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = originalLabel;
        }
    }

    function populateSettingsForm() {
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(d => {
            document.getElementById(`set-${d}`).value = settings[`${d}_limit`] ?? '';
        });
        if (settings.timezone) document.getElementById('set-tz').value = settings.timezone;
    }

    async function saveSettings() {
        const n = { id: 'default_user', timezone: document.getElementById('set-tz').value };
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(d => n[`${d}_limit`] = parseInt(document.getElementById(`set-${d}`).value) || 0);
        const { error } = await dbCall(client.from('user_settings').upsert(n), "Save settings");
        if (error) return;
        settings = n;
        showScreen('home');
        refresh();
    }

    function cancelPlanning() {
        document.getElementById('planningArea').classList.add('hidden');
        document.getElementById('goalCapture').classList.remove('hidden');

        stagingTasks = [];
        document.getElementById('stagedList').innerHTML = '';
        document.getElementById('stageTitle').value = '';
        document.getElementById('stageMins').value = '15';
        document.getElementById('stageDate').value = '';
    }
</script>
</body>
</html>
