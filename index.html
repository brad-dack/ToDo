<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Planner</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 15px;
}

button {
    background: #2b7cff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.task {
    border: 1px solid #ddd;
    padding: 12px;
    border-radius: 8px;
    margin-top: 15px;
}

h1 {
    text-align: center;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>Task Planner</h1>

<!-- CREATE TASK -->
<div id="createScreen">
    <input type="text" id="taskTitle" placeholder="Task title">

    <label>Due Date</label>
    <input type="date" id="dueDate">

    <label>Importance (0–10)</label>
    <input type="number" id="importance" min="0" max="10">

    <label>Time Estimate (minutes)</label>
    <input type="number" id="timeEstimate">

    <button onclick="addTask()">Add Task</button>
</div>

<!-- BREAKDOWN SCREEN -->
<div id="breakdownScreen" class="hidden">

    <h3>Break Task into Steps</h3>

    <div id="breakdownList"></div>

    <button onclick="saveSubtasks()">Save Steps</button>
</div>

<!-- TASK LIST -->
<h3 style="margin-top:30px;">Your Tasks</h3>
<div id="taskList"></div>

</div>

<script>

// 🔑 ADD YOUR KEYS HERE
const SUPABASE_URL = "https://wuhklqulwhioiynoadtj.supabase.co";
const SUPABASE_KEY = "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx";

let client;
let tasks = [];
let currentTask = null;
let currentTaskId = null;

window.onload = async function () {
    client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadAllTasks();
};

// ADD TASK (parent)
async function addTask() {

    let title = document.getElementById("taskTitle").value;
    let dueDate = document.getElementById("dueDate").value;
    let importance = parseInt(document.getElementById("importance").value);
    let time = parseInt(document.getElementById("timeEstimate").value);

    if (!title || !dueDate || !time) return;

    let { data, error } = await client.from("tasks")
        .insert([{
            title: title,
            due_date: dueDate,
            importance: importance,
            time_estimate: time
        }])
        .select();

    if (error) {
        alert("Error saving task");
        console.error(error);
        return;
    }

    currentTask = data[0];
    currentTaskId = currentTask.id;

    showBreakdown(currentTask);
}

// SHOW BREAKDOWN UI
function showBreakdown(task) {

    document.getElementById("createScreen").classList.add("hidden");
    document.getElementById("breakdownScreen").classList.remove("hidden");

    let list = document.getElementById("breakdownList");
    list.innerHTML = "";

    let total = task.time_estimate;

    while (total > 0) {

        let step = Math.min(15, total);

        let div = document.createElement("div");

        div.innerHTML = `
            <input type="text" value="Work on ${task.title}">
            <span> (${step} min)</span>
        `;

        list.appendChild(div);

        total -= step;
    }
}

// SAVE SUBTASKS
async function saveSubtasks() {

    let list = document.getElementById("breakdownList").children;

    let inserts = [];

    for (let item of list) {

        let input = item.querySelector("input");
        let duration = parseInt(item.textContent.match(/\((\d+)/)[1]);

        inserts.push({
            parent_id: currentTaskId,
            title: input.value,
            duration: duration,
            importance: currentTask.importance,
            due_date: currentTask.due_date
        });
    }

    let { error } = await client.from("subtasks").insert(inserts);

    if (error) {
        alert("Error saving subtasks");
        console.error(error);
        return;
    }

    // reset UI
    document.getElementById("breakdownScreen").classList.add("hidden");
    document.getElementById("createScreen").classList.remove("hidden");

    document.getElementById("taskTitle").value = "";
    document.getElementById("timeEstimate").value = "";

    await loadAllTasks();
}

// LOAD SUBTASKS (MAIN LIST)
async function loadAllTasks() {

    let { data, error } = await client
        .from("subtasks")
        .select("*");

    if (error) {
        console.error(error);
        return;
    }

    tasks = data;

    sortTasks();
    renderTasks();
}

// SORT
function sortTasks() {
    tasks.sort((a, b) => {

        let dateA = new Date(a.due_date);
        let dateB = new Date(b.due_date);

        if (dateA.getTime() !== dateB.getTime()) {
            return dateA - dateB;
        }

        return b.importance - a.importance;
    });
}

// RENDER
function renderTasks() {

    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach(task => {

        let box = document.createElement("div");
        box.className = "task";

        box.innerHTML = `
            <strong>${task.title}</strong><br>
            Due: ${task.due_date}<br>
            Importance: ${task.importance}<br>
            Duration: ${task.duration} min
        `;

        list.appendChild(box);
    });
}

</script>

</body>
</html>
