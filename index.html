<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Planner</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    background: #2b7cff;
    color: white;
    border: none;
    border-radius: 6px;
}

.task {
    border: 1px solid #ddd;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>Task Planner</h1>

<!-- CREATE -->
<div id="createScreen">
    <input id="taskTitle" placeholder="Task title">
    <input type="date" id="dueDate">
    <input type="number" id="importance" placeholder="Importance (0–10)">
    <input type="number" id="timeEstimate" placeholder="Time (minutes)">
    <button onclick="addTask()">Add Task</button>
</div>

<!-- BREAKDOWN -->
<div id="breakdownScreen" class="hidden">
    <h3>Break into Steps</h3>
    <div id="breakdownList"></div>
    <button onclick="saveSubtasks()">Save Steps</button>
</div>

<h3>Your Tasks</h3>
<div id="taskList"></div>

</div>

<script>

// 🔑 CONFIG — only edit this section
const CONFIG = {
    SUPABASE_URL: "https://wuhklqulwhioiynoadtj.supabase.co",
    SUPABASE_KEY: "sb_publishable_-Pvtjx_Ticah2G1g6ZtJ9A_rOxaZvRx"
};

let client;
let tasks = [];
let currentTask;
let currentTaskId;

// Cache elements (prevents bugs)
const el = {
    title: document.getElementById("taskTitle"),
    dueDate: document.getElementById("dueDate"),
    importance: document.getElementById("importance"),
    time: document.getElementById("timeEstimate"),
    create: document.getElementById("createScreen"),
    breakdown: document.getElementById("breakdownScreen"),
    breakdownList: document.getElementById("breakdownList"),
    taskList: document.getElementById("taskList")
};

window.onload = async () => {

    if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_KEY) {
        alert("Missing Supabase config");
        return;
    }

    client = supabase.createClient(
        CONFIG.SUPABASE_URL,
        CONFIG.SUPABASE_KEY
    );

    await loadTasks();
};

// FORMAT DATE → DD/MM/YY
function formatDate(dateStr) {
    let d = new Date(dateStr);
    let day = String(d.getDate()).padStart(2, '0');
    let month = String(d.getMonth()+1).padStart(2, '0');
    let year = String(d.getFullYear()).slice(-2);
    return `${day}/${month}/${year}`;
}

// ADD TASK
async function addTask() {

    let title = el.title.value;
    let dueDate = el.dueDate.value;
    let importance = parseInt(el.importance.value);
    let time = parseInt(el.time.value);

    if (!title || !dueDate || !time) {
        alert("Fill all fields");
        return;
    }

    let { data, error } = await client.from("tasks")
        .insert([{ title, due_date: dueDate, importance, time_estimate: time }])
        .select();

    if (error) {
        console.error(error);
        alert("Error saving task");
        return;
    }

    currentTask = data[0];
    currentTaskId = currentTask.id;

    showBreakdown(currentTask);
}

// BREAKDOWN UI
function showBreakdown(task) {

    el.create.classList.add("hidden");
    el.breakdown.classList.remove("hidden");

    el.breakdownList.innerHTML = "";

    let total = task.time_estimate;

    while (total > 0) {

        let step = Math.min(15, total);

        let div = document.createElement("div");

        div.innerHTML = `
            <input type="text" value="${task.title}">
            <input type="date" value="${task.due_date}">
            <span data-duration="${step}">${step} min</span>
        `;

        el.breakdownList.appendChild(div);

        total -= step;
    }
}

// SAVE SUBTASKS
async function saveSubtasks() {

    let items = el.breakdownList.children;
    let inserts = [];

    for (let item of items) {

        let inputs = item.querySelectorAll("input");
        let duration = parseInt(item.querySelector("span").dataset.duration);

        inserts.push({
            parent_id: currentTaskId,
            title: currentTask.title + " - " + inputs[0].value,
            due_date: inputs[1].value,
            duration: duration,
            importance: currentTask.importance
        });
    }

    let { error } = await client.from("subtasks").insert(inserts);

    if (error) {
        console.error(error);
        alert("Error saving subtasks");
        return;
    }

    el.breakdown.classList.add("hidden");
    el.create.classList.remove("hidden");

    // Clear inputs
    el.title.value = "";
    el.time.value = "";

    await loadTasks();
}

// LOAD TASKS
async function loadTasks() {

    let { data, error } = await client
        .from("subtasks")
        .select("*")
        .eq("completed", false);

    if (error) {
        console.error(error);
        return;
    }

    tasks = data;

    tasks.sort((a, b) => {
        let d1 = new Date(a.due_date);
        let d2 = new Date(b.due_date);

        if (d1 - d2 !== 0) return d1 - d2;
        return b.importance - a.importance;
    });

    renderTasks();
}

// COMPLETE TASK
async function completeTask(id) {

    await client.from("subtasks")
        .update({ completed: true })
        .eq("id", id);

    await loadTasks();
}

// RENDER
function renderTasks() {

    el.taskList.innerHTML = "";

    tasks.forEach(t => {

        let div = document.createElement("div");
        div.className = "task";

        div.innerHTML = `
            <input type="checkbox" onclick="completeTask('${t.id}')">
            <strong>${t.title}</strong><br>
            Due: ${formatDate(t.due_date)}<br>
            Importance: ${t.importance}<br>
            ${t.duration} min
        `;

        el.taskList.appendChild(div);
    });
}

</script>

</body>
</html>
